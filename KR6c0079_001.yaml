body:
  text: 唐圭峰大師疏宋長水大師記後學雲棲寺沙門大科會記金剛經纂要刊定記并序釋氏教金剛經世所由來尚矣自秦至今凡幾百載諷誦無卑高感應盈簡牘利及幽壤而達乎神明蓋趣大之坦途破小之宏略也故補處頌以為本二論釋而有貫諸疏互解或依或違圭山大師撮掇精英黜逐浮僞命曰纂要蓋取中庸復申紀略用備傳習石壁師仍貫義意別為廣録美則美矣辭或繁長後學多不便用今更刊定剪利煩亂俾流而無滯學而思講庶吾道無墜地之患也已大宋天聖紀號之明年季冬月甲子日序云記金剛經纂要刊定記長水沙門子璿録釋金剛經纂要疏分三初標題目二序宗旨三解本文初標題目二初經疏名題二作者嘉號初經疏名題疏金剛般若經疏論纂要并序記疏文分三初標題目二初經疏名題記金剛般若經疏論纂要者此題九字從寬至狹能所六重一能所釋謂金剛等五字是所疏論下四字屬能二能所詮謂經疏屬能金剛等四字是所三能所簡有二一簡通謂經通一代時教般若唯局當部二簡別般若猶通八部金剛但屬一經五能所喻金剛是能般若屬所六能所纂纂字屬能謂疏主也要字是所謂正義也若著并序二字復加一重二字是能上皆所攝然此七重不出教行人理謂經及疏論并序五字是教謂能詮能釋能序也般若通行謂觀照也纂字屬人疏主也金剛要字屬理金剛喻實相即真理要字是正義即道理記既知一題能所去著須知題內義理淺深金剛有三義謂堅利明也般若亦三義謂實相觀照文字也經有三義謂常貫攝也疏亦三義謂疏決布也論者議也亦三義謂議理議智議行也纂要亦三義謂要義要行要文也記且金剛三義者以萬物不能壞能壞於萬物復能有照用可喻三種般若矣堅喻實相以其雖經多劫流迸六道未嘗生滅未嘗虧缺故云堅也故心經云是諸法空相不生不滅不垢不淨不增不減等利喻觀照般若謂此顯時照諸法空故言利也故心經云觀自在菩薩行深般若波羅蜜多時照見五蘊皆空度一切苦厄乃至云無智亦無得等明喻文字般若以文字能詮顯彰明實相觀照令顯現故由斯三義似彼金剛故舉金剛以喻般若然此般若諸佛衆生悉皆有之由彼在纏故不能利用苟能聞教解悟內外熏力則能斷煩惱出生死理智相冥能起大用與佛無異其猶金在礦中不能隨用苟能出礦必能成器斷物故知此慧無不有之故知此慧能建大義今云般若蓋大慧之梵音也金剛即般若之正喻也法喻雙彰故曰金剛般若也記若準經題具足合云波羅蜜即歎慧之功也唐言彼岸到此猶西域之風若順此方合云到彼岸彼岸者即是涅槃為對生死之此故號涅槃為彼意明般若是到彼岸慧斯則慧之別相也然到彼岸慧略有二意所謂頓漸也頓者此慧顯時一剎那間照諸法空即是到彼岸故名到彼岸慧以不歷多時乃名為頓漸者雖則頓照法空且習以性成任運計執所以䇿彼頓悟之慧觀察妄情損之又損之以至於無為此則究竟到於彼岸亦名到彼岸慧以歷多時故名為漸漸之與頓遲速雖殊一種得名到彼岸慧所以具足合云金剛般若波羅蜜今略不言也記次明經字具三義者然準諸家解釋共有多義謂湧泉出生繩墨結鬘之類若佛地論中唯說二義謂貫也攝也貫穿所應說義攝持所化衆生且如來入滅二千餘年遺風若存得聞正法者斯皆經之貫穿之義也衆生流浪莫知所從得佛教門咸歸正趣者斯皆經之攝持之義也具此二義故名為經今以此二復加常義以對三種般若謂實相常觀照貫文字攝也然此一經羅什所譯句偈清潤令人樂聞至今長幼高卑盈於寰宇靡不受持此經也記疏論纂要者即此一卷疏文也疏即青龍大雲資聖塵外等疏疏謂疏通理趣決擇義相布致文言也論即天親無著智度金剛仙功德施等論一一論中任運議於理智行也問既有疏論釋經何必更製斯疏答以纂要故即是纂他疏論之要義而成此疏也然纂要之設總有兩意一則上符聖旨二則下叶人心意顯諸說有不符聖旨不叶人心者且初意者只如此經是空無有宗有以法相行位廣列而釋此則不符聖旨失於宗故故序云或配入名相著事乖宗有人聞是空宗便作一味無相道理解釋此亦不符聖旨以宗雖無相義乃千端既以一味解釋此則迷於末也故序云或但云一真望源迷派前則乖宗不迷派此則迷派不乖宗互有得失俱未圓暢復有縱於僻見以之注釋宗派俱失不足評量故序云其餘胸談臆注不足論矣然其諸說雖各有舛的以未兼暢故皆判云不符聖旨也今製此疏不添法相免乖於宗隨文釋之不迷於派離前二過宛乎得中此則超然獨符聖旨然今疏內皆用聖言故序云故今所述不攻異端疏是論文乳非城內況二菩薩師補處尊補處如來師釋迦佛展轉推本佛佛相承降及無著天親更無異說故知此疏便是佛言謗此疏者即同謗佛也故序云且天親無著師補處尊後學何疑或添或棄次下叶人心者且諸家章疏在理未當於文且繁致令學人少敢措意故轉念者廣通會者稀故序云致使口諷牛毛心通麟角然今此疏撮其樞要直下銷經經疏相兼盈五十紙不問緇侶塵俗可以留心不唯上中下根可以學習有斯兩意所以述之此則前智後悲自他兼利也故云金剛般若經疏論纂要記并序者并謂共兼及也序者敘也敘述經疏之意故又序者緒也謂頭緒也意明此半紙之言是入疏述作之頭緒也二作者嘉號疏京大興福寺沙門宗密述記二作者嘉號京者都也大也即士庶貴賤都會之大處也然是西京非謂東北以有大興福寺暗揀故不言西也沙門梵語此云勤息即釋衆之通號謂勤修諸行息煩惱故述者明非製作符上纂要之言但是敘述先聖之旨非別製作故也例如夫子云述而不作信而好古竊比於我老彭疏長水沙門子璿治定二序宗旨二初序讚經旨二述造疏意初序讚經旨二初通明起教之緣二別明說教之意初通明起教之緣二初明迷真起妄二明習妄流轉初明迷真起妄二初真空二妄有初真空疏鏡心本淨像色元空記二序宗旨二一序讚經旨二一通明起教之緣二一明迷真起妄二一真空記言鏡心等者以要言之上句即真性離緣下句即緣無自性大約如此若其委明應先略配後當廣釋記略配者此兩句中鏡像是喻心色是法本淨元空通於法喻以鏡喻於心以像喻於色像是鏡之所現如色是心之所現鏡雖現像其像元空即顯鏡本淨也心雖現色其色元空即顯心本淨也言本淨者即是性淨通因果凡聖故故華嚴云非識所能識亦非心境界其性本清淨開示諸群生此略指配也記若廣釋者鏡即人間所用之鏡然有塵薶不堪用者有雖淨而在匣者有淨無塵垢挂之高臺萬像斯鑒者今取後者為喻心者性相二宗所說各異相宗說者或以集起為心唯第八識集諸種子起現行故或以緣慮為心通於八識俱能緣慮自分境故然此所說但是有為生滅非今所喻性宗說者即如來藏本源自性清淨心也然今所明正是此心以是迷悟根本凡聖通依世出世間皆不離此所以起信論中立為大乘法體故論云摩訶衍者一法二義所言法者謂衆生心是心則攝一切世間出世間法依於此心顯示摩訶衍義又云依一心法有二種門一者心真如門二者心生滅門是二種門皆各總攝一切法此義云何以是二門不相離故以真如門是通相故攝一切生滅門雖是別相以是即真如之生滅亦攝一切以此二門同依一心為源則知萬法不出此心又如華嚴是圓極一乘亦以此心為一真法界之體故彼疏說統四法界為一真法界謂寂寥虗曠沖深包博總該萬有即是一心體絶有無相非生滅乃至云諸佛證此妙覺圓明現成菩提為物開示等然此一心有性有相相則凡聖迷悟因果染淨等異性則靈靈不昧了了常知然此性相不即不離以相不離性故只向同處異性不離相故只於異處同性不即相故未始有差別相不即性故未嘗不殊異蓋緣性相一味所以同異兩存其猶一水波溼性相同異可知然此靈心本非一切能為一切心之名字亦由此立今云淨者但約畢竟空義非是揀染名淨以但唯一心貫通染淨故荷澤云知之一字衆妙之門一切諸法依此建立既為得失之祕府乃是升降之玄樞稱衆妙門實為至矣今所辨者即是此心然前所說相宗二種乃是此心之內生滅一門對辨淺深故須料揀和會通攝則實無所遺本淨者喻則可知法中有二意一則此心從本已來性畢竟空故二則現為煩惱所纏而無染故此當起信論中真如門也故大集經云善男子一切衆生心性本淨心本淨故煩惱諸結不能染著猶如虗空不可玷汙心性空性等無有二等像即鏡中所現萬像色即本淨之心所現諸法然所現法不出色心今唯言色而不言心者一為文句窄故二為影在下故三為以初攝後故前二可知後意者一切諸法不出五蘊色之一字貫五之初今言色者舉初攝後也故大般若中每例諸法皆以色字為初如云善現般若波羅蜜多清淨故色清淨色清淨故一切智智清淨等由是文雖標色而意兼於心色心既彰萬法備矣元空者喻則可知法中有二意一即本來是空論云一切諸法唯依妄念而有差別若離心念則無一切境界之相二即現見空故色等諸法本來自空迷人不知妄執為有雖然執有未始不空故中論云諸法若不空即無道無果又云以有空義故一切法得成然此一句亦是釋疑恐人聞說心性本淨復見論云是心則攝世間法等便謂本具染等不合言淨故下句釋云像色元空也意云色等若實則汙淨心色等既空憑何汙心如鏡現穢像穢像元空似有實無云何染汙故云鏡心本淨像色元空也無上依經云清淨有二義一者自性清淨是其通相二者離垢清淨是其別相寶性論中亦有二義一自性清淨謂性淨解脫二離垢清淨謂障盡解脫魏譯唯識論云心有二種一者相應心所謂一切煩惱受想行等二者不相應心所謂第一義諦常住不變自性清淨心也今所明者即自性清淨及第一義諦心故云本淨復次兩句更互釋成以上句釋下句成色空義以下句釋上句成心淨義色若不空心則不淨心若不淨色即不空由心淨故色空由色空故心淨以色心二法不相離故當知由心淨故方能現色如鏡淨故方能現像染則不能又由色空故不能染心如像空故不能汙鏡實則汙也上句下句法喻對明反覆相成故云互釋二妄有疏夢識無初物境成有記疏夢識下二明妄有即正當起信論中心生滅門然此亦具法喻以夢喻識以夢中所現之物喻境如人睡後作夢於無物處見物喻心迷成識於無境處見境然雖物依夢現而夢物皆虗雖境從識生而識境俱妄也記夢者如常人被睡蓋所覆心識昧略恍忽成夢準切韻中夢者心亂之貌亦云𥧌見曰夢意明心識昏亂見於異事名之為夢識者本淨一心忽然不覺不覺是妄心性乃真真妄和合目之為識即是第八阿梨耶識也故起信云依如來藏故有生滅心所謂不生不滅與生滅和合非一非異名阿梨耶識無初者初始也意明此識無前際故然真心妄識雖虗實有殊若究其源俱無初際然有兩意一則如佛頂經說煩惱菩提二俱無始謂自有此真心已來便有此妄識非謂真先妄後亦非妄先真後若言真先妄後即應諸佛更起無明若言妄先真後何有無真之妄居然獨立由是故知二俱無始此則夢喻不齊却似金之與礦若言礦先金後即合所棄之礦鍊之得金若言金先礦後應可純淨金器重生於礦由是二物俱無初際於法可知問如論云依如來藏故有生滅心既言依真有妄則是妄後真先何得說云二俱無始答不然所言依者明妄無自體依真而成顯本末之義非先後之義故起信云以如來藏無前際故無明之相亦無有始若說三界外更有衆生始起者即是外道經說二者謂妄體全空都無生起之蹤跡故言妄無始也故起信云覺心初起心無初相即斯義也若據此意夢喻正同以夢生時無縱跡故有茲兩意故云妄無初也然上夢礦二喻之中各取少分共況一識無初之義方盡其理夢則喻無初法礦則喻無初時若單用礦喻則妄識有實若唯取夢喻則妄識有始今既分取相似之處理極成矣物者即夢中所現之物也境者即是識中所變我法等境成有者且如夢中所見自他境界覺來反想即定是無正在夢時決定為有若不然者何有讚喜謗嗔厭苦欣樂等事耶故知有也如莊子中說莊周夢為蝴蝶都來忘却莊周及乎睡覺夢除何曾更有蝴蝶為莊周時既不羡蝴蝶為蝴蝶時亦不羡莊周彼此各行互不相識然準彼書意以顯生死齊平今之所引意明執實之義謂依於妄識變起我法等相悟來了達則誠知是空若正迷時定執為有若不然者何有貪瞋愛惡取捨等事耶故知是有故成唯識論云依識所變妄見我法猶如幻夢幻夢力故心似種種外境相現緣此執為實有外境然雖夢中見種種事推其根本唯一夢心以夢心滅時夢事皆滅法中亦爾境雖無量原其根本唯一識心識心滅時境界隨滅故起信論云一切諸法唯依妄念而有差別若離心念即無一切境界之相則知三界唯心萬法唯識諒不虗哉由是三界世間一切有漏染法皆從妄識而生故名此識以為妄本然一切有漏染法生起微著次第總有兩重一無始根本二展轉枝末展轉枝末即後逐妄科中所明無始根本正當此段言根本者即根本無明言無明者謂無妙覺之明故以就通相言之故當此識然根本無明其有二義所謂迷真執妄也迷真者即真心本不生滅德相業用量過塵沙日用不知如狂如醉若貧女宅中寶藏窮子衣內明珠雖有如無枉受艱苦故華嚴云於第一義不了名曰無明執妄者妄即五蘊色之與心如幻如化本無實體衆生認此為自身心計虗為實故名執妄故圓覺經云妄認四大為自身相六塵緣影為自心相乃至結云由此妄有輪轉生死故名無明然此二義遞互相成舉一則兼未嘗獨立但若執妄必須迷真但若迷真必須執妄譬如有人迷東必執西亦互相成立思之可見二明習妄流轉疏由是惑業襲習報應綸輪塵沙劫波莫之遏絶記疏由是下二明習妄流轉即當妄法生起第二門展轉枝末也由是等者由因也是此也因此迷真成識現起世間一切境界緣此境界起惑造業受報無窮此中惑業報應四字但是三道然此三法諸教之中有名三障障聖道故或名三道引心邐迤至業報故或名三雜染以性不清淨故又此三障更相由藉由煩惱故起惡業由惡業因緣故得苦果初言惑者即煩惱也品類即根本及隨根本有六謂貪瞋癡慢疑惡見隨煩惱有二十謂忿恨覆惱嫉慳乃至散亂不正知等若以要言之不出根本中三謂貪瞋癡即此三種便能成就三界世間故華嚴云由貪瞋癡發身口意作諸惡業無量無邊等此惑因起由前無明迷平等理妄認五蘊身心即此身心是過患根本故肇公云約天地為高下約日月為東西約身為彼此約心為是非老子亦云吾有大患為吾有身及吾無身吾有何患故知此身是一切過患根本既執之為有遂分自他依此身心起諸煩惱於一切順情境上起於貪心於一切違情境上起於瞋心以護自身將為主宰也於此二中不知是妄任運而起乃名為癡此等煩惱究其所因皆從根本無明而有也次云業者然業雖無量統唯有三謂善惡不動也由前貪瞋熾盛發動身口作諸惡業即身三口四意三等十惡業也或有稍知因果貪來生榮樂之事即翻惡為善持不殺等五八十戒即善業也或厭下苦粗障欣上淨妙離修有漏禪定名不動業然此三種業雖勝劣不同皆由迷心所造俱有漏攝故圓覺經中結三業云皆輪回故不成聖道由是則知前之三業皆依煩惱所成也言報應者應即是報既有業種蘊在藏識因緣會時必須受報涅槃經云非空非海中非入山石間無有地方所脫之不受報尚書云天作孽猶可違自作孽不可逭由是有業必有報應然若推諸業體相都無及受報時未嘗差錯惡因苦果善因樂果如影如響的無差謬然泛論果報六道不同以類收之但唯三種謂苦樂捨由前惡業為因則感三塗苦報謂地獄餓鬼畜生也由前善業為因即感人天樂報謂四洲六欲也由前不動業為因即感上界差別之報即色無色界也然於三界之中所受苦樂之身是別業正報所居勝劣器界即共業依報正報有生老病死依報有成住壞空器界空而復成有情死而還生無始至今聯綿不絶迷惑耽戀誠可悲夫故法華云三界無安猶如火宅由是報因業感業由惑成惑因無明無明無始一念妄有也則知三界六道有情無情究其所從皆因夢識而有襲習綸輪者襲謂承襲即相續義由惑發業業能招苦次第相續故習謂熏習即相斆義意明惑業念念斆學念念熏習故唯識云由諸業習氣二取習氣俱故名為習然此二義必互相資謂相續故相斆相斆故相續故云襲習故唯識云前異熟已盡復生餘異熟也譬如有人習儒學文由承襲於儒故方能學習於文又由學習於文故方能承襲於儒也相資之義豈不昭然綸即綸緒也謂衆生業種雖復無邊終不一時受六道報報有次緒故名綸緒也然有兩意一如人負債強者先牽故二如人種物潤者先生故輪謂輪轉謂生已復死死已還生生死不停故名輪轉或天上死人間生人間死畜生生等故無常經云循環三界內猶如汲井輪然此二義亦互相資由綸緒故輪轉由輪轉故綸緒也其猶繅繭抽絲由彼絲輪轉而不止故使絲緒起之不絶亦由絲緒起之不絶故使絲輪轉而不止或可淪子其義亦通即沒溺義也謂於生死大河長受沒溺故云淪涅槃經云若有衆生樂諸有為造作諸業是人迷失真常是名暫出還沒疏中且用輪字如向所說惑業則言其襲習報應則言其綸輪然二二對辨亦互相資謂由惑業襲習故使報應綸輪實由報應綸輪故令惑業襲習斯則乘因感果依果造因因果相資以之不絶此即十二因緣前前為因後後為果之義故唯識頌云由諸業習氣二取習氣俱前異熟已盡復生餘異熟或曰如是起惑造業受報輪轉時劫長短耶故次云塵沙劫波莫之遏絶也塵即碎十方世界之微塵沙即殑伽河中如麵之沙謂此河周四十里沙細如麵劫波者梵音此云時分大劫小劫長時短時延促雖殊通名時分莫之者猶不能也遏絶者止滅也意言六道衆生起惑造業受生輪轉已來將一沙為一劫波沙盡而劫波不盡又將一塵為一劫波塵盡而劫波無盡塵沙有限劫波無窮相續至今不能止之滅之故云莫之遏絶也記然此二段字句雖多若論實事不過五字謂心識惑業報其餘並是顯敘真妄成立輪回之辭意謂本是一心不覺成識起惑造業生死無窮是故如來現身說教故大科云起教緣也二別明說教之意二初敘說阿含之意二敘說般若之意初敘說阿含之意二初正敘二結判初正敘二初現身二設教初現身疏故我滿淨覺者現相人中記疏故我下二別明說教之意如法華經云我以佛眼觀見六道衆生貧窮無福慧入生死嶮道相續苦不斷乃至為是衆生故而起大悲心等文二一敘說阿含之意二一正敘今初兩句標佛現身也故者所以義我即指佛也言滿淨者揀異分淨以佛無明永盡無念之極故覺即覺悟者即指人謂佛是覺悟之人也若梵語菩提此翻為覺斯則約法梵語佛陀此云覺者斯則約人今此辨人故言覺者亦可滿字是總淨覺為別者字屬人即明如來是滿淨滿覺之者揀諸聖人覺淨未滿唯佛如來三障都盡三覺俱圓故號如來為滿淨覺者若以此二望衆生二乘菩薩諸佛及本性料揀有兩種四句一者衆生不淨二乘菩薩分淨諸佛滿淨本性但淨二者衆生不覺二乘菩薩分覺諸佛滿覺本性但覺今於此二四句中皆當第三也現相者即化身相也人中者即現化之處也唯向人中示相者天上著樂無由發心三塗極苦正當難處唯於人中苦樂相兼對苦必能發心所以佛出現化天上如病未發豈須針艾三塗似膏肓之病不足醫治人中如小瘵所縈堪可與藥故佛出現然如來現相總有四種謂他受用報身大化小化隨類化身等今明說此教者即小化身也然有八相謂一從兜率天退二入胎三住胎四出胎五出家年十九六道成年二十五七轉法輪經五十五年八入涅槃年八十此論現身但明成道之相次明說法即轉法輪相佛成道之相身長丈六紫磨金容項佩圓光胸題卍字三十二相八十種好八部擁衛四衆欽崇巍巍峨峨光映日月德相繁廣不可具陳此小化身其相劣弱若望受用即雲泥有殊故法華經說長者脫珍御服著弊垢衣珍御之服以喻受用之身弊垢之衣即況紫磨金體蓋以衆生垢重不堪見勝妙之身既不能見亦無所聞則於衆生都無利益大悲接物故現小化亦如法華經說窮子見父踞師子牀寶几承足富貴殊勝威德特尊窮子見之竊作是念此或是王或是王等非我傭力得物之處長者見子默而識之乃至云即脫瓔珞細軟上服嚴飾之具更著粗弊垢膩之衣右手執持除糞之器以此方便得近窮子此喻如來隱彼勝身現於劣相也二設教疏先說生滅因緣令悟苦集滅道記疏先說下正明設教以此方佛事藉以音聲若無言教現相何益教先設小後方說大或曰此明般若何論小乘答雖同佛言有深有淺若不對辨安知淺深然一代佛教不出大乘小乘乃至圓宗亦大乘攝其所宗者皆宗因緣雖則同宗因緣於中淺深有異小乘即生滅因緣大乘即無性因緣無性因緣者如中論云因緣所生法我說即是空空即無性義也今明小乘故云生滅因緣生滅因緣者諸法緣會即生緣離即滅既生既滅足知無常然則不無生滅之法以有法執故也然佛出世先說小者有二對治故說生滅對治凡夫外道執我我是主宰義既言生滅則知無主無主無宰則無我也說因緣對治外道自然之計外道所執多執神我有作受故兼執自然既言因緣則非神我自然也為治此二是故先說生滅因緣即佛初成道始從鹿苑度五俱輪次度舍利弗目連迦葉三兄弟等於十二年間所說即諸部阿含等經是也令悟等者佛說此法意令衆生悟四真諦也此有兩種因果謂集是世間因苦是世間果道是出世因滅是出世果也苦即三苦八苦三苦謂苦苦壞苦行苦八苦謂生老病死求不得五陰盛愛別離怨憎會集即業惑如逐妄中說滅即有餘無餘二種涅槃入經可見道即八正道謂正見正思惟正語正業正命正精進正念正定也諦者誠實義如世間苦集逼迫和合事無虗謬名為實義非謂不生不滅名實即說苦定苦集定集等以是義故四皆實也故遺教經云日可令冷月可令熱佛說苦諦實苦不可令樂即如佛於鹿苑為五比丘三轉四諦法輪之例也三轉者一示相轉示謂顯示苦行相等令其悟解云此是苦此是集等二勸修轉勸謂誡勸令其修斷云此是苦汝須知此是集汝須斷等三作證轉作證謂引己所作令其信受云此是苦我已知此是集我已斷等意言我已知已斷已修已證汝等斆我當知當斷當修當證如是說已一類小根之人如言啓悟厭生死苦樂求涅槃發心進修作五停心等七種方便斷三界四諦下分別粗惑得初果證乃至進修漸斷三界俱生細惑證餘三果得阿羅漢則令世間因亡果喪出世間因生果證法華云為求聲聞者說應四諦法度生老病死究竟涅槃是故疏云先說生滅因緣令悟苦集滅道二結判疏既除我執未達法空記疏既除下二結判我執者即於五蘊總相計有主宰名為我執若一一推求色等性中不見我體名為我空若見五蘊之法實有體性名為法執若了五蘊如幻如化從緣無性名為法空既除者已盡也以小乘人聞說生滅因緣不執於我故云既除我執未達者以未聞說無性因緣猶計蘊法為實故云未達法空若具言之合云既除我執已達我空未達法空未除法執今則上執下空文影略故又除我執便是已達我空未達法空便是未除法執故也二敘說般若之意二初總示大部二別示今經初總示大部二初敘教釋意二顯瑞彰會初敘教釋意二初敘教二釋意初敘教疏欲盡病根方談般若記疏欲盡下二敘說般若意二一總示大部二一敘教釋意病根者喻法執也如人有病令人不安如木有根能生枝葉意云二執如病令諸衆生不得安樂若取法執為病病即是根持業釋也若取我執為病是病之根即依主釋今則病通二執根喻法執以能所依二體異故我是能依法是所依以能從所生故能非根根唯局所也由是凡夫有我執必兼有法執二乘有法執不必具我執又二乘無我執則未必無法執菩薩無法執則必無我執如因迷杌方可見人等般若即慧也為顯此法故遺言成教教即文字般若即觀照實相二般若也今約佛論故通法教俱名般若也此中意云如來意欲盡衆生有執之病根方談空宗之般若然大乘教法無量無邊何故此中唯談般若謂正能破執大乘初門二執若除真性自現故唯談此除其病也故古德云華嚴經如治國之法養性之藥般若教如定亂之將治病之藥二經既爾餘可例知二釋意疏心境齊泯即是真心垢淨雙亡一切清淨記心境等者然佛初說小乘心境俱有說大乘法相即境空心有說般若教即心境俱空今正明此故云齊泯心即心心所法境即諸識相分心通能變能緣境通本質影像心境等亡故云齊泯謂約遍計則都無所有如繩上蛇約依他則緣無自性如麻上繩由心故境由境故心境滅心空心如境謝然諸法雖多不出心境心境既泯則一切皆泯也心經亦云無眼耳鼻舌身意無色聲香味觸法無眼界乃至無意識界等故云齊泯即是真心者顯非斷滅恐聞一切諸法泯之皆無諸法既無應成斷滅故此顯云即是真心然此心與上心字不同上是緣生妄心即前夢識也此是常住真心即前鏡心也為揀別故故特言真以一切諸法皆依此心若離此心無別有法故經云一切世界因果微塵因心成體心之所現名曰依他執之為實乃名遍計依計既泯即是圓成如繩依麻有蛇託繩生繩蛇既亡則麻著矣此是疏主出般若之密意若據經文即但言諸法皆空不言即是真心故下文云離一切相即名諸佛文雖不彰義實如此若法性宗即直於諸法空處顯出真心故圓覺經云種種幻化皆生如來圓覺妙心猶如空華從空而有乃至云諸幻盡滅覺心不動故云即是真心也垢淨雙亡者上言心境染淨已含文未顯彰故重明也意云非但無諸有漏心境之法若於法中染淨之法亦復不有為對治垢染方彰淨法之名所治之垢既亡能治之淨何立如無慳貪布施亦遣等則知若理若智若因若果一切行位諸對治門悉皆不有垢淨並無故曰雙亡故心經云無無明亦無無明盡等一切清淨者此淨與上淨字不同上即對染之淨此名真空曰淨以聲聞怖空故言清淨清淨即空義也大般若中或則云空或言清淨然萬法雖多不出心境恐收不盡又約垢淨重明斯則是法皆攝竟無所遺故言一切也故大般若云善現般若波羅蜜多清淨故色清淨乃至諸佛無上菩提悉皆清淨又非謂泯却心境顯真心了然後亡垢淨顯真空此乃文家成隔句對若欲順義應云心境齊泯垢淨雙亡一切清淨即是真心理則明矣謂真心之中本無心境垢淨等法名之為空非謂無於心法成於斷滅故唯識頌云初即相無性次無自然性後由遠離前所執我法性此諸法勝義亦即是真如常如其性故即唯識實性然此與前迷真習妄正為翻對若無前意焉起此文二顯瑞彰會二初顯瑞二彰會初顯瑞疏三千瑞煥記疏三千下二顯瑞彰會三千即三千大千世界如下所明瑞即祥瑞煥明也佛說此經之時放大光明照三千界靡不煥然復現種種奇異之事有此祥瑞故云三千瑞煥故大般若經第一云爾時世尊於師子座上自敷尼師壇結加趺坐入等持王三昧安詳而起一一身分各放六十百千俱胝那庾多光各照三千大千世界乃至云令此世界六種變動盲者得視聾者得聞等又云其諸天人佛神力故各見於佛正坐其前咸謂如來獨為說法二彰會疏十六會彰記十六會彰者然般若類有八部謂大品小品放光光讚道行勝天王文殊問金剛唐譯六百卷二百七十五品總一十六分前五無名後十一分有名前六分品後十不分品即初分七十九品第二分八十五品第三三十一品第四二十九品第五二十四品第六勝天王般若分一十七品第七曼殊室利分第八那伽室利分第九能斷金剛分第十般若理趣分第十一施波羅蜜多分十二淨戒十三安忍十四精進十五靜慮十六般若即大明度無極經四卷同前五分濡首菩薩無上清淨分衛經二卷即第九分實相般若即第十分道行小品各十卷同第四分光讚十卷放光三十卷大品三十卷皆同第二分然上諸本開合大部文勢次緒事理一一皆同但廣略之異唯仁王一本不在八部之中二別示今經二初略標指二廣序讚初略標指疏今之所傳即第九分記疏今之下二別示今經二初略標指如文二廣序讚二初序歎幽玄二引文結顯初序歎幽玄二初具序一經詮旨二結歎四法幽玄初具序一經詮旨三初正敘二反顯三順結初正敘二初就本經以敘歎二約二論以敘歎初就本經以敘歎二初敘詮旨以歎經二舉慧福以彰相初敘詮旨以歎經疏句偈隱略旨趣深微記二廣序讚二一序歎幽玄二一具序一經詮旨三句偈下一正序句有文句義句今通此二偈謂積句所成亦通此二隱謂潛隱即現在無文如經中多無所斷之疑文及其住名略謂少也即現雖有文而不廣故如經中唯有能斷之文及有住義旨謂意旨趣謂旨之所歸徹理曰深難覺曰微難覺有二意一為文隱略故義趣難覺二為徹理故甚深難覺然隱略深微之相即下所云二舉慧福以彰相疏慧徹三空檀含萬行記慧即返流淨用約斷執觀空得名般若正翻云慧不云智也下釋題中廣辨體相三空者即我空法空俱空也如下經云無我相人相等即我空也我相即是非相等即法空也離一切相即名諸佛是俱空也二空可知俱空有三說一別觀人法名二空同一剎那雙觀人法曰俱空二即二執既遣二空亦遣名俱空三即能所遣時慧亦無住即與本性相應此時自無人法二相及非法相等名俱空徹謂透徹慧是能徹三空是所徹般若照時透過三空之表即與本源相應以本心源非空非有為對人執方說人空為對法執方說法空為對二執方說俱空即空是能對執為所對所對之執既遣能對之空亦除空執兩亡方契本性若住空境未曰相應所以疏中特言慧徹由是四加行位菩薩為取空相不名見道故唯識偈云現前立少物謂是唯識性以有所得故非真住唯識今既徹於空相能所兼亡即同唯識見道頌云若時於所緣智都無所得爾時住唯識離二取相故檀含萬行者梵音檀那此云布施含謂含攝萬行即菩薩所行之行不唯於萬今舉大數耳以布施含於三施三施該於六度六度包於萬行以本望末故曰檀含萬行也所以佛答修行唯言布施故彌勒頌云檀義攝於六資生無畏法此中一二三是名修行住二約二論以敘歎二初約無著論顯位二約天親論斷疑初約無著論顯位疏住一十八處密示階差記住一十八下約二論以敘歎準無著論中從佛正說已下乃至經終分為十八住處謂第一發心住乃至第十八上求佛地住即是修大乘行人從因至果安住之處密示階差者謂隱密示現行人修行入位階降差別之相以經中都無十八住名含有十八住義以不顯配故云密示前後淺深不同故云階差也然階差之相在下正宗文前疏文具明二約天親論斷疑疏斷二十七疑潛通血脉記斷二十七疑者準天親論從佛答三問畢便躡跡斷疑乃至經終二十七段謂第一求佛行施住相疑乃至第二十七入寂如何說法疑潛通血脉者潛謂潛暗通謂通流血脉者喻也以經中多分唯有能斷之語而無所斷之言由是文起孤然勢意斷絶及尋經旨皆有所因文雖不彰理且連貫以不明顯故曰潛通其猶人身血脉外雖不彰內宛流注約喻顯法故曰潛通血脉也此意見於逐段敘疑之文二反顯疏不先遣遣曷契如如記疏不先下二反顯不先遣遣者即反顯慧徹三空之義謂二執為所遣二空為能遣又二空為所遣俱空為能遣以俱空遣二空空病亦空故云遣遣如圓覺云應當遠離一切幻化虗妄境界由堅執持遠離心故心如幻者亦復遠離遠離為幻亦復遠離離遠離幻亦復遠離曷契如如者曷何也契合也如如者即上三空之表本源真性也二空破執執喪空明空病亦空方契本源真性也意云若不先遣遣即滯有滯空何能契合真如本性然此語勢亦是御注序文彼云咸歸遣遣之旨盡入如如之妙三順結疏故雖䇿修始終無相記疏故雖下三順結如經中度四生即是䇿修無生可度即是無相行六度即是䇿修不住相布施等即是無相如是類例遍於經中然度生修行合是有相今以無生可度無住布施無法可說無我修善故順經宗無相之義一經前後無不談此故曰始終又因心果心咸皆如是斯則正䇿修時無相正無相處䇿修非謂前後始終皆爾二結歎四法幽玄三初正結歎二示難了三彰謬解初正結歎疏由斯教理皆密行果俱玄記疏由斯下二結歎四法幽玄三一正結歎若據前正敘歎中約教義分能詮所詮今於所詮之中別開行果即四法足矣然教密如前句偈隱略理密如前旨趣深微行果二玄前文未顯故宜別明行玄者夫菩薩行不出二種謂隨相行離相行也隨相即同前䇿修離相即同前無相玄者妙也若二行抗行或先或後不名為玄二行同時不相妨閡乃名為玄若唯隨相即同凡夫若唯離相即同二乘二行相資宛符中道即觀空而萬行沸騰涉有而一道清淨是菩薩行矣果玄者果即佛果也此中佛果總有二種所謂真身應身應身有相真身無相玄者若二身各異相無相殊不名為玄以相即無相無相即相真應無閡故曰玄也所以經中若以相觀佛則是人行邪道不以具足相發心則墮斷滅以此真身應身不一不二故使然也由斯者因此也即正指說此一卷經是密是玄也此則結指前文之所明標為後說之所以也二示難了疏致使口諷牛毛心通麟角記疏致使下二示難了致遂也使令也由前四法幽玄之故遂令諷誦甚多而解者極少口諷即讀誦其文也牛毛喻其多也妙解經意乃名心通麟者瑞獸君聖則現角者麟唯一角喻悟者少也此有兩重相望以論多少謂麟比牛而已少角比毛而又少意謂讀誦者多中之多通悟者少中之少三彰謬解二初不符聖旨二正是邪謬記疏或配下三彰謬解前四句即但不符聖旨別作意度不得圓暢雖非邪僻亦名謬解後二句胸談臆注正是邪謬前言心通者少不通者多此之三類即是不通之相也初不符聖旨二初乖宗二迷派記此前兩家皆先敘因然後結過初乖宗二初敘因二結過初敘因疏或配入名相記配入名相者謂有疏將法相名句配入其中二結過疏著事乖宗記此則貪著其事好尚法相也如下經云凡夫之人貪著其事乖宗者以經宗無相真空既以法相解之寧契經旨以不順理名之為乖二迷派二初敘因二結過初敘因疏或但云一真記但云一真者但猶獨也以聞說此經是空無相宗則首末作離心離境空無相道理一味銷釋故云一真二結過疏望源迷派記望源迷派者望謂瞻望源謂水生之處也迷謂昏迷派謂流派路分曰岐水分曰派意云此經雖宗無相而文義千差今雖符大底宗源而全乖差別義理故云望源迷派已斯言乃是曉公起信序文今雖用之而意異彼彼則以一心為源隨緣生滅為派此則以經宗為源義理為派故不同也二正是邪謬疏其餘胸談臆注不足論矣記其餘等者前則各有一長此乃都來邪僻前則依人依教此乃率意推胸率爾疏謬之言放曰胸談臆注不堪採覽置之言外故云不足論矣就中此釋字內偏多疏主云豫久志斯經遍詢諸疏親見數十本或假託金剛藏或云志公或云傅大士或云達磨或云五祖或題自名皆好紙好墨裝飾甚華其中文義總不堪採如釋舍衛國云衛者百靈衛護舉一例諸首末皆爾苟有無眼愚人不能甄別寶為至妙誠可悲哉故云胸談等記若將源派約迷不迷前後相望有其四句一迷源不迷派即配入名相者二迷派不迷源即但云一真者三源派俱迷即胸談臆注也四源派俱不迷即不不攻異端是此疏也二引文結顯疏河沙珍寶三時身命喻所不及豈徒然哉記疏河沙下二引文結顯河沙珍寶者即經云如恆河中所有沙有如是等恆河是諸恆河沙寧為多不乃至此福德勝前福德三時身命者即經云須菩提若有善男子善女人初日分以恆河沙等身命布施乃至何況書寫受持讀誦為人解說喻所下有二意一即於此內外二財喻之不及二即如下文云我念過去無量阿僧祗劫於然燈佛前乃至譬喻所不能及含茲二意故云喻所不及豈徒然哉者豈者可也徒者空也意云可空如此也意謂此經句偈隱略旨趣深微尋波討源卒難得意儻悟玄理隨分受持得福德多不可思議既若如此非聖智不能造其源常情之流豈合措意此文意含兩勢一驗凡心不曉二驗持者福多也二述造疏意二初示疏論師承有據二示名題義意在下初示疏論師承有據二初示論師承斥他添削二示今述解不攻異端初示論師承斥他添削二初示論可宗二斥其違論初示論可宗疏且天親無著師補處尊記疏且天親下二述造疏意二一示疏論師承有據二一示論師承斥他添削梵語提婆盤豆此云天親是地前四加行位菩薩即無著弟也無著梵語阿僧佉是初地菩薩即天親兄也補處即彌勒菩薩見在兜率天上次補佛處號曰當來下生彌勒尊佛以二菩薩依稟彌勒菩薩偈頌造論解經故云師補處尊下懸談廣明二斥其違論疏後學何疑或添或棄記後學下斥其違論即無著天親之後製疏之者也何疑者責辭也添即前云配入名相者於本論外加以大小乘法相行位故云添棄即前云但云一真者棄却兩論別自解釋也不知彼人云我勝菩薩為復不知菩薩所造論耶若言不是我勝菩薩亦非不知造論但以志道參玄忘言取意截徑修進不務枝流誰有心力尋於論文者即應責之曰尋論釋經則推無心力推胸率意心力何多且者約截之辭以不論所餘截徑而斥意云今不論你有理無理且論主是入位上流復從彌勒所受義句此蓋佛佛相傳展轉師授你之後學何得固違而自率意耶一是凡聖愚智懸隔二是師父之言背智率愚悖師無禮如父有所作子乃故違豈合天道耶故此引師以斥也二示今述解不攻異端二初對非顯是二出其因由初對非顯是疏故今所述不攻異端記疏故今下二明今述解不攻異端今初兩句對非顯是故今者由菩薩展轉相授所以今之述作不攻異端攻謂攻擊異謂別異端即端倪即顯諸家却是異端也故云對非顯是故論語云攻乎異端斯害也已注云善道有統故殊塗而同歸異端不同歸也二出其因由疏疏是論文乳非城內記疏是下二句出其因由既用本論釋經不攻異端明矣乳非下引經喻涅槃第十云復次善男子如牧牛女為欲賣乳貪多利故加二分水轉復賣與餘牧牛女彼牧牛女得已復加二分水轉賣與近城女人彼女得已復加二分水賣與城中女人彼女得已復加二分水詣市賣之時有一人為子納婦當須好乳以待賓客至市欲買是賣乳者多索價數是人答言汝乳多水不直爾許之直今我贍待賓客是故當取取已還家煮用作麋而無乳味然於苦味中千倍為勝何以故乳之為味諸味中最善男子我涅槃後正法未滅餘八十年爾時是經於閻浮提當廣流布是時當有諸比丘抄略是經分作多分抄前著後抄後著前前後著中中著前後雜以世語錯定是經令多衆生不得正見如彼女人展轉賣乳乃至成麋而無乳味然彼經意以喻涅槃此借用之以喻般若此中城內之言語稍漫通今取最初新搆之乳未加水者以為喻也或曰此中豈無疏主自語應同添水乳耶答不然雖有自言但是連合前後或引文之端皆從本義而非添也二示名題義意在下疏纂要名意及經題目次下即釋無煩預云記疏纂要下二示名題義意在下諸家至此皆略判經題今務簡削繁下文委釋三解本文二初偈文歸請二開章正釋初偈文歸請二初歸敬三寶二祈願利生記三解本文二初偈文歸請將欲製疏恐未上符下合故歸請也意云法華經說假使滿世間皆如舍利弗盡思共度量不能測佛智聖智尚難圖度凡心豈可測量由是祈請加護冀無紕繆於中前三句歸敬三寶後一句祈願利生初歸敬三寶二初能歸至誠二正舉三寶初能歸至誠疏稽首記初二字能歸至誠稽者稽也首即頭也尚書云稽首拜手注云稽首謂首至地也拜手首至手也今則屈頭至地稽留少時表敬之甚也又禮有三種謂下揖中跪上稽首今則上禮表無慢心然能歸之人必具三業表佛有天眼天耳他心知故謂以身業歸表佛有天眼見以口業歸表佛有天耳聞以意業歸表佛有他心知又圓滿三業善故成就三輪因故以未歸三寶之前三業悉皆不善今歸三寶故三業皆善也三輪者謂神通輪記心輪教誡輪因中身業歸果獲神通輪因中口業歸果獲教誡論因中意業歸果獲記心輪據此即三業是因三輪是果三輪之因依主釋也今言稽首即當身業但舉身業餘者自具謂稱三寶名及述所為事即口業也心不虔誠寧肯歸禮即意業也二正舉三寶三初佛寶二法寶三僧寶記牟尼下正舉三寶謂佛法僧為福之田三皆可寶故云三寶帶數釋也然有三種一住持即塑畫等像佛也三藏教文法也五衆和合僧也遵守遺言任持像法名曰住持二別相者佛即三身法即教理行果僧即二乘菩薩三同體者覺照名佛軌持名法和合為僧於中復有本性觀行融通之異皆一法上說之故云同體於上三中今所歸者即別相也五教之中當其始教以此經屬始教故今但取當宗之中能說般若為佛所說般若為法發起流通者為僧故非餘教初佛寶疏牟尼大覺尊記牟尼下佛也梵音釋迦牟尼此云能仁寂默能仁故不住涅槃寂默故不住生死又寂者現相無相默者示說無說此則即真之應也大覺者覺即是佛大揀餘聖餘聖雖覺未名為大二乘偏覺菩薩分覺皆非大也唯佛如來一覺永覺無所不覺如大夢覺如蓮華開逈超群聖故獨稱大尊者具上九號為物所尊下文廣辨二法寶疏能開般若三空句記能開下法也於中能字屬佛開字通佛及法謂在佛為能開在法為所開般若三空句五字唯局法也然於此中具教理行果般若果也以是到彼岸慧故三空理也句即教也理果合論行也以慧照理是菩薩行故三僧寶疏發起流通諸上士記發起下僧也發起上士即須菩提因興三問故佛說之流通上士即是彌勒無著天親也邐迤解釋方始弘傳上士者高上之士也或曰上人故馬鳴菩薩讚無常經歸敬偈云八輩上人能離染或云大士故大雲疏云如斯大士皆歸命斯皆通用故隨人稱二祈願利生疏冥資所述契群機記疏冥資下一句祈願利生也冥暗資助也所述即此疏也契合也群機即一切衆生也然資助加護有二種一即顯加謂現身說法有所見聞二即冥加但得智力無所視聽今於二中唯求冥加也以製疏釋經唯藉智力但得冥助不須見聞以此經云若以色見聲求是行邪道為順此教故不求顯然凡所設教皆契理契機今不言契理者以疏是論文已契理故又疏主於二利中利他偏甚今唯言契機者悲增之相也二開章正釋二初標列章門二依章正釋初標列章門疏將釋此經未入文前懸敘義門略開四段第一辨教起因緣第二明經宗體第三分別處會第四釋通文義記將釋下二開章正釋既蒙加祐心通智明約義開章遂申經旨文二初標列章門將猶欲也此依崇聖寺塵外疏唯開四門若準大雲疏中即開六門一明經意二明宗旨三明經體四辨譯時五解題目六釋經文今雖四門含六門義謂此第二攝彼二三第四攝彼五六其餘單攝但小異耳二依章正釋四初辨教起因緣二明經宗體三分別處會四釋通文義初辨教起因緣二初總論諸教二別顯此經初總論諸教二初通赴機緣二克就佛意初通赴機緣疏初中二初總論諸教謂酬因酬請顯理度生也記二依章正釋二初總論諸教如多藥共治一病二別顯則如一一藥各有功能也初中二初通赴機緣酬因者酬謂酬報因謂因地以佛於因地初發心時希求無上正等菩提遂啓四弘誓願煩惱無邊誓願斷法門無邊誓願學衆生無邊誓願度佛道無上誓願成於此四中三願皆畢唯一未圓誓度衆生衆生宛在今雖證果不捨因門現身說法濟度群品以報先願故曰酬因故法華云我本立誓願欲令一切衆如我等無異如我昔所願今者已滿足化一切衆生皆令入佛道酬請者佛初成道梵王帝釋等請轉法輪故法華云爾時諸梵王及諸天帝釋護世四天王及大自在天并餘諸天衆眷屬百千萬恭敬合掌禮請我轉法輪如來默然受請既受其請故始於鹿苑終至鶴林四十九年說諸經教救度衆生故法華云即於波羅奈轉四諦法輪等也顯理度生者此二相從合說然有通別通則佛以一音演說法衆生隨類各得解別則說四諦法顯生空理度凡夫外道說六波羅蜜顯二空理度不定性二乘及利根凡夫令入大乘道說一乘法顯法界理度定性不定性二乘及地住菩薩并上上利根凡夫令入一乘究竟佛道二克就佛意疏若據佛本意則唯為一大事因緣故出現於世欲令衆生開佛知見等記若據下二克就佛意唯為一大事等者法華經具云諸佛世尊唯為一大事因緣故出現於世舍利弗云何名諸佛世尊唯為一大事因緣故出現於世諸佛世尊欲令衆生開佛知見使得清淨故出現於世乃至欲令衆生入佛知見道故出現於世準天長疏解云佛之知見非三非五故云一廣博包含故云大諸佛儀式說此化生故云事衆生有此機能感於佛曰因佛即應之曰緣故者所以義由此一大事因緣所以佛出於世開示悟入者此之四句不出於二初二句能化後兩句所化能化有二謂大開而曲示此屬於佛所化亦二謂始悟而終入此屬衆生若準法華論釋開者雙開菩提涅槃二無上果示者別示法身顯三乘同體悟者知義別指報身二乘不知說令知故入者因義修因契入故華嚴疏主解云開者開除惑障示者示真實理悟者悟妄本空了心體寂只令悟上真理入者冥於心體石壁解云一切衆生皆有佛性大開也指云心中了了分明是佛性曲示也斬新領解決定印可不疑始悟也一切念想都亡終入也諸家解釋旨趣不同白璧黃金各為至寶二別顯此經二初總標二別列初總標疏後別顯此經五記疏後別顯者近指一卷金剛遠關諸部般若以同宗故意明有何所以說無相經於中五段具列如疏二別列五初對治我法二執二遮斷種現二疑三轉滅輕重二業四顯示福慧二因五發明真應二果初對治我法二執三初標二釋三結初標疏一為對治我法二執故記初中三初標對治者如病設藥義見序中我執者有二一凡夫情計我即執五蘊總相以為主宰二外道神我即蘊離蘊或大或小幽靈神聖動用難思皆計為實故云我執計一切法實有體性名為法執然佛說小乘已除我執今說般若重為此者蓋深必該淺也由是正除法執兼明我空也二釋二初總標由執起障二別示二障過患初總標由執起障疏由此二執起煩惱所知二障記由此下二釋二初總標由執起障煩惱即根隨等此依我執而起如前逐妄中說所知即根本無明也故起信論云無明義者名為智礙即所知障也此依法執而起二別示二障過患二初煩惱障二所知障初煩惱障疏由煩惱障障心心不解脫造業受生輪轉五道記由煩下二別示二障過患二初煩惱障心不等者心本清淨自在功德妙用過於塵沙良由此障覆蔽不得顯現故云心不解脫解脫者自在義不唯令心不解脫復能造業潤業業即善惡不動業也以有業因必招果報即受生也受生之處所謂五道生而復死往而又來故云輪轉輪轉之相已如序中綸輪義也反推其源即是我執故知我執是過患根本故要除之二所知障疏由所知障障慧慧不解脫不了自心不達諸法性相縱出三界亦滯二乘不得成佛故名障也記由所知下二所知障慧不等者此即大乘深慧不論小乘淺慧此慧若發照見五蘊皆空唯是心性離自心外無別有法今為無明覆蔽不得開發故華嚴云若不了自心云何知正道彼由顛倒慧增長一切惡不達等者然諸法性相有別有通別則如水以濕為性以動靜為相等通則諸法同以無為為性有為為相由無是慧故不能了之然了心即根本智了性相即後得智二智不顯蓋由無明無明不除不成佛法故云縱出三界亦滯二乘等斯則雖出火宅猶止化城不到寶所若反推其本由於法執將知法執是過患根本也記然此二障非謂抗行皆由一心所為但微著有異所知則細煩惱則粗粗細雖殊都無別體猶如一水起動成波微著有異於中亦有二義才動則不能現像同彼所知猛盛則覆舟溺人況於煩惱法喻相對昭然可見記又心慧解脫約人料揀以成四句謂心解脫慧不解脫二乘也心不解脫慧解脫大悲菩薩也俱解脫佛也俱不解脫凡夫也三結疏二執若除二障隨斷為除二執故說此經記疏二執下三結以前推窮一切過患根本是其我法二執二執若遣二障即除二障若除則諸過自滅由是過患之源即其二執為除二執故演斯經故知此經是大良藥故心經云般若波羅蜜多是大神呪是大明呪等乃至云能除一切苦真實不虗欲知此經除二執者如經云無我相人相衆生相壽者相是除我執也無法相亦無非法相是除法執也如此類例遍於經中二遮斷種現二疑二初標二釋初標疏二為遮斷種現二疑故記疏二中二初標可知二釋二初正釋二指經初正釋疏遮未起種子之疑斷現起現行之疑記二釋疑者於理於事猶豫不決即心所法中煩惱一數然有二種一種子二現行種子謂蘊在藏識未顯發者名為未起現行謂動之於心或形之於口名為現起遮則遮其種子不令起於現行斷則斷於現行即自除其根本其猶築堤防水傾津潑𦦨其義可見二指經疏即經中答所問已便躡跡節節斷疑乃至經終二十七段記即經下指經也然準經即答三問已展轉而斷起復連環故云節節至二十七然遮斷之言總有兩意一則經中有須菩提陳疑處是現行即第二第十一第十九餘無問辭皆種子也二即當時盡是現行望於後代總名種子斯則斷現行時即是遮種子也然二意中後意稍切故二十七疑皆言斷而不言遮也三轉滅輕重二業二初標二釋初標疏三為轉滅輕重二業故記疏三中二初標二釋疏轉重業令輕受滅輕業令不受記二釋然泛論業有三種謂善惡不動受有三時謂現生後若今世造善惡今世受苦樂者名順現報業若今世造善惡次生方受名順生報業若今世造善惡從第三生已去乃至百千生方受名順後報業今世有人造善惡業目下無報便疑無因果者良由不達此三時報也故佛名經云行善之者觸事轗軻行惡之者是事諧偶致使世間愚人謂之善惡不分我經中說有三種報如上所敘今言轉滅者三中唯轉惡業以違理故時則通三然此惡業受報準小乘宗說有定不定如初篇四重名為定業僧殘已下名不定業以此對時應成四句謂時定報不定報定時不定俱定俱不定若此經說者則不然以未入我法名決定業若入我法名不決定業所言不定者或輕或重或受或不受也問若然者何以大般若中云唯除決定業應受報耶答但轉重成輕非令不受故無違也如此經云若有人受持讀誦此經為人輕賤者是人先世罪業應墮惡道以今世人輕賤故先世罪業則為消滅當得阿耨菩提言先世者有二意一前生之前名為先世二未持經前名為先世雖通此二後義為正也今以三塗之業用輕賤代之令報不定生報現償令時不定此皆轉重令輕也其滅輕不受經則無文經雖無文義乃合有然有兩意一者以重況輕意云重業既轉之令輕輕業故宜不受二則曾墮三塗之者出在人中猶有餘業即貧窮諸衰等苦令既不墮三塗則餘業必免亦是時報俱不定也四顯示福慧二因三初標二釋三結初標疏四為顯示福慧二因故記疏四中三初標二釋二初未說失為凡小二已說得為佛因初未說失為凡小疏佛成正覺未說般若之前衆生由無妙慧施等住相皆成有漏或滯二乘記二釋二初未說失為凡小佛成正覺者即菩提樹下三十四心斷結五分法身初圓示成正覺也未說等者即成道之後十二年以前但說人天因果及四諦緣生未說三空般若無妙慧者妙慧謂無相甚深般若也此是法空之慧以未說般若未顯法空故無此慧也施等住相者等於戒忍等四住於我人衆生等相及住法非法相也既住我法等相則成世間因果故皆有漏也此說凡夫依人天教者或滯二乘者設有斷惑證真不無厭苦欣樂縱出三界亦墮聲聞緣覺之地此依小乘教者若準凡夫兼無粗慧就勝通說故言無妙慧也二已說得為佛因二初順釋二反顯初順釋疏故談般若顯示妙慧為法身因五度為應身因記疏故談下二已說得為佛因二初順釋即十二年後說諸部般若之教詮顯妙慧妙慧即第六般若波羅蜜以法身是真如妙理本不生滅但以煩惱覆之名如來藏若妙慧照破煩惱真理顯現成大法身故說妙慧為法身因也五度等者五度即施戒忍進定應身即三十二相八十種好紫磨金色之體也此由積習五波羅蜜之所感得故言五度為應身因二反顯疏若無般若則施等五非波羅蜜不名佛因記疏若無下二反顯非波羅蜜等者雖行施等由無慧導皆成住相由住相故便成有漏但成世間善因樂果故非佛因也故菩提資糧論云施戒忍進定及此五之餘皆由智度故波羅蜜所攝三結疏故須福慧二嚴方成兩足尊矣記疏故須下三結福慧屬因即五度六度是能嚴也兩足是果即真身應身為所嚴也然諸佛果德雖無量無邊以要言之不過此二故法華云如其所得法定慧力莊嚴以此度衆生自證無上道大意謂由無般若致使施等非波羅蜜不成佛因故須福慧二嚴乃成兩足妙體然前五與第六互相資助以真應二果必須具故其猶膠青彩色彩非膠而不著膠非彩而無色六非五而無相五非六而無因如經云應無所住即修慧也行於布施即修福也又以無我無人無衆生無壽者即修慧也修一切善即修福也此例甚多五發明真應二果三初標二釋三結初標疏五為發明真應二果故記疏五中三初標真應二果者然諸經論皆說三身此中唯明二者已合攝故言三身者即法報化如權宗所說法身是理無漏無為報身是智轉識所成有為無漏雖證於理智且非理如日舍空由是理智分為二也化身是影固宜不同由此說佛有三身也今言二者法報合故以智即是理如光即珠是故合說為真身也如淨名經云佛身無為不墮諸數豈言報體是有為耶又涅槃經云若人言如來同有為者死入地獄是故此中不說於三但言二也故智論云佛有二身一真身二應身亦云生身應身皆化身也問法報化等皆是佛身法報既其不分化體何故別說耶答法報皆實所以合論化體唯虗故宜別也二釋疏未聞般若之前但言色相是佛不知應化唯真之影不如實見真身應身記疏未聞下二釋謂十二年前小乘之人唯取三十二相金色之身以為真佛不知更有真佛故云但言色相不知下以未達法空故不知此相但是真身之中所現影像也故唯識云大圓鏡智能現能生身土智影既言是影則知非真故彌勒頌云應化非真佛亦非說法者不知等者若知真身是實應身是虗又了相即無相名為真身無相即相名為應身如是見者名如實見故華嚴云於實見真實不實見不實如是解法相是則名為佛若不如是名為不如實見三結疏故此發明二果令知由前二因證得記疏故此下三結發明二果者如經云如來說三十二相即是非相者發明真身也是名三十二相者發明應身也又云則非具足色身發明真身也是名具足色身發明應身也餘例此知二因等者真身由前慧因證得應身由前福因證得也前段中云故須福慧二嚴等即是約果說因今云故此發明等即是望因說果如是說者意令衆生修二種因證二種果也記然前五門展轉相躡謂說般若經本除二執故有第一二執雖遣兩疑猶存故有第二縱使無疑爭奈先業故有第三惡業既滅無漏因成故有第四因既昭然果證何遠故有第五由是一經大意極此五重矣二明經宗體二初總標別開二依開別釋初總標別開疏第二明經宗體二記疏明經宗體者宗即所詮體即能詮二依開別釋二初明經宗二明經體初明經宗二初標二釋初標疏初宗記今初宗者尊也重也心言之所尚也然言由於心故故肇公云情尚於空者觸言而賓無毛詩序云情動於中而形於言餘皆例此文二二釋二初統明諸教二別顯今經初統明諸教疏統論佛教因緣為宗記初統明諸教然此方古今教有三種淺深既異所宗亦殊一儒教主即文宣王謂孔丘也宗於五常仁義禮智信意以修身慎行理國理家揚名後代也二道教主即玄元皇帝謂老聃也宗於自然自然即融蕩是非齊平生死終歸虗無也三釋教主即釋迦也宗於因緣意令識迷破惑證真起用也是故疏云因緣為宗然一代佛教通宗因緣雖小乘生滅大乘無性淺深有異大約統論皆因緣也然有二種一世間二出世間世間有二一內二外外復有二一謂種子為因水土人時等為緣而芽得生又泥團為因輪繩陶師等為緣而器得成二內謂無明為因行支為緣而生識等五支及生老死二支前二器世間後一即有情世間故知成此三界世間只由因緣二字二者出世間有三種一則本覺內熏為因師教外熏為緣而始覺得生二始覺為因施等五度為緣而佛果得成三則大悲為因衆生為緣而應化得興故知出世間一切淨妙等事不出因緣二字故法華云佛種從緣起是故說一乘中論云未曾有一法不從因緣生又云我說是因緣能滅諸戲論然統收世出世間一切諸法有義空義假義中義雖淺深不同皆墮因緣也言有者有生有滅也謂諸法緣會而生緣離則滅如馬勝比丘為舍利弗說偈曰諸法從緣生緣離法即滅如是滅與生沙門如是說空者既屬因緣則知無體無體即空義也故中論云因緣所生法我說即是空假者如鏡像水月雖則不實緣會不得不現故淨名云是身如影從業緣現中者以假故非空空故非假非空非假即空即假名為中義故淨名云說法不有亦不無以因緣故諸法生又如中論都明有等四義云因緣所生法我說即是空亦名為假名亦名中道義即三乘教中所說空有中假等義並不出因緣故云佛教統宗因緣也二別顯今經三初約法正立二約喻釋成三約行結顯記疏別顯等者所謂通中之別隨何經中所宗各異如華嚴法界法華一乘淨名不思議真如佛性等也文三初約法正立初約法正立疏別顯此經則實相般若觀照般若不一不二以為其宗記然般若種類諸說不同準智度論說有三種一文字即能詮教二觀照即能觀智三實相即所觀境羅什後來開為五種謂於觀照中開出眷屬即隨行五蘊及暖等善根於實相中開出境界即俗諦境此五中唯觀照持業釋餘皆依主大雲解之五皆持業謂文字性空即般若故眷屬境界同文字故實相即是法身起信論云依此法身說名本覺故然雖三雖五三者為正何則般若所照皆實相故不唯真如故智論云照色等空即名實性性空實理離於顛倒非虗僞故於空見空亦名顛倒於空無著乃是實法色等虗僞誑人眼根故知但約不顛倒離虗僞便為實相則雙取真俗二諦為一實相也暖等眷屬是慧性故相應隨行俱觀照故故知觀照攝眷屬也由是雖則說三已攝於五既符智論必契深經故三為正然諸家立宗或唯觀照或唯實相此並未當且此經所詮一一離相豈唯觀照又教化衆生斷疑破執豈唯實相由是今疏雙取為宗不一不二者欲言其一體用有殊欲言其二寂照常俱故非一二二約喻釋成疏以即理之智觀照諸相故如金剛能斷一切疏即智之理是為實相故如金剛堅牢難壞記疏以即下二約喻釋成則顯雙取為正且本舉能堅能利一金剛以喻觀照實相二種般若若單取觀照則闕堅義若單取實相則闕利義又皆言即者釋成不二之相以照而常寂故理非智外寂而常照故智非理外既離理無智離智無理故如金剛即堅即利三約行結顯疏萬行之中一一不得昧此是故合之以為經宗記疏萬行下三約行結顯謂菩薩行中必須具此若昧實相則難亡分別便成住相即墮有漏若昧觀照則闕智用便滯偏空同於二乘故須二事兼行方契中道此則如前行玄之義也由是起信論中止觀合說法華經內定慧莊嚴華嚴明定慧二事菩薩依賴涅槃顯定慧不等不見佛性諸教中說無明邪見自此而生故華嚴疏云萬行忘照而齊修頓漸無礙而雙入皆此義也二明經體二初標二釋初標疏二體二釋三初標立二正釋三總結初標立疏文字般若即是經體記二體分三初標立可知二正釋二初明具四法二明攝所詮理初明具四法疏文字即含聲名句文記文字下二正釋或曰諸家所出教體皆取聲名句文或通取所詮之法今何單取文字耶由是疏云文字即含聲名句文此明具四法也聲即言音名句文三即聲上屈曲表示名詮諸法自性句詮諸法差別文即是字為二所依也問四法之中文字最居其末云何攝聲等法耶答所以能攝者有二意一能顯文字有其三處謂心上顯即意識境聲上顯即耳識境色上顯即眼識境今取初者故能攝之二有聲未必有名句文有文則必有聲名句前前未必有後後後後必有於前前如苗必有根根未必有苗也以是義故故攝聲等二明攝所詮理疏文字性空即是般若無別文字之體記文字性空下明攝所詮理也謂依於般若顯乎文字文字本空即是般若無別文字體也然有二意一體屬緣生無自體故二非別有一法為文字體故此皆意顯般若是文字體也其猶鎔金成像像即是金也三總結疏故皆含攝理無不盡統為教體記疏故皆下三總結含攝之義如上所明能所總該故言理無不盡此乃文字則該能詮盡般若則該所詮盡詮旨既備故云統為教體三分別處會二初總標別開二依開別釋初總標別開疏第三分別處會二記疏分別處會文二二依開別釋二初總明佛說大部處會二別明傳譯此卷時主初總明佛說大部處會二初標二釋初標疏初總明佛說大部處會二釋二初總示大部二別顯此經記初中二初總示大部此經下二別顯此經初總示大部二初總標二別列初總標疏六百卷四處十六會說二別列疏一王舍城鷲峰山七會山中四會山頂三會二給孤獨園七會三他化天宮摩尼寶藏殿一會四王舍城竹林園白鷺池側一會二別顯此經疏此經則二處第九會第五百七十七卷記總可知二別明傳譯此卷時主二初標二釋初標疏後別明傳譯此卷時主二釋三初正明東土翻譯前後二因辨西方解釋異同三示今科判依據差別初正明東土翻譯前後二初通辨諸譯二克示所傳記疏別明中文三初正明東土翻譯前後二初通辨諸譯初通辨諸譯二初總標二別列初總標疏前後六譯二別列二初列別名二顯通號初列別名疏一後秦羅什二後魏菩提流支三陳朝真諦四隋朝笈多五唐初玄奘六大周義淨記流支者天平二年於洛陽譯成十四紙名金剛般若真諦太康元年於金陵郡譯成十四紙名金剛斷割笈多開皇十年於洛陽譯成十六紙名金剛斷割玄奘貞觀二十二年於玉華宮譯成十八紙名能斷金剛義淨證聖二年於佛授記寺譯成十二紙名能斷金剛二顯通號疏上六人皆三藏二克示所傳疏今所傳者即羅什弘始四年於長安草堂寺所譯記疏今所下二克示所傳二因辨西方解釋異同二初明偈受授二明論異同初明偈受授二初稟受彌勒二轉授天親初稟受彌勒疏天竺有無著菩薩入日光定上升兜率親詣彌勒稟受八十行偈記疏天竺下二因辨西方解釋異同二轉授天親疏又將此偈轉授天親記轉授天親者有說云以天親久習小乘近從大教要滌情執故轉授之二明論異同二初天親斷疑執二無著顯行位初天親斷疑執疏天親作長行解釋成三卷論約斷疑執以釋二無著顯行位疏無著又造兩卷論約顯行位以釋記斷疑執顯行位正宗文中可見三示今科判依據差別二初正明科釋所依二結成立題所以初正明科釋所依二初天親無著二餘論諸疏初天親無著疏今科經唯約天親釋義即兼無著記疏今科下三示今科判依據差別二初正明科釋所依兼無著者以顯此疏正依天親傍用無著二餘論諸疏疏亦傍求餘論採集諸疏記餘論諸疏義見開題處二結成立題所以疏題云纂要其在茲焉記疏題云下二結成立題所以不同淨名集疏備書四聖之名義即如何晏集解論語於孔安國馬融等注中當者用之不當者翦之今疏亦爾或雙取以各有理或共成一義故兩存焉
