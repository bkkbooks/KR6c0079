body:
  text: 唐圭峰大師疏宋長水大師記後學古杭雲棲釋大科會二十五斷法身化身一異疑疏二初標章敘疑二依經斷疑初標章敘疑三初標章二指疑起處三懸指斷疑之意初標章疏二十五斷法身化身一異疑記第二十五論文於此不別敘疑而義意合有也初標章二指疑起處疏據前不可以化相比知法身法身無去來坐臥即似真化異據遮斷滅之念又顯不失福相即似真化一故成疑也記據前下指疑起處此從三處來不可以化等者第二十二也濫於輪王故法身無來去等者二十四也斥為錯解故據遮下二十三也不失等者彌勒頌云得勝忍不失一異相反難為存去故成疑矣三懸指斷疑之意疏此約微塵世界委釋非一非異義以斷此疑疏此約下懸指斷疑之意彼約一異雙存而難此據一異俱非而通也二依經斷疑二初標科二分釋初標科疏斷疑之文二二分釋經二初約塵界破一異二約止觀破我法初約塵界破一異五初細末方便破粗色二不念方便破微塵三不念方便破世界四俱約塵界破和合五佛印無中妄執有初細末方便破粗色疏三初引天親約斷疑二引無著破執法三引大雲示破相疏初約塵界破一異五初細末方便破粗色須菩提若善男子善女人以三千大千世界碎為微塵於意云何是微塵衆寧為多不甚多世尊記破粗色經問答多少如文可知初引天親約斷疑疏偈云於是法界處非一亦非異記疏三初引天親約斷疑偈云下標也疏論云彼諸佛如來於真如法界中非一處住亦非異處住記論云下釋也一真法界數量消滅非一異故諸佛證此亦非一異而言處住者以非此二義可住著故疏為示此義故說世界碎為微塵故偈云世界作微塵此喻示彼義記為示下正顯住意意以界喻真身塵喻化身也塵因界碎故非異喻從真起應也塵細界粗故非一喻真實應假也二引無著破執法疏無著云為破名色身故說界塵等記無著下二破執法別是一義非斷疑也名身即受等四蘊色身即地等四大疏於中細末方便及無所見方便記於中下以細末破色身以無所見破名身無所見即不念也疏塵甚多者是細末方便記此段說塵甚多正是初方便三引大雲示破相疏大雲云即是析塵至於細末以此方便破粗色矣記大雲下三示破相明方便之相以能破是細末所破是粗色能所合之故成科名疏此言微塵依大乘宗於一摶色假想分析至極略色為塵非小乘宗實塵矣記此言下揀異大小大乘用觀假想分別起其慧數破析彼色一一分折至於極微二乘天眼所不能見此則細末之極不可破析名極略色非小乘等者以彼宗迷唯識理不達諸法即空計此微塵以為實有故說積諸微塵以成世界故俱舍論云極微微金水兔羊牛隙塵蚤蝨麥指節彼後增七倍等今此揀去故云非實塵也二不念方便破微塵疏二初約斷疑釋二約破法釋疏二不念方便破微塵何以故若是微塵衆實有者佛則不說是微塵衆記破微塵經意云以何義故說微塵耶釋意云以無實體故所以者何佛說微塵衆則非微塵衆是名微塵衆記又徵意云所以說微塵空又說微塵者何謂也釋意云佛所說者非實微塵是空微塵也初約斷疑釋疏論云塵碎為末故非一處塵衆聚故故非異處記疏二初約斷疑釋塵碎下喻說塵是碎世界為末也故界粗而塵細是非一也塵衆聚者世界是衆塵成故塵界非異也疏如是佛住法界中非一處住非異處住記如是下法合謂應現十方故非一同依一體故非異又依法起化故非一離法無化故非異二約破法釋疏又若塵衆實有者世間凡夫悉亦自知何須佛說秪為不知體不成就故佛說矣記又若下二約破法釋亦是約喻法說者若化是實亦不用佛說只為是虗餘人不知故佛說矣疏故無著云世尊說非者以此聚體不成就故若異此者佛雖不說亦自知是聚記無著下引證同此三不念方便破世界疏二初引本論斷疑二引無著破法疏三不念方便破世界世尊如來所說三千大千世界則非世界是名世界記破世界經意云非唯所起微塵是空微塵抑亦能起世界亦是空世界初引本論斷疑疏本論破世界不實之義可知記本論等者如次文所說二引無著破法疏無著云此破名身世界者衆生世界記衆生世界者有情世間也以心法無質不可分析故但以不念方便破之念之則有不念則無故起信云心生則法生心滅則法滅等也四俱約塵界破和合疏二初引天親解二引無著解疏四俱約塵界破和合何以故若世界實有者則是一合相如來說一合相則非一合相是名一合相記破和合經徵意云以何義故說世界耶釋意云世界是實則是一合佛說一合者非實有之一合是空無之一合初引天親解疏論云若實有一世界如來則不說三千界記疏文中引天親解論云下標也疏大雲云若實有一世界冥然是一一和合矣是則不合有多差別今既佛說三千明非冥然一矣故約三千破一界也記大雲下釋冥合也冥然合為一也一即和合故云一合矣三千破一者既言三千則非一義此乃通明五蘊無一合義二引無著解疏無著云為並說若世界若微塵界故有二種摶取謂一摶取及差別摶取記無著下二引無著解並說等者情器雙明也故有下且標二摶取疏大雲云此明塵衆及衆生類俱名世界記大雲下顯明情器俱名世界謂塵衆則器世界衆生則有情世界疏一合相者即是摶取摶取為一故云和合記摶取為一等者謂情器不分為一世界也疏故此一合有二摶取記此一合有二摶取於五蘊中分色心故本以合二為一今則開一成二然和合摶取蓋是一義但秦魏譯異耳疏一者一摶取即是世界和合為一記一摶取者是名身衆生世界義不可分但有一義故疏二差別摶取即是微塵有衆多極微名為差別記差別摶取者是器世界聚多微塵成一世界故故無著論云衆生世界有者此為一摶取微塵有者此為差別摶取疏非一合者第一義中二界無實故記二界無實等者故心經云是故空中無色無受想行識無眼耳鼻舌身意無色聲香味觸法等經是名一合相者約俗諦說有明在次文五佛印無中妄執有疏三初引天親解二引無著解三引大雲解疏五佛印無中妄執有須菩提一合相者則是不可說但凡夫之人貪著其事記妄執有經意云此一合相無體可說但為凡夫妄生貪著初引天親解疏論云以彼聚集無物可取記以彼下釋經中不可說也五蘊和合無實體故斯則界歸於塵則無界可取塵歸唯識則無塵可取四蘊離念則無心可取也疏虗妄分別故云妄取記衆生取著皆由虗妄分別故起信云一切境界唯依妄念而有差別此明經中但凡夫已下文疏若有實者即是正見記若有下反顯也以世界體若是實有不名虗妄分別合是正見二引無著解疏無著云世諦說摶取第一義不可說記世諦說者即前是名也同論云以彼聚集第一義不可說即前即非也同前無物可取疏彼小兒凡夫如言說取記小兒等者世諦雖說但是假有凡夫不敏執之為實猶彼小兒如言執物三引大雲解疏大雲云執見五蘊取其和合是貪著事記見五蘊者不了法空是法執也取和合者不達衆法即我執也二執不亡故名貪著其事也疏迷於事法起煩惱矣記迷於事法所知障也煩惱可知是依二執起於二障也二約止觀破我法經二初除我執二除法執疏二約止觀破我法二初除我執二初斥錯解記破我法者前破我法所緣之境令知不實今破能緣我法見心見心乃是所起分別今即破之令亡分別入聖道也故偈云非無二得道遠離於我法初除我執經二初斥錯解二遣言執初斥錯解須菩提若人言佛說我見人見衆生見壽者見須菩提於意云何是人解我所說義不世尊是人不解如來所說義記斥錯解經文問答並可知矣但不解必錯解也二遣言執疏二遣言執何以故記遣言執經徵意云以何義故說為不解世尊說我見人見衆生見壽者見則非我見人見衆生見壽者見是名我見人見衆生見壽者見記釋意云佛說我人等見非實我人等見是假名我人等見衆生不解謂之為實所以前科判云錯矣疏論云我見虗妄分別佛說即是不見記虗妄等者見有我故名為我見體實無故乃云虗妄虗妄無實元是不見如繩處見蛇豈是實見疏無著云此顯示如所不分別記如所下兩意一以真如為所如彼真如不分別故二以我法為所我法本無如所知故疏云何顯示記云何下徵疏如外道說我如來說為我見故安置人無我記如外道下釋人無我等者一法界中無我無無我今對有我說於無我權說假言說云安置疏又為說有此我見故安置法無我記法無我等者以見是心心所法執有此見名為法執心法不實故言安置此文破法我者是連帶引之非謂正意也疏如是觀察菩薩入相應三昧時不復分別記相應等者入地證如也不分別者離分別障也疏即此觀察為入方便記即此等者若存我法即分別無窮但了二空則自無分別即此二空觀為入理之方便也二除法執經二初除分別二顯本寂初除分別疏二初明無分別所依二正顯無分別理疏二除法執二初除分別須菩提發阿耨多羅三藐三菩提心者於一切法應如是知如是見如是信解不生法相記除分別經意云發菩提心者於一切法應如是知見信解不生法相初明無分別所依二初總徵三法二別釋第三初總徵三法疏無著云此顯示何人無分別於何法不分別何方便不分別記疏二初明無分別所依二初總徵三法記無著下節節以疏徵起以經答之何人等者即經中發菩提心者於何法者即經中一切法何方便者即經中應如是知見信解二別釋第三二初總標二別釋初總標疏此顯示增上心增上智故於無分別中知見勝解記此顯下二別釋第三二初總標記此顯下增上心即定也增上智即慧也皆是增勝上法故云增上知見勝解者定慧之後位二別釋二初總彰三義二轉釋後義初總彰三義疏於中若智依止奢摩他故知依止毗鉢舍那故見此二依止三摩提故勝解記於中下二別釋二初總彰三義記於中者於彼三事之中也若智等者明此三種體即是智但依止方便不同故立三名也奢摩他此云止止即是定智依此定併息萬緣唯心獨存故云知也毗鉢等者毗鉢舍那此云觀觀即是慧依此慧故觀察一切委細推求歷歷分明故名為見此二者知見也三摩提此云等持但以定慧等處名三摩提依此義故名為勝解言依止者名依義立也二轉釋後義疏以三摩提自在故解內攀緣影像彼名勝解記以三摩下二轉釋後義記自在者定慧無閡故內緣等者既未證真但緣影像以真如法離心緣故今既變影緣如但名勝解從此能引根本正智無分別中為近方便故二正顯無分別理疏云何無分別此正顯無分別記云何下二正顯無分別理即論釋經中不生法相初句徵起次句正顯疏大雲云前之方便是加行智今不分別是根本智即親證真如離能所取名不分別記大雲下約位釋論前方便等者即知見勝解此當地前四加行位今不分別者即不生法相通在十地及佛地也雖滿分不同皆用根本無分別智親證諦理也如唯識見道頌云若時於所緣智都無所得爾時住唯識離二取相故二顯本寂疏二顯本寂須菩提所言法相者如來說即非法相是名法相記顯本寂經意云所言法相非實有之法相是本無之法相疏無著云此顯示法相中不共義及相應義如前已說記不共者非法相也勝義諦中不容他故離性離相非和合故相應者是名法相也性起為相不離性故如前金中無器不離金也二十六斷化身說法無福疑疏二初標章敘疑二依經斷疑初標章敘疑五初標章二指疑起處三立理四指無化體五結成疑初標章疏二十六斷化身說法無福疑記第二十六論文於此不言斷別疑故雲外二疏皆攝入前段合疏詳文合有是故開之二指疑起處疏因聞真化非一非異記因聞下指疑起處此從二十五中來三立理疏意云若就非一化唯虗假若就非異又唯冥合歸一法身記意云下立理四指無化體疏即化身終無自體記即化身下指無化體五結成疑疏若爾即所說法受持演說無福記若爾下結成疑也意云能說之佛既虗所說之教豈實持說不實之教寧有福耶二依經斷疑疏二初標科二分釋初標科疏斷疑之文二二分釋經二初明說法功德二明說法不染初明說法功德疏初明說法功德須菩提若有人滿無量阿僧祗世界七寶持用布施若有善男子善女人發菩薩心者持於此經乃至四句偈等受持讀誦為人演說其福勝彼記功德經文較量可解阿僧祗此云無數發菩薩心者揀餘人疏偈云化身示現福非無無盡福記偈云下標疏論云雖諸佛自然化身作業記論云下釋先牒縱之疏而彼諸佛化身說法有無量無盡無漏功德記而彼下據理奪之無量下揀有量等斯則三重顯於持說之勝二明說法不染疏二初引無著解二引大雲解疏二明說法不染云何為人演說記不染經徵意云云何演說便獲如是功德不取於相如如不動記釋文可見前云發菩薩心者意在於此若非菩薩焉能如是初引無著解二初申經意一銷經文初申經意疏無著云為說法不染故以有如是大利益故決定演說如是演說即無所染記無著下初引解二初申經意記既說法之心如彼真如無有分別不取能所說相所獲功德利益至矣故決定說也無所染者即無分別不取不動也記此則正是斷疑之意謂佛所有說皆如真實傳授之人要皆如是既如其法福乃無邊何疑持說無福德耶記又如偈云諸佛說法時不言是化身以不如是說是故彼說正意云若言是化則人無敬心所說之法寧肯信受由不說故人皆宗奉所說之教咸悉受持無漏之福自然無量等二銷經文疏云何演說等者顯示不可言說故記云何下二銷經文記不可等者此明離於說相非全不說前云無法可說淨名無說無示是名說法故魏經云如不演說疏若異此者則為染說以顛倒義故記若異下反明以取相故有分別故不如如故既不如如即成顛倒疏又說時不求信敬等亦為無染說法記又說時下約事明無染前約不稱理今約不稱事夫說法者本為利生今為名利豈非染說二引大雲解疏大雲云若能不以生滅心行說實相法則如彼真如故曰如如記大雲下二引大雲解記生滅心行即有所得分別取相今既不以即與如合故曰如如上如即似義下如即真如似於真如故曰如知疏又心如境如故曰如如記心境如者即兩皆真如無似義也疏不動者則無染義記則無染者謂擬心即差便名為染故論云動即有苦果不離因此則微細念慮盡名為染不必貪欲二十七斷入寂如何說法疑疏二初標章敘疑二依經斷疑初標章敘疑三初標章二指疑起處三結成疑初標章疏二十七斷入寂如何說法疑記第二十七疏初標章二指疑起處疏論云若諸佛如來常為衆生說法記若諸下指疑起處此從二十六中來以化身如來常說法故前雖無文而有此意三結成疑疏云何言如來入涅槃記云何下結成疑也涅槃即是不動無為義如前文云若人言如來若來去坐臥即不解所說義如來者無所從來亦無所去故名如來斯則佛入涅槃也意云涅槃寂靜說法喧動動寂相反云何兩存二依經斷疑疏二初開章指文二隨章辨釋疏依經斷疑何以故一切有為法如夢幻泡影如露亦如電應作如是觀記經徵意云以何義故佛常說而不閡涅槃如論所敘釋意云由佛有妙智觀諸法空如夢幻等雖現說法似有為相而常住涅槃無作之理復何疑哉記若於論外不作斷疑釋者此文但責說法不染徵意云以何義故說法之時不取於相得合真如不動不染耶釋意云但觀諸有為相猶如夢幻等自然於說不取不著契合真如無有動搖分別等也初開章指文疏釋此文為三初約兩論釋魏本中九喻魏本云一切有為法如星翳燈幻露泡夢電雲應作如是觀記疏文二初開章指文魏本等者以彼此二經皆說譬喻就中彼廣此略今則標廣以釋二隨章辨釋三初約兩論釋魏本中九喻二約諸經顯諸虗假喻之大意三會通秦譯經本初約兩論釋魏本中九喻二初約本論斷疑二兼無著釋相初約本論斷疑疏於中文二初約本論斷疑記於中下二隨章辨釋三初約兩論釋魏本中九喻二疏偈云非有為非離諸如來涅槃九種有為法妙智正觀故記初文者偈云下標疏論云諸佛得涅槃化身說法故非有為非離有為記論云下釋初釋前二句真化不一故非有為真化不異故不離有為言諸佛者揀小乘涅槃一句寂滅如來涅槃悲智兼運名無住處疏何故示現世間而不住有為由妙智正觀有為如九喻虗假故記何故下躡前徵起釋後二句徵意可知由妙智等者妙智揀二乘粗智正觀揀凡夫倒見既以妙智正觀有為諸法如夢幻等故涉有而不住有觀空而不住空用而常寂寂而常用故終日說法終日涅槃如華嚴疏云寂寥於萬化之域動用於一虗之中也故知若不涉有豈名大乘涅槃若不證如何名無染說法言雖似反意乃相符善現約極違以申疑如來據極順以通釋理實深妙光茲末篇二兼無著釋相二初指論分文二隨文正釋初指論分文疏二兼無著釋相疏無著云此偈顯示四有為相文四記二兼無著下初指論分文此偈者魏經文也四有為者即下自性等四二隨文正釋四初自性相二著所住味相三隨順過失相四隨順出離相初自性相二初釋章意二別解文初釋章意疏一自性相此見相二用識為體生死根本故文三記初自性下二隨文正釋四初文二初釋章意此見等者謂見相二分以自證分為體然此三法是生死之自性一切生死從此而生故名此三為根本矣此通八識也二別解文三初星喻見二翳喻相三燈喻識初星喻見疏一星喻見無著云無智暗中有彼光故有智明中無彼光故記一星下二別解文三初文見分者雲云第六識也計度分別緣共相境世間諸智盡在其中故以星光況於此識此約執計強盛故獨指第六非不通八也記無智等者此中法喻相兼文猶闕略若具配屬即法喻四對謂以日喻智以星喻識以明喻悟以暗喻迷且如喻中意云無日暗中有星光故有日明中無星光故法中無智迷中有識用故有智悟中無分別故其猶昏夜日光黯然唯星獨存略辨南北杲日才現星光自沈法中亦爾生死迷中本智未顯意識分別似有鑒覺若智顯彰光明遍照分別念慮泯然無餘無彼光者此約分喻喻中但無星光而不無星體法中融同一智無別識心故二翳喻相疏二翳喻相論云如目有翳則見毛輪等色觀有為法亦爾以顛倒見故記二中如目等者意云翳若在眼則見毛輪執若在意見實我法若正配法喻即翳喻第七識毛輪等喻所見分今標云翳喻所見分者此有三意一密配第七識謂若但取毛輪則唯喻所見第七意識無因可收故此密配無所遺也二交互影略以喻上舉能法中言所自然影略該收所餘三顯示毛月無有體性意雖在所今却舉能以所從能生足知無體也以顛倒見者出無體所以於無見有故云顛倒疏無著云人法我見如翳以取無義故記取無義者情有理無故三燈喻識疏三燈喻識燈約膏油相續不絶識依貪愛生死無休記三中燈喻識者理則雖通義當前五以六七八識各有配故燈約等者以膏油喻貪愛以燈喻識若無膏油則燈光不起若無貪愛則識念不生故論云依止貪愛法住記然此上三喻皆是能熏染汙根本故通名自性相其所熏第八識持種引心配屬雲喻如下所明或可星喻見分翳目所見毛月喻相分燈喻自證分自證分即第八識其後雲喻但況識中種子為未來法二著所住味相疏二著所住味相記著所住味者即是味著所住疏論云幻喻所依住處以器世間種種差別無一體實故記幻喻等者即約所幻境說如結巾為兔結草為馬乃至變現種種境界以器下所喻法也六塵境界不一故云種種疏無著云味著顛倒境故記無著下會釋科文疏大雲云幻出城郭誑人識變山河不實故記大雲釋意可知能變之識尚猶不實所變之境豈得有體故起信云一切境界唯依妄念而有差別若離心念則無一切境界之相三隨順過失相二初釋章意二正解文初釋章意疏三隨順過失相自身及受用是過失觀此無常是名隨順記三隨下二初釋章意自身等者明身受當體是過失觀此等者隨順出離也疏又解云隨順身受即是過失記又解等者執著身受是隨順過失也所謂執身為常執受為樂即是顛倒顛倒即過失也疏文二二正解文二初露喻身二泡喻受初露喻身疏初露喻身論云身亦如是少時住故記初露下二正解文二記初者少時住者如草上之露日出即晞衆生妄身亦復如是然有三意一命修短有才生即死故二比於上界時極促故三念念遷謝即生即滅故有斯三意故曰少時二泡喻受疏二泡喻受論云所受用事亦復如是以受想因三法不定故記二中受用事者受能領納即此領納是受之用即此受用便名為事受想等者因即是觸受之因故想能助受故俱舍云受同飲食想同助味三法不定者有三釋一則苦樂捨三受不定也二則受想因於三法而不定三法即違順等三境也三則受想觸為三三皆不定也以一不定餘皆不定故然此雖說想觸意明於受如風水相投即有泡起觸想和合則有受生是故以泡喻於受也故大雲云水上之泡出沒不定心中之受苦樂不常疏無著云顯示隨順苦體以受如泡故記苦體等者受是苦體苦謂三苦彼苦身中有苦生故是苦苦破滅是壞苦不相離是行苦逐境住情妄生樂想故名隨順疏功德施云觀察壽如水泡或始生未成體或才生或暫停住即歸散滅記功德施下意說壽命不同前義喻則可知法中始生等者託蘊腹中名生形體未成即有死者才生者生下即死也暫停住者五歲十歲乃至百歲通名暫住初天所見人間半百尚同晝夜況聖智乎故正法念經云有於胎藏中死有生而已命終有能行便亡有能走便卒雖修短之異皆歸死處故淨名云是身虗僞假以澡浴衣食必歸磨滅四隨順出離相三初釋章意二正解文三總結示初釋章意疏四隨順出離相無著云隨順人法無我故得出離文三記四隨下三初釋章意隨順人法等者二空真智能出二死方便觀察名為隨順二正解文三初夢喻過去二電喻現在三雲喻未來初夢喻過去疏初夢喻過去記二正解文三疏無著云彼過去行以所念處故如夢記初如夢者人之神遊也以過去所作見聞事業皆是所念之處與夜來夢無有差別憶之可說掬之不見如經云如寤時人說夢中事心縱精明欲何因緣取夢中物疏論云應觀過去所有集造同於夢境但唯念性故記唯念性者以念為體性故念之似有不念全無疏功德施云觀察作者如夢中隨見聞之境以念分別熏習住故雖無作者種種境界分明現前記觀察等者謂白日見聞境界所熏夢中宛然還見雖即無人造作境界分明現前疏如是衆生無始時來有諸煩惱善不善業熏習而住雖無我是能作者而現無涯生死等事記如是下法合過去業因所熏感招現在果報雖則無人造作不免生死輪回故淨名云無我無造無受者善惡之業亦不亡若夢寤時則夢所見事一無所有若迷覺已則生死輪回杜絶蹤跡故起信云應觀過去所念諸法恍忽如夢二電喻現在疏二電喻現在疏論云以剎那不住故疏功德施云觀察心如電生時即滅記二中不住生滅文異義同凡是有為即生即滅無異時也以無性故體虗妄故經云因緣和合虗妄有生因緣別離虗妄名滅楞伽經云初生即有滅不為愚者說起信云應觀現在所念之法猶如電光三雲喻未來疏三雲喻未來疏論云以於子時阿梨耶識與一切法為種子根本記三中子時者在種子位時根本等者應云阿梨耶識在種子位時為一切法作種子根本以一切諸法從種子生故疏無著云彼粗惡種子似虗空引心出故如雲記粗惡種者有漏種也以無漏種子為細妙故似空者喻多也華嚴云若此惡業有體相者盡虗空界不能容受如雲者空喻種子雲喻未來所起現行之法以雲依空忽然起故故起信云應觀未來所現諸法猶如於雲忽爾而起三總結示疏無著云如是知三世行則達無我此顯示隨順出離相記無著下通明三事結釋科文疏大雲云過未無體現又不住則三世空達無我矣記大雲下顯無著科意三世既空憑何有我執我既不出離達無我者必出離也故偈云觀根及受用觀於三世事於有為法中得無垢自在二約諸經顯諸虗假喻之大意疏二約諸經顯諸虗假喻之大意記二中諸經等者謂如來說法多以夢幻虗假之事況諸法空義或廣或略散在諸經諸論隨何經論宗趣雖殊大意皆破衆生遍計情執或情執多者不達法者約喻生疑病既連綿藥還邐迤以悟為限法喻重重今約華嚴十忍品疏文兼攝大乘論意勢顯諸喻意令無混濫也疏佛說一切法空記一切法空者此是義宗若是上根聞之便解中根之類一喻即明下根之流展轉生惑更以諸喻如下所辨疏疑云云何現見一切境界故說如幻幻法雖無分明可見記現見等者難曰諸法若不見任說法皆空現見歷然在因何得是空故說如幻下以喻釋喻也下皆準此疏又疑云幻法既無又何愛著故說如陽𦦨渴鹿謂之水愛著奔趣記愛著等者難曰衆生不愛著任說法如幻既生愛著心云何得如幻故說如𦦨下釋也疏又疑云渴鹿畢竟不得水貪者如何皆得受用故說如夢夢中所見亦得受用記不得水者難曰貪求若不得任說法如𦦨求者皆遂心云何得如𦦨故說如夢下釋也疏又疑云夢造善惡寤無業報夢打尊長寤無憂懼故說如影如響雖全無體明鏡對色空谷對聲妍高低一一皆應必無雜亂必無參差記夢造等者難曰善惡無果報任說法如夢因果事昭然云何得如夢故說如影下釋也妍美好也醜陋也此說對鏡之色高低者此說對谷之聲也一一應者無一像而不應色無一響而不應聲無雜亂等者必不對美現醜對高應低故疏又疑云若都無實菩薩何以作利樂事故說如化謂變化者雖知不實而作化事記利樂等者難曰菩薩不化生任說如影響菩薩既化生云何如影響故說如化下釋也作化事者不可謂作化事便言為實不可謂度衆生便謂衆生實有良為衆生即空迷故不覺為說令覺若實有體化之何益故淨名云觀衆生如幻化如水月鏡像如龜毛兔角等文殊問云若然者菩薩云何行慈維摩詰言為衆生說如是法是真實慈也記上來五重徵釋皆顯法空蓋因喻生迷遂展轉訓曉極茲後位喻盡法彰疑氷自釋然諸經中或說乾城水月杌鬼繩蛇翳目空華龜毛兔角等皆隨機隨說引令得出必不依次有是五重也三會通秦譯經本二初指喻顯法二正會廣略初指喻顯法三初正釋二顯益三結歎初正釋疏三會通秦譯經本疏夢幻泡影空理全彰露電二喻無常足顯記秦經夢幻等者以夢等四事皆無體性若觀有為諸法如其夢等則空理易明露電二事暫有即無若觀諸法如其露電則無常自顯二顯益疏悟真空則不住諸相觀生滅則警䇿修行記悟真空下顯益不住相者凡夫迷真空既住相當知悟真空即不住相也住即執取染著之義又凡夫顛倒不了無常故戀世間不務修進當知達彼一切悉無常性念念遷謝不住不久由是怖畏生死樂趣涅槃如救頭然寸陰是競所以佛於涅槃會中偏讚此觀以為第一然二句中各有解行配釋可知三結歎疏妙符破相之宗巧示亡情之觀記妙符下結歎符破相宗者歎前四喻也然佛一代教門就大乘中宗塗有三一法相宗謂解深密等經瑜珈唯識等論二破相宗諸般若等經中百門等論三法性宗謂法華涅槃等經起信寶性等論既般若宗於破相今說有為喻以夢幻泡影明妙符宗旨也示亡情等者歎後二喻若觀世間諸法如電露等自不繫情於身命財而生常解又由前四喻故慧解亡情由後二喻故習定亡情又前亡執有之情後亡計常之情若不覺空無常即繫情於身命資具今既悟此空無常理則情念涅壞真智現前斯則上合經宗故云妙下契物情故云巧也二正會廣略三初牒問釋通三結歎初牒問疏魏譯九喻秦本略者記魏譯下牒問也或問曰魏譯九喻秦經略三者何也今此牒之二釋通疏以星燈有體雲種含生恐難契空心潛滋相想記以星下釋通有體者雖星不如日燈藉膏油未是全空故云有體雲種者法喻雙舉雲能含雨種必生芽故曰含生難契等者本為執情堅固不了即空由是設喻以蕩分別若觀有體之物便同析色難悟即空空觀不成故云難契潛滋等者既不了無常唯於境相而生常想不能捨離縱不故意任運生情不覺而起故曰潛也三結歎疏取意之譯妙在茲焉記取意等者先德皆云敵對唐梵則奘稱能取意譯經則什為最記然雲等三喻則直下剪除於餘六中又換一喻謂以影代翳也所以換者影並於翳空義顯故三流通分疏二初隨經文別釋二引論疏讚釋疏第三流通分佛說是經已長老須菩提及諸比丘比丘尼優婆塞優婆夷一切世間天人阿修羅聞佛所說皆大歡喜信受奉行記流通經文可見佛說是經已者本為空生致問故佛答降住修行答問既終便合經畢仍以躡跡起疑連環二十七段洎乎此文疑念氷釋既善吉無問故能仁杜宣一卷經內雖兼有師資以其就勝故但云佛說長老等義如前所解初隨經文別釋疏尼者此云女也優婆塞此云近事男優婆夷此云近事女親近比丘比丘尼而承事故阿修羅此云非天記疏二初隨經文別釋記近事男女者標釋可知亦云近住男清信男等並可知非天者亦非人也謂非天人趣之所攝故亦云無酒疏皆大等者文殊所問經云有三種義歡喜奉行一說者清淨不為取著利養所染二所說清淨以如實知法體三得果清淨記如實等者說理如理說事如事故果淨者依解起行得無漏故淨二引論疏讚釋二初引論二引疏初引論疏無著云若聞如是義於大乘無覺我念過於石究竟無因故記無著下二引論疏讚釋無覺者不發二空智也二執牢固如石之堅石猶可磨可琢聞經不能無我而解不啻於石故云過於詩云我心匪石不可轉也轉猶動也磨琢皆是動義又論云下人於深法不能覺及信世人多如此是故法荒廢無因者無大乘正因不得菩提故疏天親云諸法希有總持法不可稱量深句義從尊者聞及廣說回此功德施羣生記總持法者祕密般若也深何義者顯了般若也或總持法是經文深句義是本偈從尊者即彌勒無著也廣說即自指論文二引疏疏大雲云大聖說經妙理斯畢二空圓極四衆奉行疏肇云同聽齊悟法喜蕩心服玩遵式永崇不朽疏資聖云般若深經三世佛母聞經四句已超惡趣之因一念淨持必護菩提之記故人天異類莫不虔受奉行矣記佛母者以能生諸佛及菩提法故餘文易知疏金剛般若經疏論纂要終記金剛經纂要刊定記終
