body:
  text: 唐圭峰大師疏宋長水大師記後學古杭雲棲釋大科會八斷持說未脫苦果疑疏二初標章敘疑二依經斷疑初標章敘疑四初標章二指疑起處三印定四結成疑初標章疏八斷持說未脫苦果疑記第八疏初標章二指疑起處疏論云向說捨身苦身果報故福劣記向說下指疑起處也此從前內財較量中來謂河沙命施全勝外財猶感苦身故名為劣三印定疏若爾記若爾者印定前說四結成疑疏依此法門持說諸菩薩行苦行亦是苦果記依此下結成疑也謂依此經受持解說不憚勞苦即是菩薩行菩薩之行無所不為剜身然燈割股救鴿一句投火半偈亡軀供佛燒身捐形飼虎如是等行皆名苦因為行頗同果證何異因果既等何勝劣哉疏云何此法不成苦果記云何等者意明前捨身命即成苦果今受持經亦是苦行何故不成苦果耶二依經斷疑經二初明超忍以斷疑二勸離相以安忍初明超忍以斷疑二初明忍體二明忍相初明忍體須菩提忍辱波羅蜜如來說非忍辱波羅蜜疏斷疑之文二初明超忍以斷疑二初明忍體記忍體經意云忍辱波羅蜜者勝義諦中則無此相故云非忍辱等記斷疑意者若如汝言受持此經及菩薩行苦行便同捨身俱成苦果者此義不然以前捨身不達無相即成苦果持說此法菩薩苦行達無我人知忍無忍彼岸非岸直造本源豈成苦果故云忍辱非名辱等疏忍到彼岸已離苦相況彼岸非岸誰苦誰忍記忍到等者然此以超忍為體須知本末五重然後披疏則明見其理五重者一是本源之心非動非靜二不忍謂以怨報怨三忍雖不加報未能忘懷即未至彼岸忍四心情絶慮寂然不動即至彼岸忍五非動非靜即超彼岸忍為治動心且居靜境動既非實靜豈為真若準五門方為究竟與其第一更無二源體相常然竟無改易今言忍辱波羅蜜即第四門非忍辱波羅蜜即第五門離苦相者已越第三彼岸非岸兼超第四尚踰靜境豈有動心初後兩端正當忍體二明忍相二初引一生證極苦忍二引多生證相續忍初一生證極苦忍二初正明二反顯疏二明忍相二初引一生證極苦忍二初正明初正明二初徵二釋初徵何以故記正明經徵意云以何義故能行此忍二釋須菩提如我昔為歌利王割截身體我於爾時無我相無人相無衆生相無壽者相記釋意云以無我等相故也疏歌利此云極惡佛昔作仙山中修道王獵疲寢妃共禮仙王問得四果皆答不得王怒割截天怒雨石王懼而懺悔仙證本無瞋王乃免害記歌利王等準涅槃經說我念往昔生南天竺富單那城婆羅門家是時有王名迦羅富其性暴惡憍慢自在我於爾時為衆生故在彼城外寂然禪思爾時彼王春木華敷與其眷屬宮人綵女出城遊觀在林樹下五欲自娛其諸綵女捨王遊戲遂至我所我時為欲斷彼貪故而為說法時王見我便生惡心而問我言汝今已得阿羅漢果耶我言不得復言或得不還果耶我言不得復言汝既年少未得如是二果則為具有貪欲煩惱云何恣情觀我女人我即答言大王當知我今雖未斷貪欲結然其內心實無貪著王言癡人世有仙人服氣食果見色尚貪況汝盛年未斷貪欲云何見色而當不著我言大王見色不貪實不由於服氣食果皆由繫念無常不淨王言若有輕他而生誹謗云何得名修持淨戒我言大王若有妬心則為誹謗我無妬心云何言謗王言大士云何名戒我言忍名為戒王言若忍是戒當截汝耳若能忍者知汝持戒即截我耳時我被截容願不變時王羣臣見是事已即諫王言如是大士不應加害王告諸臣汝等云何知是大士諸臣答言見受苦時容顏不變王復詰言我當更試知變不變即劓其鼻刖其手足爾時菩薩已於無量無邊世中修習慈悲慜苦衆生時四天王心懷瞋忿雨砂礫石王見事已心大怖畏復至我所長跪而言惟願哀愍聽我懺悔我言大王我心無瞋亦如無貪王言大德云何得知我即立誓我若真實無瞋恨者令我此身平復如故發是願已身即平復今疏言問得四果者蓋通相而言也疏論云不但無苦而乃有樂以慈悲故記論云下義如後釋疏二反顯二反顯二初徵二釋初徵何以故記反顯經徵意云以何義故得知無我等相二釋我於往昔節節支解時若有我相人相衆生相壽者相應生嗔恨記釋意云若有我相應生嗔恨既不嗔恨則無我相如昔立誓若實無瞋身即平復以無瞋故則知無我以無我故方成真實忍波羅蜜支離也二引多生證相續忍疏二引多生證相續忍須菩提又念過去於五百世作忍辱仙人於爾所世無我相無人相無衆生相無壽者相記相續忍經意云恐人將謂只是一度能為此忍故說過去已五百生或恐人言無我能忍應可暫時若使頻為必不能爾故說多生悉皆如是或恐人言有何所因無我能忍故說多生忍之熟故含三意故有是言也疏纍苦故忍熟而樂但與正定慈悲相應記纍苦故者本疑纍苦難忍却由纍苦能忍斯則翻前三意中後二意也而樂者然有四意故樂一為忍熟故樂如役力之人久得其志也二為正定故樂常踞大定寂滅不動故三為愍他故樂如孩子杖父父即樂生四為自利故樂以將此幻形易得堅質具茲四意故言樂也疏文但有前三疏故偈云離我及恚相實無有苦惱共樂有慈悲如是苦行果記故偈云下引證如是苦行果者對破疑情也謂因苦果還苦因樂果還樂故不同也如陶金作器器還是金和土脫墼墼還是土前徵云何此法不成苦果今此結云如是苦行故不成苦果也二勸離相以安忍疏二初引論敘意二分文正釋初引論敘意疏二勸離相以安忍論云若有菩薩不離我相見苦行苦欲捨菩提心故勸離相無著云為對治不忍因緣有三種苦謂流轉苦衆生相違苦乏受用苦記二勸離相中疏二一引論敘意論云下出勸之由也謂不能安忍欲捨菩提心由見苦故見苦是苦者由不離我相故若離我相則不見苦自然成忍不捨菩提故今勸之令離相也夫菩提心者謂上求下化二利不息既若見苦為苦即不能忘身捨命出生入死是故便捨大菩提心如舍利弗本發大心行菩薩行至六住被乞眼睛便生瞋忿不成忍行捨大歸小蓋由我相也三種苦者前二即次文後一即當第十疑中心住於法行布施等是也意明住相行施墮有漏中受用欲樂疲乏生苦也亦可有漏有限有限故乏受用乏受用故生於苦也然今依天親科經故不收入此段前二文理相似故全用之二分文正釋經二初總標二別顯疏文二初總標初總標是故須菩提菩薩應離一切相發阿耨多羅三藐三菩提心記總標經意云以是無我相等得成忍行故彼諸菩薩應須離相發菩提心疏若離相發心雖逢大苦即能不捨記若離等者住相既捨菩提不住即成大忍菩提之心自然久固何捨之有也疏無著云離一切相者為離如是三苦相也記無著下可知二別顯二初對治不忍流轉苦二對治不忍相違苦疏二別顯二初對治不忍流轉苦初對治不忍流轉苦不應住色生心不應住聲香味觸法生心應生無所住心若心有住則為非住是故佛說菩薩心不應住色布施記流轉苦經意云不應住於色等六境生於妄心應生無住菩提之心若心有住色等境界則為非住菩提也以是義故佛於正答問之中說菩薩心不應住於色等布施菩薩之行處處皆同故引前文以證於後也疏初正明流是集諦轉是苦諦無著云若著色等則於流轉苦中疲乏故菩提心不生記流是下解科文此即四諦之中前二世間因果也大雲解云集招苦果故說為流生死不停故名為轉斯則襲習綸輪之義也著色等者著色等即疲乏菩提心不生不著色等即不疲乏菩提心生矣疏後引證引前說無住施具含六度證此文矣記引前等者是上修行文中也已如前說二對治不忍相違苦疏二初科二釋初科疏二對治不忍相違苦二釋二初正釋二指配初正釋二初引無著顯意二約天親釋文初引無著顯意須菩提菩薩為利益一切衆生應如是布施如來說一切諸相即是非相又說一切衆生則非衆生記相違苦經意云菩薩行行本為利益衆生故使離相行於布施若能離相則衆生相違時不生疲乏也況我法二相如來說為非相耶以皆本無故須離矣若其本有何用離之勸離之旨方茲著矣疏無著云既為衆生行施云何於彼生瞋由不能無衆生想故衆生相違時即生疲乏故顯示人無我法無我疏疏文內引無著顯意既為等者蓋不合為而為之也如人邊客本為供承見有所須反生凌辱於理如何由不能下出瞋之所以也故顯下出經意也但無此二心必相應二約天親釋文疏論云諸相者衆生相也非相者無我也陰中見我是衆生相記論云下二約天親釋文衆生相者以魏經云一切衆生相故陰中等者今於陰中不見有我故云非相也疏一切衆生者五陰法也非衆生者陰空故法無我也記五陰法者以彼衆生皆用五陰之所成故陰空等者以無能成之五陰故云法無我也記然此人法二相本自空無衆生不知妄執為有今所說者意令知而離之也記又此我法經文文與意反文即先法後人意則先人後法魏經之內文句昭然故今疏中順意釋也二指配疏乏受用苦配在後段九斷能證無體非因疑疏二初標章敘疑二依經斷疑初標章敘疑二初標章二敘疑初標章疏九斷能證無體非因疑記第九疏初標章二敘疑疏論云於證果中無道云何彼於果為能作因記於證下述疑意兼指疑起處也此從前第三第七中來以彼較量內外財施不及持經以此得菩提故遂起疑云若然者且言說是因因即是道以此證果理則不成何者以果是無為無為有體因是有為有為無體無體之道不到果中云何說此而為因耶二依經斷疑經二初斷疑二離執初斷疑疏二初略消經意二廣釋五語初略消經意須菩提如來是真語者實語者如語者不誑語者不異語者疏斷疑之文二初斷疑記斷疑經意云如來之言真實無異皆如其事不誑衆生持說必趣菩提汝等云何不信又以如來說於真實等故名如來為真實語者由是者字皆屬如來疏佛所有說皆如其事今說證果何疑不然記疏文初略消經意佛所下通說斷疑之意皆如其事者即下四語所說之事今說等者以彼況此也意云彼既無謬此豈不然二廣釋五語疏真語者說佛身大菩提法也是真智故記真語下二廣釋五語佛身即真身也以法報合論理智無二故若欲分文別指則佛身是報大菩提法為法也是真智者以菩提是覺覺即智故論云依此法身說名本覺法報合說同名真身如來說此真智之法乃名如來為真語者此則以所說名能說也餘皆例此疏實語者說小乘四諦諦是實義記諦實等義已如前說疏如語者說大乘法有真如小乘無也記如語等者小乘雖有生空之理非實真如以是偏真未徹源故大乘之內具顯三空空病亦空是究竟真如法也疏不異語者說三世授記等事更無參差記不異者與三乘弟子授記劫數久遠名號壽量國土等事一一不異故也疏佛將此四語不誑衆生是故秦譯加不誑語記佛將等者謂本來只有四語秦什譯時加此一語欲以統收四語發明佛意用之斷疑也應可一一舉而問之以顯不誑之義且如佛說大菩提法為真智時為真不真耶則對曰真當知如來是真語者斯則不誑之義明矣他皆例此記說此四事既不誑人今說此經受持得菩提果豈成誑耶云何不信記雖此言說有為無體之因能證離言無為有體之果故偈云果雖不住道而道能為因以諸佛實語彼智有四種亦如淨名云文字性離即是解脫無離文字說解脫也二離執須菩提如來所得法此法無實無虗疏二離執記離執經意者前雖以言遣疑又恐隨言生執聞說依言得菩提便謂言中有菩提及聞言中無菩提便謂畢竟無菩提不達言空而法實故作斯執今則遣之故云如來所得等也疏無實者如言說性非有故記如言等者為言說緣生本無自性言中菩提亦同言說何以故有名無實故如言於火但有火名名言二法皆無體性故云如言等也疏無虗者不如言說自性有故記不如等者不似言說也謂言說畢竟無體菩提之法即不無也但以不在言中不無離言之法如言中之火雖無不無離言之火記由是言中雖無火不妨因言而得火言中雖無菩提不妨因言而得菩提以依言進修必證果故若然者則不應言中執有離言執無達此有無方云離執故偈云順彼實智說不實亦不虗如聞聲取證對治如是說十斷如遍有得無得疑疏二初標章敘疑二依經斷疑初標章敘疑四初標章二指疑起處三立理四結成疑初標章疏十斷如遍有得無得疑記第十疏初標章二指疑起處疏論云若聖人以無為真如法得名記若聖下指疑起處此從第三中來準彼但云無為不言真如今所言者揀餘無為故所以揀者欲顯所疑要成遍義餘無為法有不遍故三立理疏彼真如一切時處恆有記彼真如下立理也如華嚴云法性遍在一切處一切衆生及國土三世悉在無有餘亦無形相而可得斯則處及塵塵時該念念故也四結成疑疏何故有得者有不得記何故下結成疑既遍時處即合皆得何故有得不得耶二依經斷疑經二初舉喻斷疑二讚經功德初舉喻斷疑須菩提若菩薩心住於法而行布施如人入暗則無所見若菩薩心不住法而行布施如人有目日光明照見種種色疏斷疑之文二初舉喻斷疑記斷疑經意云若住法行施則不得真如如入暗中一無所見若無住行施則得真如如太陽升天何所不矚真如雖遍得失在人義理昭然竟何所惑疏論云無智住法心不清淨故不得有智不住法心清淨故得記無智等者謂無般若觀照之智由無智故即執著色等六塵及空有等一切法也以住是執著之義故云住法心不淨者由執著故為塵所染正智不生不證真理故云不得得即證也有智等者反前可見疏有目者如得對治法日光者如所治暗盡能治現前空喻真如色喻性上萬德記對治等者以經中具有法喻疏中配釋影略難明今要預說然會疏文記謂喻中有五一空二色三暗四日五目法中有四一真如二性德三煩惱四智法四喻五數不齊者以空喻真如色喻性德暗喻煩惱日目二事同喻一智所以然者以日目二事各有一能智慧之中具有二義日能破暗如智斷惑目能見空如智證理既目無破暗之義日無見空之能約義分之但有四對法喻記喻中意者且如虗空無所不遍一切色法亦滿世間百千萬人悉在其內日光未出六合瞑然雖在空而不見空雖對色而不見色苟或日出昏暗盡除眼目開明空色皆見匪但空無邊際身在其中反思暗瞑之時不曾暫出記法中亦爾謂真如之理周遍十方性上功德亦遍一切衆生無量悉在其中以智慧未生唯是癡暗雖在真內何曾見真雖有性德不見性德苟或智慧明發惑暗盡除真性廓周自然明見匪但性無邊際身在性中反思迷暗之時不曾暫離記故肇公云道遠乎哉觸事而真聖遠乎哉體之則神彌勒頌云時及處實有而不得真如無智以住法餘者有智得記對治法者即智慧也以日目二種同喻此故謂日是能治暗是所治所治之暗既盡能治日光現前即能見其色等法中惑智例此言也故偈云暗如愚無智明者如有智對法及對治得滅法如是二讚經功德二初總標二別顯記讚德者以顯得真如為由心淨心淨由不住法不住法緣有智有智蓋由聞經當知此經有其勝德故須讚歎以示將來勝德之相即下十段初總標須菩提當來之世若有善男子善女人能於此經受持讀誦則為如來以佛智慧悉知是人悉見是人皆得成就無量無邊功德疏二讚經功德二初總標記總標經意如文可知所言以佛智慧知功德者意言除佛世尊餘無知者蓋顯功德之殊勝也疏無著云讀誦者此說受持因故為欲受故讀為欲持故誦記受持因者標也為欲下釋欲受其文故先讀欲持其義故先誦是故受持皆由讀誦故分因果也疏論云受持修行依總持法故讀誦修行依聞慧廣故記受持等者謂依總持法而受持修行若文若義總能領納方曰受持此則思慧也讀誦等者謂依聞慧廣故讀誦修行若無所聞憑何讀誦此聞慧也論云廣多讀習亦名聞慧然皆言修行者蓋通相說也非是三慧中修慧以修慧與理相應唯局無漏出於讀等四法之表故不配之但約聞思二慧共所成就故疏次云是則從他聞法等疏是則從他聞法內自思惟為得修行智也故偈云修從他及內記故偈下引證從他即聞慧也及內即思慧也二別顯十初捨命不如二餘乘不測三依大心說四具德能傳五樂小不堪六所在如塔七轉罪為佛八超事多尊九具聞則疑十總結幽邃初捨命不如二初捨命福二信經福初捨命福須菩提若有善男子善女人初日分以恆河沙等身布施中日分復以恆河沙等身布施後日分亦以恆河沙等身布施如是無量百千萬億劫以身布施疏二別顯十初捨命不如二初捨命福記捨命福經意可知疏偈云以事及時大福中勝福德記以事等者以前來已說命施此中復說者蓋時事俱勝故時即布施之時事即布施之事前但一度施一河沙身命時事皆小今則無量劫中日復三度以河沙身命布施時事皆大是捨命福中勝福德也二信經福若復有人聞此經典信心不逆其福勝彼何況書寫受持讀誦為人解說疏二信經福記信經福經意亦可知不逆者是不謗義也魏經如此疏信經劣於持說多命勝於前喻記信經者謂能所較量之中皆有勝劣能中一河沙數為劣三時多劫為勝所中信經為劣持說為勝前則以劣況勝此則以勝況劣前淺後深天地之遠矣二餘乘不測須菩提以要言之是經有不可思議不可稱量無邊功德疏二餘乘不測記餘不測經意云若具足讚歎終不可窮以實言之有無邊功德等也疏偈云非餘者境界記非餘等者非二乘菩薩能盡知也故前云以佛智慧而悉知故又下文云當知是經義不可思議果報亦不可思議佛尚如此餘豈能知疏無著云不可思議者唯自覺故不可稱量者無有等及勝故記自覺者謂以心思口議但及名相之境此非名相故不可思議惟證相應故也等及勝者兩意一則無有等此勝功德故二則無有勝於此故無有等於此故故心經云是無上呪是無等等呪及即等義故不別標也三依大心說如來為發大乘者說為發最上乘者說疏三依大心說記大心說經意云以非餘者所知故故為最上者說疏最上者一佛乘也記一佛乘者經中初標大乘名恐濫於權教故復揀云最上乘者今疏中出最上乘體故云一佛乘也體當本覺故名為佛非二非三故名一乘故魏經云為住第一大乘衆生說即當善吉所為機發無上菩提心者四具德能傳若有人能受持讀誦廣為人說如來悉知是人悉見是人皆得成就不可量不可稱無有邊不可思議功德如是人等則為荷擔如來阿耨多羅三藐三菩提疏四具德能傳記能傳經意云若能宣說受持此則修行二利能令佛種不斷則名荷擔菩提疏成就等者偈云滿足無上界記滿足無上界者滿足即成就義界即因義意明不可量等功德與無上菩提為因故也疏荷擔者無著云肩負菩提重擔故記荷擔等者在肩曰擔背負曰荷今明行菩薩行即是荷擔謂以大悲下化以大智上求以大願雙運安於精進肩上從煩惱生死中出念念不住直至菩提真性自他一時解脫方捨此擔法炬經中具有此說今經云受持讀誦即自利廣為人說即利他既若二利兼行必以大願為體由是能令佛種不斷故名荷擔菩提五樂小不堪何以故須菩提若樂小法者著我見人見衆生見壽者見則於此經不能聽受讀誦為人解說疏五樂小不堪記樂小經徵意云云何唯為大乘者說何故持說名為荷擔菩提釋意云以樂小者著我等見不能持說故知能持能說是最上乘荷擔菩提之者記問何者名為小法誰為樂小之人答四諦緣生名為小法聲聞緣覺即是樂小之人滯情於中乃名為樂彼有法執此顯三空是其非處故不能持說故魏經云若有我人等見於此法門能受持者無有是處當知若能持說即是樂大法者不著我人等見也問聲聞緣覺已達我空云何經中而言著我答以我人等見是心心所法著之即是法執故指緣覺聲聞也或可樂小法者即是聲聞緣覺著我見者即是一切凡夫六所在如塔須菩提在在處處若有此經一切世間天人阿修羅所應供養當知此處則為是塔皆應恭敬作禮圍繞以諸華香而散其處疏六所在如塔記如塔經意云經顯法身依法則有報化三身既存塔廟斯在是故此處勸應供養記準纂靈記說隋朝益州新繁縣王者村有書生姓苟未詳其名於彼村東空中四面書之村人謂曰書者何也曰我書金剛般若經曰何用焉曰與諸天讀之時人見聞若存若亡彼屬霖雨流水雱霈唯此地方丈餘間如堂閣下竟無沾濕於是牧童每就避雨時人雖在莫知所由至武德初有西僧至神貌頗異於此作禮村人謂曰前無殿塔為何禮也曰君是鄉人耶曰然僧曰君大無識此有金剛般若經諸天置蓋其上不絶供養云何汙踐使其然乎村人乃省苟生寫經之處自此遂甃甓嚴欄護之不令汙踐苟至齊日每常供養瞻禮者往往有聞天樂之聲迄今其處雨不能濕且空書無跡尚乃如斯況紙素分明而不能爾七轉罪為佛復次須菩提善男子善女人受持讀誦此經若為人輕賤是人先世罪業應墮惡道以今世人輕賤故先世罪業則為消滅當得阿耨多羅三藐三菩提疏七轉罪為佛記轉罪經意云如過去造極惡合來世墮三途者苟遇此經受持讀誦功力既著能消極惡遂以現遭輕賤之事更不墮於惡道即是轉重業令輕受也持經無我等相即煩惱障盡極惡消滅即業障盡不墮即報障盡三障既滅三德必圓故云當得菩提也疏輕賤者總包於中或打或罵故隋譯云輕賤甚輕賤無著云此毀辱事有無量門故復云甚輕賤記總包等者以打罵等事皆名輕賤故隨譯下引證無著下輕釋無量者以身口意三所為之事但不饒益皆屬輕賤也故云無量疏當得菩提者罪滅故記罪滅者罪障既盡漸漸修行因圓果滿自然為佛經言當得意顯後時非謂現世得成佛果記餘轉滅等義已於懸談五因中說竟八超事多尊疏二初總敘意二別科釋初總敘意記八超事多尊論云示現速證菩提法故記第八經疏二初總敘意速證等者意明持說此經速證菩提之法所以超過如來事多世尊之福故偈云福不至菩提二能至菩提也二別科釋經二初供佛多中全具福二持經多中少分福初供佛多中全具福須菩提我念過去無量阿僧祗劫於然燈佛前得值八百四千萬億那由他諸佛悉皆供養承事無空過者疏文二初供佛多中全具福記二別科釋經二初中全具福經意可見然燈前者以釋迦因地修行經三無數劫第一劫滿遇寶髻如來第二劫滿遇然燈如來第三劫滿遇勝觀如來今云然燈前者即第二劫中也疏那由他者十億為洛叉十洛義為俱胝十俱胝為那由他記那由他者第九數數當萬萬二持經多中少分福若復有人於後末世能受持讀誦此經所得功德於我所供養諸佛功德百分不及一千萬億分乃至算數譬喻所不能及疏二持經多中少分福記少分福經意對前比量可解然所不及者有二義一彼得福德此得菩提故二彼有我相此無我相故故前云此人無我人相等也九具聞則疑須菩提若善男子善女人於後末世有受持讀誦此經所得功德我若具說者或有人聞心則狂亂狐疑不信疏九具聞則疑記則疑經意云前雖較量亦未具說若具說者人必狐疑孤者狡獸也以多疑故故云狐疑述征記云風徑河氷始合要須狐行以此物善聽聽氷下水無流聲即過也魏經即但云疑惑十總結幽邃須菩提當知是經義不可思議果報亦不可思議疏十總結幽邃記幽邃經意云較量不及佛不具說者以此經義及持者果報皆不可心思言議故也疏無著云此顯示彼福體及果體不可測量故記福體者經義也為福所依故果體者佛菩提也測量即思議也以福田佛果皆無相故記然科云總結幽邃準疏所判但局第十疑中今若詳之兼該三七之二以始自第三乃至第十邐迤次第五度較量謂外財兩度內財兩度佛因一度且第一以一三千界七寶布施較量不及持說第二以無量三千界寶施較量不及第三以一河沙數身命布施較量不及第四以無量河沙數身命布施較量不及第五以如來因地供養諸佛功德較量不及至此第五是較量之極更無譬喻可以比況故云乃至算數譬喻所不能及苟或具說人必生疑故復云我若具說者或有人聞心則狂亂狐疑不信自此之後讚較都絶所以望前數段故總結云當如是經義不可思議等也問此至經末猶有數處較量云何輒言無較量耶答餘所較量但是別意以之斷疑實非前說五重次第也由是隨時略舉一三千界寶或須彌聚寶或阿僧祗界寶以為較量若不然者豈得勝義之後却舉劣福為次第耶
