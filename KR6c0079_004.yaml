body:
  text: 唐圭峰大師疏宋長水大師記後學雲棲寺沙門大科會二依天親問答斷疑以科釋二初牒章分文二依章正釋初牒章分文疏第二依天親問答斷疑以科釋總分四段記第二下二初牒章分文二依章正釋四初善現申請二如來讚許三善現佇聞四如來正説初善現申請二初整儀讚佛二正發問端初整儀讚佛二初釋請人二釋請儀初釋請人時長老須菩提疏初善現申請二初整儀讚佛記二依章正釋四初善現申請二一整儀讚佛疏二初釋請人從初至恭敬即是整儀餘皆讚佛也經時者即如來食已敷座而坐時也疏長老者德長年老唐譯云具壽壽即是命魏譯云慧命以慧為命記德長年老者謂德高曰長年多曰老也唐譯下證年老魏譯下證德長智慧超倫即是德長義也然以慧為命者約喻顯法也謂人身以命為本佛法以慧為本命盡則六根俱廢慧喪則萬行不成云云此約別義釋長老也若通意者但有德業便名長老如云先生未必年老矣疏須菩提有三義譯謂善吉善現空生生時室空解空之善瑞現矣相師占云唯善唯吉記須菩提者亦云蘇補底但梵音楚夏耳善吉下從末倒標生時下據本順釋西域記云是東方青龍陀佛影響釋迦之會示迹聲聞發揚空理十方諸佛法皆爾也二釋請儀二初正釋經文二別解菩薩初正釋經文二初釋整儀二釋讚佛初釋整儀在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言疏從座起下皆整理威儀修敬之相記從座下二釋請儀二初正釋經文皆整儀者疏雖通明經須別釋從座起者師資之道尊卑頗殊欲有咨詢不可坐問此同曾子避席對夫子也孝經中夫子問曾子曰先王有至德要道以順天下民用和穆上下無怨汝知之乎曾子避席曰參不敏何足以知之雖彼答此問而致敬是同也偏袒右肩是彼方儀則此土非儀也欲問如來故須偏袒右膝下右則為順膝能回屈表順理心也著地即示卑之相也膝表智地表理合掌即表冥心掌合不執外物心冥覺不異緣欲問實相法門故須用心如此恭敬者總結也起座袒肩跪膝合掌莫非恭敬故爾亦可配於三業謂座起袒肩合掌等身業也恭敬即意業也白佛言下即口業也二釋讚佛希有世尊如來善護念諸菩薩善付囑諸菩薩疏希有者世所無故記希有下疏且總明具有四種一時希有曠劫難逢然今賢劫之中正當住劫就住劫中有二十增減今即第九減劫中人壽二萬歲時迦葉如來出世百年劫一年至人壽百歲時釋迦如來出世減後此劫已盡至第十劫展轉却增至八萬四千歲又百年減一年至人壽八萬歲時彌勒佛出世望過去未來二佛相去一千一百萬餘年中間更無故云希有也故法華云諸佛與出世懸遠值遇難二處希有三千界中唯有一佛百億四天下百億須彌山百億日月百億六欲百億梵世其中唯有一佛此方而現也三德希有福慧超絶勝無上故故法華云我所得智慧微妙最第一又云如其所得法定慧力莊嚴以此度衆生自證無上道然佛功德不可稱説盡其邊際故華嚴云剎塵心念可數知大海中水可飲盡虗空可量風可繫無能盡説佛功德四事希有用大慈悲極巧方便現多種身相演無量法門隨衆生根皆利益故今所歎者意則雖通義當歎事以下標云善護念等疏如來者從如而來記如來者真化不同真佛名如來者迷時背覺合塵名如去悟了背塵合覺名如來如即真如來去即隨緣也化佛名如來者從真如起來成正覺而化衆生今當後者故云從如而來疏論云善護念者依根熟菩薩説謂與智慧力令成就佛法與教化力令攝受衆生記根熟者三賢已上菩薩信根成熟永無退轉也智慧力即無分別智成就佛法即隨其分位令證真如乃於一法令達百千萬法明門等斯則自利行也教化力即後得智攝受衆生即隨其分位令於百千萬億等世界中教化衆生斯則利他行也疏善付囑者依根未熟菩薩説懼其退失付授智者付者將小付大囑者囑大化小記根未熟者十信菩薩也以此位人六度亂修心如輕毛故云懼其退失以信根未成遇緣恐退故須付囑智者令其教化使不退也將小下將小菩薩付大菩薩囑大菩薩化小菩薩也此如父母遺囑子孫云云二別解菩薩疏菩提薩埵此云覺有情三釋一約境所求所度二約心有覺悟之智餘情慮之識三約能所所求能求三皆如次配覺及有情記菩提下二別解菩薩菩薩梵音言猶不足具云菩提薩埵此云覺有情以時人不貴唐言故存梵語秦地好略又削提埵二字但云菩薩約境所求是覺所度是有情然約人有四句謂二乘有求無度諸佛有度無求菩薩亦求亦度凡夫無求無度約心者亦四句諸佛有覺無情凡夫有情無覺菩薩有情有覺二乘入無餘依界無情無覺約能所者所求是覺能求是有情三皆下皆上句是覺下句是有情然此三義之中初約悲智次約真妄三約人法菩薩之義不踰此三未必寶冠天衣方是菩薩二正發問端二初釋當機二釋正問初釋當機世尊善男子善女人發阿耨多羅三藐三菩提心疏二正發問端曲分二初釋當機記二中疏曲分下二初釋當機以發心者方是當機疏華嚴云忘失菩提心修諸善業魔所攝持記華嚴下引證此有兩意初云有人先曾發心後時忘失尚非其器況全不發心者何以故魔所攝持故後意即云衆生發心後時忘失者蓋為不解住修降伏耳故今所問免使遺忘前揀其機後防其退有茲兩意故用彼經所以善財童子每遇善友皆啓云我已先發阿耨多羅三藐三菩提心而未知云何學菩薩行修菩薩道意明發心方是修行之器疏阿耨多羅三藐三菩提此云無上正遍正覺記阿耨下先翻名疏謂正智遍智覺知真俗不偏不邪記謂正智下釋義上正字且對遍字以分二智下正字即明二智所覺不偏不邪即以正智覺真遍知覺俗皆不偏邪故云正覺以二乘偏覺凡夫邪覺今揀此二故不偏邪謂如理而知如事而知故也然此二智亦名如理如量根本後得真俗權實等記又準智度論説從因至果有五種菩提一發心菩提即十信是二伏心菩提即三賢是三明心菩提即初地至七地是四出到菩提八九十地是五無上菩提即如來地是今約能發心即當第一約所發即第五能所合論貫通初後也二釋正問三初釋魏本二會當經三引論證初釋魏本疏二釋正問疏魏譯云應云何住云何修行云何降伏其心記疏二釋正問三初釋魏本先引文疏意云若人發菩提心已住何境界修何行業妄心若起云何降伏記意云下釋意住何境界者未發心時住六塵境既發心已誠宜改轍故云住何境界修何下未發心時十惡為務既發心已不可依前故云修何行業妄心下未發心時妄心起即逐妄既發心已不可隨之是故問云云何降伏疏故佛令安住四心修六度行於中降心不令著相記故佛下懸示答意意云昔住六塵之境今住四心昔行十惡今行六度昔時著相今令不著如是用心真實修行發菩提心豈忘失耶二會當經應云何住云何降伏其心疏秦譯略修行者記秦譯下會當經初難起疏意云住道降心即是修行記意云下釋初二句標意云雖無修行之文含有修行之義如起信中説六八二識不言第七雖即不説義具足云云疏謂四心六度皆名住修降伏記謂四下指經釋成意云四心中亦有住修降義六度中亦有住修降義何以故住謂發心必須修進降謂制伏依住修所明由是於此不相捨離秦什所略意在於茲文雖不明義已具矣三引論證疏故無著云住謂欲願修行謂相應等持降伏謂彼心若散制令還住記故無著下三引論證住謂欲願者欲願意起即是發心也修行等者平等持心名為等持等持即相應相應即是修行義也降伏等者彼心即上相應心也制令還住即却使相應也此即依住修説降伏義經論相契聖旨頗同故如上説理實然矣疏又十八住中一一皆以住修降伏釋之記又十八等者此是無著論明豎答三問之意也若準天親解經則明橫答三問從須菩提但應如所教住已下即為別斷疑情今明無著故有此説意云不唯四心六度之中有住修降伏之義其如十八住內皆有此三如初住中度四生入涅槃是住義無生可度是修義無我等相是降伏義初住既爾餘則皆然疏故知義雖有三而行是一記故知下結義三行一者三義具足方成一行謂空發心降伏不修行亦非行但發心修行不降伏亦非行空降伏修行不發心亦非行如鼎三足如天三光闕一不可譯經之妙厥在茲焉二如來讚許三初印讚所讚二勑聽許説三標勸將陳初印讚所讚佛言善哉善哉須菩提如汝所説如來善護念諸菩薩善付囑諸菩薩疏二如來讚許曲分三一印讚所讚記印讚所讚者印讚須菩提之所讚也即經云善哉善哉是讚也如汝所説是印也如來善護念等是所讚也疏重言善哉讚美之極護付能令佛種不斷是事必然故印讚言如汝所説記重言等者善吉所讚雅契佛心若不重言安表善極如顏回死夫子歎之云天喪豫天喪豫注云再言者痛傷之甚也吉凶雖別殷勤頗同護付等者空生發言言當其事是故調御印讚云云二勑聽許説汝今諦聽當為汝説疏二勑聽許説記勑聽許説者經云汝今諦聽勑聽也當為汝説許説也諦謂審實之義意令審諦真實用心聽也疏無以生滅心行聽實相法記無以生滅等者此乃反用淨名經文彼云無以生滅心行説實相法此意云既不得以生滅心説豈得以生滅心聽説是不生不滅實相之法云何以生滅心行之聽之無以妙饌置於穢器疏智論偈云聽者端視如渴飲一心入於語義中踴躍聞法心悲喜如是之人可為説記智論下釋相端視謂不左顧右盻也目若別顧心則異緣本欲制心且令端視此是用心之方便也渴飲者喻也如渴飲水但恐水竭無暇別觀聽法之者亦復如是思冀妙門無心睥睨一心入語義者意中現義方發於言言中有義義中有意令聽者以耳識聽其言以意識採其義尋義而取意得意而捨義苟能得意在懷何慮失於言義心心若此如瓶注瓶一覽無遺可為至妙故云一心入於語義中也踊躍即歡賀之貌即欲聞法之時也悲喜即聞了之時悲謂傷昔日不遇如下經云涕淚悲泣喜謂慶今日之得聞如鶖子踊躍歡喜傷昔慶今故云悲喜如是下結揀其機也意云若不如是用心則不可為説又真諦記説諦聽離三過失得三功德謂離散亂輕慢顛倒如次生聞思修三慧也三標勸將陳善男子善女人發阿耨多羅三藐三菩提心應如是住如是降伏其心疏三標觀將陳我當為汝如是如是委細而説記標觀將陳者標謂標指勸謂勸勉將猶欲也陳記也即經云善男子等標也應如是等者勸也標勸之意意在欲説故云將陳即懸指向下正答之文是故疏云我當為汝等也三善現佇聞唯然世尊願樂欲聞疏唯者順從之辭禮對曰唯野對曰阿記三中唯者下如今人稱喏皆順從之辭也老子云唯之與阿相去幾何注文如疏今則禮對也疏十地經云如渴思冷水如飢思美食如病思良藥如衆蜂依蜜我等亦如是願聞甘露法記十地等者釋願聞之相即華嚴十地品中諸菩薩衆請金剛藏説十地法門之偈今借用之然前四句於中約喻配其三慧初句聞慧聞法不思如飲水不味次句思慧若要尋求食味應須啖嚼第三修慧修行惑遣如服藥病除後句即三慧之果蜂採百華以成蜜人集萬行以證真蜂成蜜已依蜜而活人證真已依真而住我等下合喻最後一句通喻所聞四如來正説二初正答所問二躡迹斷疑初正答所問二初舉總標別以牒問二約別顯總以答問初舉總標別以牒問疏四初正釋經文二斥他謬判三詳定經旨四牒難釋通初正釋經文佛告須菩提諸菩薩摩訶薩應如是降伏其心疏四如來正説二一正答所問二初舉總標別以牒問此以降伏為總住修為別也謂住修之中皆有降伏經意在此故唯標降伏記四如來正説二初正答所問二初舉總標別以牒問記經諸菩薩摩訶薩者問前舉當機云善男子善女人洎今答處何言菩薩摩訶薩耶答大心未發即是凡夫既已發心即名菩薩善現標舉約未發心時故云善男子善女人世尊酬答約已發心後乃言諸菩薩摩訶薩記疏此以下四初正釋經文以空生問有三種佛今牒舉但言降伏故此釋也前二句標謂住下釋謂度生無我是住中降伏也施不住相是修中降伏也由斯義故降伏為總也經意在此者在舉降伏而標住修欲顯文簡義豐彰平玄妙始雖住修究竟降伏得意茲深故但云一也二斥他謬判疏有科此所標云舉後攝初者乃令經文極不穩暢理例顛倒自古言教秪有以初攝後未聞以後攝初記有科下二斥他謬判即大雲疏也青龍即云舉終括始其義亦同乃令下正斥失文不穩暢者本宜初包後義如色例於聲等何忽舉彼攝初致使文非穩暢不穩暢則蓋由於科非經文本意也三詳定經旨疏況詳經文無別答降伏之處則知降伏在住修中皆令離相是答降伏問也記況詳下三詳定經旨降伏在住修中者住中降伏即實無度者修中降伏即無住布施無度無住便是離相離相既通住修故知降伏是總四牒難釋通疏不別答者此經宗於離相離相正是降心本意欲明降心須約住修而顯住修降心本不相離故無著十八住皆有住修降心記不別下四牒難釋通初句牒難難云空生既問有次第住修降伏宛分何故經中不與別答而寄住修中明耶此經下正通離相是降心者如前所引無度無住等須約住修顯者若有發心修行斯可説得降心若無住修説何降制斯則只於住修以降分別妄念故云本不相離無著下引證可知二約別顯總以答問二初答安住降心問二答修行降心問初答安住降心問四初廣大心二第一心三常心四不倒心初廣大心疏二初釋標二釋列初釋標所有一切衆生之類疏二約別顯總以答問二一答安住降心問四初廣大心文二初句標三界普度故記疏答問中科安住等者此即安住四心彌勒偈云廣大第一常其心不類倒利益深心住此乘功德滿依此科判故列四心也記疏初句下二初釋標三界普度者釋廣大義一切衆生不越三界三界普度方名廣大若一衆生不與度者非廣大也故經標云所有一切衆生即統該也梵語僕呼繕那此云衆生智度論云五蘊和合中生故云衆生瑜伽論云思業為因卵胎濕化為緣五蘊初起名之為生類即流類即胎卵等四也二釋列三初受生差別二依止差別三境界差別初受生差別二初釋文二通難初釋文若卵生若胎生若濕生若化生疏若卵下二列三一受生差別天獄化生鬼通胎化人畜各四諸餘微細水陸地空不可具分品類記若卵下二釋列三初中二初釋文稟命之始名曰受生即初起之時也卵等四異故云差別謂卵㲉中生胎藏中生依濕而生化忽然生故不同也然三界衆生不出五道以四攝五亦得具足故疏次云天獄等化生斯則從狹之寬明也天獄化生者天上地獄唯是化生最狹也鬼通胎化者鬼寬也謂地行羅剎及鬼子母皆是胎生故有鬼母白目連曰我晝夜分各生五百子隨生自食雖盡不飽故知有胎生鬼也餘皆化生也人畜各四者人四者毗舍佉母卵生三十二子胎生常人濕即奈女從菴羅樹濕氣而生化生即劫初之人故俱舍云二禪福將盡下生贍部洲畜具四者正法念經云化生金翅鳥能食四生龍乃至濕生也然禽獸雖殊皆畜生道攝餘獸皆胎餘鳥皆卵也諸餘微細等者如華嚴云盡法界虗空界十方剎海所有衆生種種差別所謂卵生胎生濕生化生或有依於地水火風而生住者或有依空及諸卉木而生住者種種生類種種色身乃至云一切天龍八部人非人等無足四足多足有色無色有想無想非有想非無想等以今經中無別説處不可構虗而言故疏結云不可具分品類也二通難疏卵劣在初者二釋一約境具緣多者為首二約心從本至末為次記卵劣下二通難應難云卵生最劣云何在初化生最勝云何居末二釋下通約境等者謂卵生必具胎濕化以未生處胎胎中必濕無而忽有為化胎生必兼濕化濕必兼化化不必兼餘但從於無而忽有故此則前前必具後後後後不具前前故為此次也約心從本等者謂衆生本因起業業識即根本無明與本性和合能所未分混沌如卵卵即卵㲉故藥師經云破無明㲉竭煩惱河無明發業蘊在藏識為胎受生為濕生時從無而忽有為化由是義故故為此次也二依止差別若有色若無色疏二依止差別有色四禪無色四空記依止差別者依止即是衆生身身見依止依止義異故云差別故疏次云有色無色等有色即以色為身無色即以四蘊為身又色界有四禪云云無色有四空云云如是品類不同故云依止差別問如有經云佛涅槃時無色界天淚下如雨既有淚下云何無色答所言無色者無業果色不無定果色故不違也三境界差別若有想若無想若非有想非無想疏三境界差別功德施云有想則空識二處無想則無所有處非等則有頂記境界差別者雖言境界意明空等四處空識二處者無色界第一第二天也無所有處者第三天也非有想非無想者第四天也無粗想有細想故是三有之頂故云有頂問下二界皆有色何故唯言四禪以為色界又色界亦有一天名為無想云何唯指無所有處為無想耶答三界統論不出五事謂欲色想無想非有想非無想然非有無想即局於有頂一天色界一天雖名無想已從多分通名色界故但指無所有處為無想其餘三事從空識二處已下乃至欲界相望有無寬狹不同謂欲界具三色界無欲無色界唯想無色無欲故立有想之名色界雖有想恐濫上名故立有色之目欲界雖兼色想上已占於二名揀異彼故但名欲界下下必具於上上上上不兼於下下故立名之本其在茲焉如有三人一人解經律論一人解經律一人唯解律揀別立號云云可知又欲界三欲五妙欲境勝故色界細妙色勝故無色想心勝故由是欲唯欲界色通二界想遍三界無想通上三界非有想非無想局上一界斯則不同功德施所釋也二第一心疏二初釋文二通難初釋文我皆令入無餘涅槃而滅度之記二中經我者即發菩提心菩薩所稱今佛説彼也涅槃者秦譯滅度今經上梵下唐故云而滅度之若具足梵音應云摩訶波利昵嚩喃此云大圓寂今經論中多言涅槃也然準唯識論説有四種涅槃一自性清淨涅槃凡聖同有二有餘依即由煩惱障有苦依身故三無餘依身出生死苦無依故然小乘以灰身滅智為無餘無餘有三一煩惱餘二業餘三果報餘大乘則以究竟寶所為無餘故智論説四住地煩惱盡名有餘依五住地煩惱盡名無餘依四無住處悲智相兼不住生死涅槃故疏二第一心即無住處涅槃不共二乘故云第一記疏即無下即大乘之無餘四種之中無住處涅槃也謂不住菩薩變易生死不住二乘灰斷涅槃即真無住處名為無餘若小乘無餘如有情滅減不別今不同彼故云不共二乘不共者即非彼四之第三則言同而意異也如法華經云若得作佛時具三十二相爾時乃可謂永盡滅無餘此則二障都盡二死永離也第一者結歸偈旨仍釋科名意謂若非無住處之無餘焉得彌勒指為第一心耶二通難二初通五性難二通八難難初通五性難二初難二通初難疏無著云何故願此不可得義記無著下初二句難意云一切衆生五性差別云何皆入無餘涅槃三分半衆生不得成佛故云不可得義二通疏生所攝故記生所攝者答也此是無著立量成立皆可度也應立量云三分半衆生是有法定皆成佛故為宗因云生所攝故同喻一分半衆生意云涅槃經説凡是有心定當作佛圓覺經云有性無性齊成佛道此則是可得義安云不得二通八難難二初難二通初難疏又云卵濕無想有頂則不能云何普入記又云卵濕等者舉難處難也卵濕則畜生難無想有頂即長壽天難雖舉二處意兼八難八難謂三塗北洲長壽天佛前佛後世智辨聰無根等難意云難處即不可度云何皆人二通疏有三因緣一難處生者待時故二非難處生未成熟者成熟之故三已成熟者解脫之故記有三因緣等者答也難處待時者此亦令成其種也意云難處衆生不可常定至非難處而度脫之若得成種遲速之間必須成熟發廣大心故合無遺非難處者雖即未度且令成熟已熟可知此稍同前護付之義也三常心如是滅度無量無數無邊衆生實無衆生得滅度者疏三常心一性空故二同體故論云自身滅度無異衆生三本寂故四無念故五法界故記三中疏一性空者衆生緣生緣生無性故即空也同體者同一真如性故故起信論云謂如實知一切衆生反與己身真如平等無別異故論云下引證此語猶反應云衆生滅度無異自身寧於自身起於他想本寂者相本自盡不待滅故淨名云一切衆生即寂滅相不復更滅問此與性空何別答前但即空此則本來成佛成佛即入涅槃故云本寂前淺後深可知無念者有念即有衆生如無翳則空華不現法界者一真法界平等無差云何於中見自他相故偈云平等真法界佛不度衆生此上五義大雲之文然於中一三約所二約能所四唯約能五該本末也大抵意云若見衆生有可度者即生疲勞不能常度反此即常也又度與不度其心不二名之為常也故金剛三昧經云若化衆生不生於化不生無化其化大焉四不倒心何以故須菩提若菩薩有我相人相衆生相壽者相即非菩薩記四中經何以故者徵意云設所見有衆生可度此何遇耶次通云若菩薩有我等相即非菩薩此是反明意云是真菩薩必無我為能度豈更見有衆生得滅度耶疏四不倒心論云遠離依止身見衆生等相故記遠離依止身見衆生等依止即身見異名亦名相續梵云薩迦耶此云身見等於我人壽者也此名身見者以依於身起此見故故云依止身見衆生等相又身見為本諸餘見等依此而生故今皆遠離故云等相也疏無著云已斷我見得自行平等相故信解自他平等記已斷等者內無我即無自相無自相即平等平等即空義也信解等者以己方人也由內無自相故得外無他相中有故字是所以也既無自他之相即自他平等志公云以我身空諸法空千品萬類悉皆同疏顯示降伏心中攝散時衆生想亦不轉如彼爾𦦨記顯示降伏等者準無著論廣大第一當住常心當修不倒當降安住一段之中便具三義今此段文正當降義故云顯示降伏等也不轉者轉即生起義意云我見等不生起也我不生起正是降心義也爾炎者梵語此云智母即根本智能生後得故名智母以根本智雖內證真理而無能證之心今後得智雖外度生而無能度之念故云如爾炎也如是用意名不顛倒心反之即顛倒耳二答修行降心問五初總標二別釋三總結四顯益五結勸初總標疏二初釋文二通意初釋文復次須菩提菩薩於法應無所住行於布施疏二答修行降心問五初總標於法者統標諸法應無下正明修行記二答修行五一總標疏於法統標者謂色聲等六通名法故故魏經云不住於事二通意二初問二答初問疏問菩薩萬行何唯説一記菩薩萬行者謂自利利他事行理行如是等行無量無邊今言萬者且舉大數二答二初正釋二證釋初正釋疏答萬行不出六度六度總名布施記總名布施者謂第一即資生施第二第三即無畏施四五六度皆名法施二證釋二初引偈證攝二釋攝所以初引偈證攝疏故偈云檀義攝於六資生無畏法此中一二三是名修行住記偈云下引偈釋於中初二句標第三句配第四句結也一二三者謂一攝一二攝二三攝三也是則三施為能攝六度為所攝二釋攝所以疏無著云若無精進疲倦故不能説法若無禪定即貪信敬利養染心説法若無智慧便顛倒説法記無著下攝所以也前二義顯法施義隱故疏明矣然要略明資生者資即外財也無畏者由持戒忍辱故無心害物設有冤家亦不讐報也若無精進等者起信云於諸善事心不懈退立志堅強遠離怯弱等若無禪定等者下文云云何為人演説不取於相如如不動不動即無染義也擬心即差尚名為染況貪信敬名利等豈得非愆若無智慧等者説火濕水熱地動風堅名為顛倒若説事如事説理如理則非顛倒由是開一施為三施開三施為六度開六度為萬行萬行不出六度六度不出三施三施不出一種檀那是故此中唯言布施二別釋疏三初標二列三釋所謂不住色布施不住聲香味觸法布施疏二別釋記二別釋初標疏本論但指三事記疏指三事者六境雖差統唯三事二列疏謂自身報恩果報記謂自下列三釋二初標二釋初標疏偈云自身及報恩果報斯不著記偈云下釋初二句標斯不著者斯此也不令著此三事也二釋疏護存己不施防求於異事記次二句釋存己不施者釋上自身也為著自身不行施故求異事者釋上報恩果報也此非菩薩所行正行故云異事報恩酬過去之恩果報望未來之報自身不施義當現在護亦防也意令於此三世事中防護悉皆不著即是不住色等亦施也三總結疏二初正解經文二指斥謬判初正解經文二初指前論文二顯今經意初指前論文疏三總結前但指三事記三中疏前但下意云前之三事收過未盡不妨有不著自身不著果報不為報恩而行施者亦非無住二顯今經意二初正解二引證初正解須菩提菩薩應如是布施不住於相疏今則心境空有微細盡袪記今則下顯今經意心即能緣境即所緣有即雙該心境及心境所餘收不盡者皆有字攝空者即離心境等相也問住境理有所乖離心此復何失答空有二法相待立名有之與空二俱是相隨墮一相非是常心是故此令一切皆遣微細盡袪者不論心境空有起心動念則乖法體是故一切盡令袪遣直須施時其心平等不起分別方成無住也問若然者生心動念則非無住且衆生心行任運非常若待相應畢竟無分若一向不施又不成佛因若行布施即墮住相進退不可其事云何答欲求菩提必須行施初行施時難頓相應要須用心方便隨順任運起念作意遠之用心多時自然任運得與理合從微至著漸次相應爾如起信説真如離言説名字心緣不及遂致問云若如是義者諸衆生等云何隨順而能得入故答云若知一切法雖念亦無能念可念是名隨順若離於念名為得入云云二引證疏故偈云遠離取相心論云不見施物受者施者無著云不住相想記偈云下引證上義故知心境空有等莫非相也論云下約離二執三輪釋上離相施物是法施者受者是人今皆不見則離二執名為二空二空皆離即三輪體空輪者喻也如車輪內虗方能運轉故老子云當其無有車之用三事體空能招佛果三體體實即墮世間斯則以無相輪摧三有相超世出世間也無著下但證成上義相即境也想即心也二指斥謬判疏有人將此結文為答降伏問非也前標次釋次結皆云無住都是修行中降伏之義何忽偏判配結之文為答別問記有人下指斥謬判如文四顯益疏二初科釋文意二別辨喻旨記四顯益經此亦別斷一疑應云無住則無福德疑也大雲二十七疑從此便為第一云無住有福疑今則不取為大段疑數何者緣是答問之中曲分疑也故論云得降伏心故是以次説布施利益不住相者施成就故次後方始文勢云自此已下一切修多羅示現斷生疑心也疏二一科釋文意初科釋文意二初釋徵二釋釋初釋徵何以故疏四顯益初句微者論云若離施等相想云何成就施福記若離等者釋微意也以魏云不住相想遂疑云若存施想即有施因以有施因方有施果既無施想則無施因因尚不成果何得立如放債須起若忘誰還此疑同無記心中行施也二釋釋三初法説二喻説三法合初法説若菩薩不住相布施其福德不可思量疏若菩薩下釋於中三初法説為疑無福不可思以斷之記法中亦爾不可思量者以是無相施福故不可思量二喻説須菩提於意云何東方虗空可思量不不也世尊須菩提南西北方四維上下虗空可思量不不也世尊疏東方下喻説可知記喻中東方是衆方之首是故先明南西北方如次例説法喻皆同不可思量意云非謂無空此空相對義在合中三法合須菩提菩薩無住相布施福德亦復如是不可思量疏菩薩無住相下法合二別辨喻旨疏虗空者無著云猶如虗空有三因緣一遍一切處謂住不住相中福生故二寬廣高大殊勝故三無盡究竟不窮故記虗空下二別辨喻旨遍一切處者謂色非色中皆有空故謂住下法合也住不住中皆有福故謂近感十王住中福遠招菩提不住福又近得色身住中福遠得法身不住福空雖無相非謂無空福雖不住非謂無福二者寬廣即橫遍十方高即竪窮三際大即通該橫竪如上之義法喻皆大殊勝者喻則三災不壞法則四相不遷三者無盡究竟不窮蓋一義耳然世界有盡虗空無窮有漏有窮無漏無盡三種常義厥在茲焉大抵意云無住之福遍滿一切無住之福高大殊勝無住之福究竟不窮猶如虗空思量不及以稱法界故得如斯義利昭然復何所惑五結勸須菩提菩薩但應如所教住疏五結勸記五中經但應如所教住者問前令不住此又令住住與不住何是何非答前令不住用心此令住於不住不住而住即住真空如鳥不住空却能住空若住於空即不住空也故魏經云但應如是行於布施記準此答三問已便合經終入流通分緣空生於如來答處生起疑情所以為斷斷已又起展轉滋多執盡疑除終二十七段由是更有次下經文也
