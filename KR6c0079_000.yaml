front:
  text: 佛藏奧衍閎博至汗牛充棟靡可殫究奚非三乘之妙諦五蘊之覺緣矣金剛經者廣敷般若顯示波羅自姚秦譯後而唐有圭峯之疏宋有長水之記逮明僧大彚為科會於是辭義宛然喻陳惟遠𮨇以無多流布未廣津梁衆善人等每以不及遍睹為恨友人吉川朱君爰出所獲雲捿舊本發願重刊普施大衆暢佛慧之宏略開發請之教源俾苾芻中睹指知歸有同棒喝由是超悟禪旨洞明心鏡微妙不可思議功德亦不可思議丞於經首敘而辨之以證世之受持是經者乾隆壬寅浴佛日滄浪居士孫效曾二乘菩薩學佛度生初則人我之見未除繼則我法之執尚在故空生于般若會上兩以如何應住叩請如來如來以金剛實智重重指破決斷羣疑使知真空本體不涉二邊為入道之初門實成佛之究竟宗門諸祖曾以此經印心與楞伽等至于緇白之流讀誦此經著有靈驗不可勝記蓋摩訶般若為諸經第一而此金剛般若又為八部中第一自無著菩薩之十八住天親菩薩之二十七疑依偈成解無異親承佛旨嗣是而後青龍大雲智度之類各有撰述文詞灝瀚有同淵海其最顯者有唐圭峰大師疏論纂要依文衍義統會諸家又得長水大師刊定重為作記至明雲棲沙門大轍復科會釐為十卷雖條件繁多觀者望洋而此經微言大義要稱具在夫儒者之學有十三經注疏雖後人崇尚宋儒而鄭孔之言歷久不廢今此之經或者類是歷年未久經版殘缺有密雲師教中龍象嘗欲募刻此經懷願未界今了修師廣植善緣繼續前志請于居士孫君效曾朱君玉擎等徵材集工不日而成竣事刻成問序于余余惟毗耶杜口摩竭掩室不二之門不在語言文字然末法既遠義學尤珍經之存亡教將焉繫況諸君由此一經了悟自心斷疑生信直使般若現前是為諸佛種子如所教住者豈直為前三大師功臣而已是經凡七譯此則專依秦譯科會之文各有義門惟觀者能自領之訶泉居士顧光大清乾隆四十七年巧月吉旦
