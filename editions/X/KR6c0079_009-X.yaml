body:
  text: 唐圭峰大師疏宋長水大師記後學古杭雲棲寺大科會十七斷無為何有相好疑疏二初標章敘疑二依經斷疑初標章敘疑四初標章二指疑起處三結成疑四出疑所依初標章疏十七斷無為何有相好疑記第十七疏初標章二指疑起處疏論云若諸佛以無為得名記若諸佛下指疑起處此從第三中來三結成疑疏云何諸佛成就相好而名為佛記云何下結成疑也四出疑所依疏此約法身佛故以為疑記此約下出疑所依意云既言無相法身是佛何以成就相好亦名為佛此約法身疑色身也二依經斷疑疏二初標科二分釋初標科疏斷疑之文二二分釋經二初由無身故現身二由無相故現相初由無身故現身疏二初科經二釋義初科經疏初由無身故現身須菩提於意云何佛可以具足色身不不也世尊如來不應以具足色身見記現身經問答可知何以故記徵意云以何義故不以色身見佛如來說具足色身即非具足色身是名具足色身記釋意云以約勝義非世諦故由此不應定以色身見於佛也二釋義五初指法二喻明三約性相揀收四釋相好為佛之由五約存泯會釋經文初指法疏即隨形好也記隨形好者八十種也法數如常即小相也隨其身形一一皆好故八十好即色身二喻明疏如鏡中無物方能現物故記鏡中下喻明也故知鏡中有物却不能現物如凡夫雖有法身不能現相好者葢緣有物所言物者妄身心也三約性相揀收疏論云法身畢竟非色身非諸相記論云下約性相揀收也畢竟等者約體揀疏然相好二種亦非不佛記然相好下隨相收也四釋相好為佛之由疏此二不離法身故記此二下釋相好為佛之由如金畢竟非師子亦非無金以師子不離於金故五約存泯會釋經文疏是故此二亦得言無故說非身記是故下約存泯會釋經文言無者約體而說釋即非色身疏亦得言有故說成就記言有者隨相而說釋是名色身成就者魏經即是今文具足義二由無相故現相疏二初科經二釋義初科經疏二由無相故現相須菩提於意云何如來可以具足諸相見不不也世尊如來不應以具足諸相見何以故如來說諸相具足即非具足是名諸相具足記現相經如前二釋義疏即三十二相也記三十二相者法數如常即大相也疏一一如前色身中說記一一等者前從鏡中無物已下義意並同前文已明今不別釋也十八斷無身何以說法疑疏二初標章敘疑二依經斷疑初標章敘疑三初標章二指疑起處三結成疑初標章疏十八斷無身何以說法疑記第十八疏初標章二指疑起處疏論云若如來色身相好不可得見記若如來下指疑起處此與前疑同時於第三中起起則同時斷成先後非從次前文來若言從彼來者已悟非身之身何疑無說之說思之可見三結成疑疏云何言說法記云何下結成疑也意云聲不自聲依色而發既無所依之色何有能依之聲故成疑也二依經斷疑疏二初標科二分釋初標科疏斷疑之文三二分釋經三初遮錯解二釋所以三示正見初遮錯解須菩提汝勿謂如來作是念我當有所說法莫作是念疏初遮錯解記遮錯解經文可知疏谷中無人能作音聲故記谷中下喻明也意云以有外聲遂有響答谷中實無作響之者說法亦爾法身實無能說之者以機感故遂見如來有所說法又谷雖應聲而無應聲之念佛雖說法而無說法之心據此却由無念故方能說法是故遮云勿謂等也二釋所以何以故若人言如來有所說法即為謗佛不能解我所說故疏二釋所以記釋所以經徵意云以何義故令我不作是念釋意可知疏世尊達諸法空畢竟無執今言有說是謗佛執法也記世尊下疏如文可解三示正見須菩提說法者無法可說是名說法疏三示正見記示正見經意如疏疏偈云如佛法亦然所說二差別不離於法界說法無自相記如佛法亦然者佛既無身故現身法亦無說故強說以佛例法故曰亦然二差別者論云一者能詮名句文也二者所詮義也此能所詮若望於佛俱是所說通名法也不離等者論云釋是名說法法相之界故名法界說法無自相者論云釋無法可說謂相即性故言說緣生無自性故又解不離法界下二句俱是釋無法可說謂此二種不離法界法界之外無別二法自相可得以此二法自相本空不可得故此即以下句釋上句也疏大雲云若言無說是真說法若言有說不名說法是謗佛故記真說等者夫為說法當如法說名真說法法離一切名相分別若稱此說是如法說故下文云云何為人演說不取於相如如不動記然第三第五第七及此四處皆明無說者意各不同以第三疑化身有說第五疑證智可說第七明佛無異說此文疑無身何說以此為異所說既深無信疑經三初疑甚深無信以問二揀聖性有人以酬三徵是非生信以釋記然諸疏於十八九之間約魏本經文皆出一疑龍外皆云何人能信疑雲云能信深法疑今秦經既無其文疏亦不敘而解今見近本秦文皆有此段乃於抄中略要敘釋名為所說既深無信疑論云若言諸佛說法者是無所說無說不離法身法身無相有何等人能信如是甚深法界斷之初疑甚深無信以問爾時慧命須菩提白佛言世尊頗有眾生於未來世聞說是法生信心不記經云爾時慧命須菩提白佛言世尊頗有眾生於未來世聞說是法生信心不記此疑甚深無信以問也解空第一智慧圓通以慧為命故稱慧命生信心者生大乘正信心也不信一切法方為正信此信與聖性相應故起信云如是信心成就得發心者入正定聚畢竟不退名住如來種中正因相應二揀聖性有人以酬佛言須菩提彼非眾生非不眾生記次揀聖性有人以酬記佛言須菩提彼非眾生非不眾生記須菩提下合云實有眾生能信此法彼能信者非是凡夫眾生非不是聖性眾生也論云非眾生者非凡夫體故非不眾生者以有聖體故非不是聖體眾生偈云非眾生眾生非聖非不聖此中聖體者佛之知見也以是信之根本故三徵是非生信以釋何以故須菩提眾生眾生者如來說非眾生是名眾生記次徵是非生信以釋記經云何以故須菩提眾生眾生者如來說非眾生是名眾生記何以故者徵也以何義故說非眾生又名眾生耶須菩提眾生眾生者此牒也於非眾生中說為眾生者如來說非眾生是名眾生非眾生者非愚小異生也是名眾生者結成能信之人有聖體也偈云所說說者深非無能信者記此上經文魏譯則有秦本則無既二論皆釋此文後人添入亦無所失況有冥報之緣宜亦可信十九斷無法如何修證疑疏二初標章敘疑二依經斷疑初標章敘疑四初標章二指疑起處三結成疑四預指斷疑之意初標章疏十九斷無法如何修證疑記第十九疏初標章二指疑起處疏論云如來不得一法記不得一法者指疑起處此從第三第十二第十三中來以彼文中皆言無法得菩提故三結成疑疏云何離上上證轉轉得阿耨菩提記云何下結成疑也離上上者如初地並於地前名上未離二地之上乃至等覺亦未免於妙覺之上唯佛極證更無上位之上故云離上上是則凡夫離下下諸佛離上上餘之中流不離上下轉轉等者謂轉捨二障轉得二果轉捨轉得故云轉轉意云既若轉得菩提云何不得一法故成疑也四預指斷疑之意疏為斷此疑示現非證法名為阿耨菩提記為斷下預指斷疑之意也指示顯現故云示現二依經斷疑疏二初標科二分釋初標科疏斷疑之文三二分釋經三初以無法為正覺二以平等為正覺三以正助修正覺初以無法為正覺須菩提白佛言世尊佛得阿耨多羅三藐三菩提為無所得耶佛言如是如是須菩提我於阿耨多羅三藐三菩提乃至無有少法可得是名阿耨多羅三藐三菩提疏初以無法為正覺記無法為正覺經縱問無得是得並可知矣疏偈云彼處少法知菩提無上記彼處等者此明無有一法可名為上如須彌至大微塵至小盡未免於上以皆有故如虗空無故得名無上也疏論云彼菩提處無有一法可證名為阿耨菩提記菩提處者菩提即所證處也無一法等者但妄盡覺滿名曰菩提離此寧有菩提可得二以平等為正覺復次須菩提是法平等無有高下是名阿耨多羅三藐三菩提疏二以一等為正覺記平等為正覺經亦可知疏偈云法界不增減記不增減者即釋經中無有高下謂在聖不增故無高居凡不減故無下斯則平等之義也疏論云是法平等是故名無上以更無上上故記平等名無上者夫上以待下得名下既不立上豈存焉更無下轉釋無上義記然此問答之中有三種無上義初問中言無上頭之上約修證說次則無法為上故名無上約空寂說後則無對下之上故名無上約凡聖同體說後二是答中意也三以正助修正覺以無我無人無眾生無壽者修一切善法則得阿耨多羅三藐三菩提須菩提所言善法者如來說即非善法是名善法疏三以正助修正覺記修正覺經意云然雖無法然雖平等非謂不修得成正覺應以無我等心修諸善法然後得成然此善法約勝義則無約世諦則有天親異此詳之疏無我等是了因即正道也修一切善法是緣因即助道也即得阿耨菩提是正覺也記了因者了有二義一了斷義以般若能了煩惱空故二顯了義能顯法身故今無我等即是此義亦名正因正由此慧除妄得法身故今云正道道即因義緣因者即施戒等五與彼般若為資緣故助即資也資彼正因之力斷煩惱成菩提也猶燈能破暗顯空必藉心油為助緣也是正覺者以梵語三菩提此云正覺即所證之果疏所言善法者標指也即非等者論云彼法無有漏法故名非善法以有無漏法故名為善法記無漏善者問有漏之中亦有善法何故偏局無漏耶答以無我等相所修故唯無漏也又以有漏之善非菩提因今為菩提故須無漏記問上三段中前二無得後一有證義既矛盾云何兩存答所言修者但是斷除我法顯自真理竟無一法可得由此二義宛相符順記問第三第十二第十三兼此一段前後四處皆說不得菩提如何辨異耶答前後文雖相似義意不同以第三疑釋迦得果第十二疑善慧成因十三疑無法無佛十九疑有修有證茲義迢然請無所濫二十斷所說無記非因疑疏二初標章敘疑二依經斷疑初標章敘疑四初標章二指疑起處三結成疑四立理初標章疏二十斷所說無記非因疑記第二十疏初標章二指疑起處疏論云若修一切善法得阿耨菩提者記若修下指疑起處此從十九中來三結成疑疏則所說法不能得菩提記則所說下形對前之數段結成疑也意云既言修一切善法得菩提云何前來頻言持說得菩提耶四立理疏以是無記法故記以是下成立持說不得菩提之理以名句文三無記性攝無記性法中無因果故豈感菩提耶二依經斷疑疏依經斷疑須菩提若三千大千世界中所有諸須彌山王如是等七寶聚有人持用布施若人以此般若波羅蜜經乃至四句偈等受持讀誦為他人說於前福德百分不及一百千萬億分乃至算數譬喻所不能及記經之比較如文可知疏偈云雖言無記法而說是彼因是故一法寶勝無量珍寶記雖言等者許為無記也而說等者不許非因也是故下出經意能為佛因故勝寶施疏論云以離所說法不能得大菩提故此法能為菩提因記論云下轉釋為因之由以經詮真理因之悟解依解起行方得菩提若無教門安知所入故法華云以佛教門出三界苦疏又言汝法是無記而我法是記是故勝捨無量七寶記又言下論之別意汝法無記謂小乘薩婆多宗說聲通善惡名句文身唯無記性我法是記者謂大乘宗地上菩薩於後得智中所變名等唯是善性非無記性是故等者意云只就無記尚得為因況是無漏善性所攝而不得菩提耶記問此與第九疑何別答彼約有為無體難此約無記非因難又彼唯據持說難此則兼對善法難迢然不同也二十一斷平等云何度生疑疏二初標章敘疑二依經斷疑初標章敘疑三初標章二指疑起處三結成疑初標章疏二十一斷平等云何度生疑記第二十一疏初標章二指疑起處疏論云若法平等無高下者記若法下指疑起處此從十九中來三結成疑疏云何如來度眾生記云何下結成疑也既度眾生即有高下高下即不平等故成疑也二依經斷疑疏二初標科二分釋初標科疏斷疑之文四二分釋經四初遮其錯解二示其正見三反釋所以四展轉拂跡初遮其錯解疏初遮其錯解須菩提於意云何汝等勿謂如來作是念我當度眾生須菩提莫作是念記錯解經文初正遮二再誠可知二示其正見疏二示其正見何以故記正見經徵意云以何義故令不作是念實無有眾生如來度者記釋意云以實無眾生為如來所度故疏偈云平等真法界佛不度眾生以名共彼陰不離於法界記平等下兩句立其義宗以名下兩句釋其所以疏論云眾生假名與五陰共不離法界記論云下轉釋後二句也假名者但有眾生之名而無眾生之體故云假也與五陰共者謂於五蘊和合之處說言眾生不即不離故云共也不離法界者佛是極證之人已全是法界眾生雖未能證緣生無體亦同法界豈將法界度於法界是故偈云平等等也三反釋所以疏三反釋所以若有眾生如來度者如來則有我人眾生壽者記所以經文反顯若順言之應云以佛無我人等相故不見有眾生為所度也疏論云若如來有如是心五陰中有眾生可度者此是取相過記取相過等者以無謂有故不如法界故不了緣生故便成有念故疏無著云如來如爾炎而知是故若有眾生想則為有我取記爾炎梵語此有兩義一謂智母已如前說二謂境界然是定中境界今取此義意云佛智稱境而知真如是有作有知眾生是無作無知也若作智母釋者即根本智證平等理無有分別今觀眾生亦復如是也四展轉拂跡疏四展轉拂跡須菩提如來說有我者則非有我而凡夫之人以為有我須菩提凡夫者如來說則非凡夫記拂跡經意云佛雖說我元來無我執有我者葢是凡夫雖言凡夫亦無凡夫如夢人見虎虎與夢人皆不可得法中亦爾以凡夫人執我故云非我恐執凡夫故云非凡夫邐迤除遣執情故云展轉拂迹記然前正答問中及第十一十四兼此一段前後四處皆說度生無度雖文同而意異謂最初令離我度生十一疑能度者是我十四疑無我而誰度二十一疑真界平等不合度生同異昭然二十二斷以相比知真佛疑疏二初標章敘疑二依經斷疑初標章敘疑二初標章二指疑起處初標章疏二十二斷以相比知真佛疑記第二十二疏初標章二指疑起處疏論云雖相成就不可得見如來記論云下指疑起處此從十七中來雖相等者以前文云即非具足色身即非諸相具足具足即成就義秦魏經異也疏而以見相成就比智則知如來法身記而以等者以前文云是名具足色身是名諸相具足彼中意者法身畢竟非相好相好亦非不佛由無相故現相不離法身所以疑云既無相故方能現相則但見於相便知無相也如遠見煙定知有火以離於火必無煙故二依經斷疑疏二初標科二分釋初標科疏斷疑之文五二分釋經五初問以相表佛二答因苗識根三難凡聖不分四悟佛非相見五印見聞不及初問以相表佛疏初問以相表佛須菩提於意云何可以三十二相觀如來不記表佛經問意云可以相此觀無相法身如來不二答因苗識根疏二答因苗識根須菩提言如是如是以三十二相觀如來記識根經答意云實可以相比觀法身如來疏大雲云前悟色身今迷法身記悟色身者知應化非真義也迷法身者不知法身畢竟非色相義疏意謂法身既流出相身即由此相知佛證得無相法身記意謂下出答意也意云但見法身之相好則知相好之法身如見草木之苗必知其根由是科文約喻而立三難凡聖不分疏三難凡聖不分佛言須菩提若以三十二相觀如來者轉輪聖王則是如來記凡聖不分經意云輪王亦有此相應是如來疏偈云非是色身相可比知如來諸佛唯法身轉輪王非佛記偈云等者意云但約本望末則定若約末望本則不定且如輪王與佛色相雖同相之所依二各有異佛相即法身所現王相依業因而生凡聖雲泥復何準的況依法身有自他受用復有大小隨類化等各各不同如苗與根事亦不定初栽之樹則有苗無根所接之樹則苗根各異故也四悟佛非相見疏四悟佛非相見須菩提白佛言世尊如我解佛所說義不應以三十二相觀如來記佛非相見經意云緣聞依真現假假不離真及乎約假求真真不由假實德不在相令色鮮矣仁以貌取者失之子羽而今以後焉敢不識五印見聞不及疏五印見聞不及爾時世尊而說偈言若以色見我以音聲求我是人行邪道不能見如來記見聞不及經文可見然恐空生更約說法比知如來故言音聲求之不得此疑即從第十八中來今預遮防故無後說疏魏加後偈云彼如來妙體即法身諸佛法身不可見彼識不能知記魏偈者明見聞不及之由也秦經則但明見聞不及疏偈云唯見色聞聲是人不知佛以真如法身非是識境故記偈云等者彌勒偈也於中半釋秦偈半釋魏偈意云見聞是識但能緣於色聲佛非色聲故不可知疏無著云以彼法真如相故非如言說而知唯自證知故記彼法者法身也真如相者即離一切相是真如相非如言說知者以真如法離言說故但是真智之境唯證相應故云自證記第一第七第十七及此一段皆云不以相見如來者義意皆別初以對果疑因次明感果離相次說依真現假後明約假求真故不同也二十三斷佛果非關福相疑疏二初標章敘疑二依經斷疑初標章敘疑六初標章二指疑起處三指起疑之宗四結成疑五結疑名六引證初標章疏二十三斷佛果非關福相疑記第二十三疏初標章二指疑起處疏由前相比法身是失又聞以色見聲求是邪記由前下指疑起處此從二十二中來三指起疑之宗疏遂作念云佛果一向無相無為記遂作念下作一向離相解便是指起疑之宗也四結成疑疏若爾則修福德之因但成相果相果既非佛果佛果則不以具相而得記若爾下結成疑也意云福但成相果相既非佛修福何益五結疑名疏故佛果畢竟不關福相記故佛果下結成疑名也六引證疏故論云有人起如是心若不依福德得大菩提如是諸菩薩則失福德及失果報記論云下引證失福者非菩提因故失果者非菩提果故二依經斷疑疏二初標科二分釋初標科疏斷疑之文四二分釋經四初遮毀相之念二出毀相之過三明福相不失四明不失所以初遮毀相之念疏初遮毀相之念須菩提汝若作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提莫作是念如來不以具足相故得阿耨多羅三藐三菩提記遮念經意云汝若謂如來不以具足相故得菩提莫作是念文勢似重意實不重但前敘後遮也疏華嚴經云色身非是佛音聲亦復然亦不離色聲見佛神通力記華嚴偈中前半屬前文後半屬此段以文意鈎鏁故就一處而引既言不離色聲豈合一向毀相毀相非理故此遮之疏肇云不偏在色聲故言非非不身相故復言是記肇云下亦前後相半耳不偏等者相不定故如輪王非佛非不等者應機即現不離法身故如釋迦是佛疏大雲云若言如來不以相具斷滅見矣故佛止云莫作是念記斷滅見者義在次文二出毀相之過疏二出毀相之過須菩提汝若作是念發阿耨多羅三藐三菩提心者說諸法斷滅莫作是念記出過經文可知疏毀相則墮斷滅斷滅是損減之過斷見邊見之過記損減等者謂執有是增益過執無是損減過今既一向離相正當此句斯則於果損福德莊嚴於因損五度之行壞俗諦也斷見者中論云定有則著常定無則著斷今既一向作無相解正當斷見邊見者空有斷常皆是著邊邪之見並非正見故云過也三明福相不失疏三明福相不失何以故發阿耨多羅三藐三菩提心者於法不說斷滅相記不失經徵意云以何義故令不作此念釋意云但發菩提心者皆不作此念故知作此念者豈非過歟疏無著云於法不說斷滅者謂如所住法而通達不斷一切生死影像法於涅槃自在行利益眾生事此中為遮一向寂靜故顯示不住涅槃記如所住法者所住之法即大菩提心菩提心者即悲智願也一切菩薩皆安住此心行菩薩行有大智故不住生死有大悲故不住涅槃今令離於斷常二見即是不住生死涅槃故云如所住法即七最勝中依止最勝不斷等者意云生死本空猶如影像影像不有復何斷焉今言不斷者非謂固留但了性不有了相不無隨順俗諦故云不斷此即通達之義於涅槃等者若被寂所縛即不自在今寂而常用用而常寂是自在義此中下顯偏說之意然據不斷生死利益眾生但成大悲不住涅槃如其具論亦須不住生死方成如所住法一向下即出偏說之意遮寂者即二乘人灰身滅智撥喪無餘被涅槃所拘是不自在今以不具相發心正墮於此為對治故偏示一門下文菩薩不受福德即不住生死義則圓矣疏偈云不失功德因及彼勝果報記偈云下引證疏論云雖不依福德得真菩提而不失福德及彼果報以能成就智慧莊嚴功德莊嚴記論云下釋偈雖不依下縱也法身真佛是真菩提正由智了為因故不依彼而不失下奪也福德是因即五度果報是果即三十二相相非不佛故言不失既不失果即不失因以能下明不失之由謂真菩提必須具足二莊嚴故智慧即真身福德即應身故論云法身者智相身福相者異相身以諸如來皆合具此二種相故故法華云如其所得法定慧力莊嚴以此度眾生自證無上道四明不失所以二初明得忍故不失二明不受故不失初明得忍故不失疏四明不失所以二初明得忍故不失須菩提若菩薩以滿恒河沙等世界七寶布施若復有人知一切法無我得成於忍此菩薩勝前菩薩所得功德記得忍經意云菩薩於無我心中所修福德勝彼有我心中所修福德以莊嚴法身究竟不失故疏論云有人起如是心諸菩薩得出世智失彼福德以果報為遮此故記論云下先敘所遣之念念云若出世無分別智正是佛因即所修福德盡皆失也何以故福非因故為遮此故者引起能遣之文疏偈云得勝忍不失以得無垢果記得勝忍不失者正明不失義謂若心住相修諸福德墮於有漏此福則失若心離相修諸福德成於無漏此福不失也以得下出不失之由斯則以果驗因成不失義無垢即清淨無漏是佛身矣疏無我者二種無我也記二無我者人法也得此二空之智名之為忍二明不受故不失二初正明二徵釋初正明疏二明不受故不失二初正明須菩提以諸菩薩不受福德故記正明經意云前言無我所修之福以為勝者只由菩薩不受福故疏論云彼福德得有漏果報故可訶也記可訶等者明不受之由亦是以果驗因成不受義意云果若有漏則知受福是可訶責果既無漏則知不受云何可訶疏無著云此顯示不著生死故若住生死即受福德記無著下顯對前文不住涅槃前後相望共成非智之義耳若住等者反明也二徵釋疏二徵釋須菩提白佛言世尊云何菩薩不受福德須菩提菩薩所作福德不應貪著是故說不受福德記徵釋經意云菩薩作福若生貪著則成有漏因既有漏果亦有漏得三十二相但同輪王不名為佛此則因果俱失成其所疑今既作福不生貪著則因成無漏因既無漏果亦復然所得三十二相莊嚴法身名之為佛云何疑其失因及果二十四斷化身出現受福疑疏二初標章敘疑二依經斷疑初標章敘疑三初標章二指疑起處三結成疑初標章疏二十四斷化身出現受福疑記第二十四疏初標章二指疑起處疏論云若諸菩薩不受福德記若諸菩薩下指疑起處即從次前文來論中即云若菩薩不受彼果報等三結成疑疏云何諸菩薩福德眾生受用記云何下結成疑也眾生用者據佛壽量合滿百年至八十便入涅槃意留二十年福與後代弟子受用又於佛供養承事能令眾生獲福無量斯亦佛福眾生受用也記問前云菩薩不受今何難佛受用又前言受是取義今疑受是用義文義既異何以成疑答此皆以果驗因也因中若不受取果中焉合受用果中尚自受用因中豈無受取耶二依經斷疑疏二初標科二分釋初標科疏斷疑之文二二分釋經二初斥錯解二示正見初斥錯解疏初斥錯解須菩提若有人言如來若來若去若坐若臥是人不解我所說義記錯解經意云若人言如來出現來入滅去住世間皆不解我所說義疏偈云是福德應報為化諸眾生自然如是業諸佛現十方記是福等者是彼無漏福德之應報即無垢果也果中無有色相故論云佛果無有色相迭相見故又論云佛果無別色聲唯如如及如如智獨存故無來去等為化下或問曰既佛果無別色聲來去等何以出現受福為眾生受用耶故此釋之意說眾生根熟為能感緣以佛無緣大悲無量劫來利他善根熏淨法界以成善習有感即應任運無心如一月不下降百水不上昇慈善根力法爾如是正是斷疑之意若果中有心受用則因中亦有心受取果中既是自然因中足明無著也二示正見疏二示正見何以故如來者無所從來亦無所去故名如來記正見經徵意云以何義故名為如來既名為來亦表其去何言錯解釋意云以真佛本來無來去故疏偈云去來化身佛如來常不動記偈云下標真化異也如來即是法身本來不動猶若虗空故不同化身隨機來去此非異而異也疏大雲云眾生心水若清淨則見佛來來無所從濁則見雙林示滅則云佛去去無可至記大雲下釋此約機心染淨遂見佛有來去名為化身來無所從去無所至即是不動名為法身斯則機見有佛來去佛實不動云云自彼於彼何為此中略舉水喻眾生心則知月喻法身影喻化體清濁喻染淨也水清月現月亦不來水濁月隱亦非月去但是水有清濁非謂月有昇沉法中亦爾心淨見佛非是佛來心垢不見亦非佛去但是眾生垢淨非謂諸佛隱顯疏肇云解極會如體無方所緣至佛現來無所從感畢為隱亦何所去記解極等者謂解極則心絕心絕則會如如體本周故無方所此明即應之真緣至下明即真之應也意同大雲隱顯記斷疑意者諸佛本無來去眾生妄見去來尚無出現之佛寧有受福之事
