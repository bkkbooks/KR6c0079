body:
  text: 唐圭峰大師疏宋長水大師記後學雲棲寺沙門大科會四釋通文義二初解題目二釋經文初解題目二初科經二釋義初科經疏第四釋通文義二初解題目金剛般若波羅蜜經二釋義二初釋所詮二釋能詮初釋所詮三初釋金剛二釋般若三釋波羅蜜初釋金剛二初翻名示相二約法辨義初翻名示相疏金剛者梵云䟦折羅力士所執之杵是此寶也金中最剛故名金剛帝釋有之薄福者難見記疏釋通文義二初題目二初釋所詮三初釋金剛二初翻名示相梵云下新云縛左羅力士所執者如經所說執金剛神梵云諾建那此云露形神即此力士也金中最剛者金語通五此最精堅故安剛字仍非人間之物故云帝釋有之乃是天上至寶故云薄福者難見正理論云帝釋有寶名曰金剛不為薄福眾生所見二約法辨義二初引經論總彰二義二引真諦別示六種初引經論總彰二義三初總標略辨二引教委釋三結顯喻旨初總標略辨疏極堅極利喻般若焉無物可能壞之而能碎壞萬物記疏極堅下二約法辨義二初引經論總彰二義三初總標略辨為有勝能故云極堅極利喻般若焉無物下釋極堅等相則知若有一物能壞則非極堅若有一物不碎則非極利也如銀鐵雖堅遇火則融刀劍雖利斫石則缺非極堅利也揀餘堅利故加極字二引教委釋二初引經二引論初引經疏涅槃經云譬如金剛無能壞者而能碎壞一切諸物記疏涅槃下二引教委釋涅槃下引經二引論疏無著云金剛難壞又云金剛能斷又云金剛者細牢故細者智因故牢者不可壞故記無著下引論難壞即堅義能斷即利義細牢者細謂揀麤顯是微妙牢揀可壞堅固義成智因即是慧慧是智之因智是慧之果此約觀照般若說以微細故能入於惑令彼滅也不可壞者智論云一切語言名相等事皆可破壞唯無相智不可破壞此約實相般若說問實相般若分因果耶答用有勝劣故分因果體無增減因果一如故普賢觀云大乘因者諸法實相大乘果者亦諸法實相華嚴經疏云理開體用名大方廣智分因果號佛華嚴三結顯喻旨疏皆以堅喻般若體利喻般若用記疏皆以下三結顯喻旨此結所引經論之義然先上諸德皆用此義資聖云金剛者堅而復利堅喻本覺真性雖流轉諸趣而覺性無壞利喻般若淨照三賢十地貫通萬行無明惑暗無不壞也肇云金剛者堅利之譬也堅故物不能沮利故物無不摧以況斯慧邪魔不能毀堅之極也萬物皆能破利之義也又諸經論說金剛喻定勝鬘經說金剛喻智梵網經以十迴向為十金剛仁王謂十堅心淨名以金剛慧決了此相無縛無脫得無生法忍又諸經論說金剛座金剛山金剛輪如是等說皆取堅利義也又晉武帝起居注云武帝十三年燉煌有人獻金剛寶生於金中色如紫石英狀如蕎麥百鍊不銷可以切玉如泥是知堅利之極也二引真諦別示六種二初正明六種二結示傍正初正明六種二初總標二別列初總標疏又真諦記說六種金剛記疏真諦下二引真諦別示六種二初正明六種一一以法合之分明在疏皆般若之功也二別列六初青色二黃色三赤色四白色五空色六碧色初青色疏一青色能消災厄喻般若能除業障記災厄等者有厄則災禍必來有業則苦果定至厄除則災禍不起業喪則苦果不生二黃色疏二黃色隨人所須喻無漏功德記隨人所須有二意一則如餘物不能隨所須金不可為銀用羅不可為錦用等金剛則不然要者皆得法中亦爾有漏功德人不可為天富不可為貧無漏不爾隨心所成二則餘物用之則盡金剛出之不窮法上亦爾有漏受之則窮無漏受之不盡三赤色疏三赤色對日出火慧對本覺出無生智火記對日等者慧即始覺合本覺時見法無生名無生智如起信云得見心性心即常住常住即無生義也火出燒盡世間使六合空廓智起斷除煩惱令大道通同四白色疏四白色能清濁水般若能清疑濁記能清等者水清則萬像齊鑒疑除即佛法現前五空色疏五空色令人空中行坐慧破法執住真空理記空中等者昇太虗則不履於地住真空則不墮世間六碧色疏六碧色能消諸毒慧除三毒記銷諸毒者中毒則令人命終起惑則永沉生死毒除則延年益壽惑遣則不滅不生二結示傍正疏傍兼可矣非堅利之本喻記疏傍兼下二結示傍正佛所立名本約堅利如上六義乃是兼明諸家至此多不料簡殊濫正義若將此六配前五因即一當第三二三當四五四當第二五六當第一二釋般若二初翻名略指二引教廣辯初翻名略指二初翻名二指體初翻名疏般若正翻云慧記疏般若下二釋般若二初翻名略指般若正翻慧者以古來諸德義翻為妙慧淨慧無相慧此皆挾到彼岸義是別相也或云智慧今云正翻慧者即通相也二指體疏即照五蘊空相應本覺之慧是也記即照下約功用以出體也照蘊空即是功用本覺之慧即是出體大品云色如聚沫受如泡幻想如陽𦦨行如芭蕉識如幻化如是觀者名照蘊空相應等者本覺即如來藏自性清淨心非新生故言本不頑暗故言覺慧即始覺也依體起用故云之慧始即同本故曰相應然本覺與慧不一不二以不二故故言相應以不一故故言之慧故資聖云妄心見俗曰無明悟心照真為般若俗境萬有見心必異真空理一悟自無差第一義空離照無理清淨本覺即理是照又涅槃云佛性者名第一義空第一義空名為智慧此等皆證體用非一非二義也然本即實相始即觀照二引教廣辯二初引論別相釋二引經通相辯初引論別相釋二初明總攝三慧二引論文釋成初明總攝三慧疏若約學者從淺至深言之則攝聞思修三慧總為般若記疏若約下二引教廣釋二初引論別相釋二初明總攝三慧學者即修大乘行人也初須聞法生解名聞慧次則測度所聞評量教理分明忍可以印自心曰思慧然後如聞思處依而行之無所乖越名修慧前二有漏後一無漏前淺後深深淺雖殊通名為慧是故總收名為般若如人攻文赴舉及第雖前劣後勝皆一人也云云二引論文釋成二初正釋成二配因果初正釋成疏故無著云能斷者般若波羅蜜中聞思修所斷如金剛斷處而斷故記疏故無著下二引論文釋成二初正釋成波羅蜜中等者此明頓悟中漸修也慧纔發時照萬法空便到彼岸名為頓悟由有多生習性未得念念相應故須聽聞正法思惟其義如說修行方得究竟證入名為漸修開題中略明也若唯識中說則具根後二智謂十度中六通本後四唯後得六中則二智皆具為分十度故第六偏取二空本也今依無著更加加行智則通前三矣金剛斷處等者如金剛斷物之處而斷煩惱非謂金剛亦通所斷二配因果二初雙引論二雙解釋初雙引論二初引無著二引智度初引無著疏又云細者智因故者智因即慧也記疏又云下二配因果二初雙引論上者字論牒所標下者字疏牒論文智因即慧慧果即智也前雖引用今方解釋此引無著也二引智度疏依智度論因位名般若果位名智記次引智論可知二雙解釋二初正解釋二出所以初正解釋疏則聞思修皆名為細細妙之慧佛智之因矣記疏則聞下二雙解釋此明法空深慧意揀我空慧為麤淺不為佛因但是二乘因故二出所以疏般若能斷故在因位佛果無斷轉受智名記般若下出所以以慧是揀擇義揀擇惑障顯無為故以因位有惑故須擇之乃名為慧智但決斷為義以果位無惑但唯決定朗然獨照故名為智只是一法受此兩名如人破賊為將功成為相也有說以無漏智性為智因大雲破之三塗有性何不斷惑闕細義也此約妙慧別相以破若就通相取亦可矣以凡是有心皆成佛故此得是因也二引經通相辯二初引經二辯體初引經疏若依大品經若字通智慧二義記疏若依下二引經通相釋此明字緣字界若字是字界般那都為緣若以般為緣助於若界則名為慧若以那為緣助於若界則名為智如僧人俗人等云云二辯體疏故智與慧名義少殊體性無別記名殊謂曰智曰慧義殊謂決斷揀擇此中義殊故使名殊也體性無別者皆別境中一也前三種智皆名慧故故智與慧皆如金剛故薩遮尼乾經云帝釋金剛寶能滅阿脩羅智碎煩惱山能壞亦如是無常經云金剛智杵碎邪山永斷無始相纏縛三釋波羅蜜三初約語對翻二約義順釋三順義通結初約語對翻疏波羅蜜者此云彼岸到應云到彼岸記疏波羅下三釋波羅蜜文三初約語對翻應云下迴梵文以西域風俗例皆如此云云青龍云蜜多者離義到義元康云天竺風俗所作究竟皆云到彼岸到離之義次文明之二約義順釋二初釋義二通難初釋義二初正釋到離義二因明彼岸義初正釋到離義疏謂離生死此岸度煩惱中流到涅槃彼岸記疏謂離下二約義順釋二初釋義前三句中每句皆上法下喻意明煩惱如大河難可度故生死如此岸有情居故涅槃如彼岸諸佛住故則慧是能離能度能到生死等是所離所度所到若欲離此到彼必須渡於中流此約四諦說之理則明矣知苦是離此岸斷集修道是渡中流證滅是到彼岸也此順小乘義說下經令入大乘無餘涅槃即須離二種生死此岸乘六度船筏度二障中流到二涅槃彼岸二因明彼岸義疏涅槃此云圓寂亦云滅度記涅槃等者以翻波羅蜜為彼岸即是涅槃是故約轉依果明彼岸義然生死即分段變易煩惱即總該二障圓寂者義翻也謂德備塵沙曰圓妙絕相累曰寂滅度者肇云涅槃者秦言無為亦云滅度或但云滅然滅與小乘不同小乘以滅生死為滅大乘以寂滅為滅故涅槃云生滅滅已寂滅為樂然滅唯據果滅度乃兼因今則約果標因故云滅度所以經中上言涅槃下云滅度亦是唐梵雙彰也涅槃種類下文具明二通難二初引經作難二據義釋通初引經作難疏一切眾生即寂滅相不復更滅記疏一切下二通難此即淨名經文彼云若彌勒得授記者一切眾生亦應授記何以故一切眾生即寂滅相不復更滅等今用此文以為難辭難意云眾生既即寂滅何有離此到彼今言到彼者莫違經耶二據義釋通疏但以迷倒妄見生死名在此岸若悟生死本空元來圓寂名到彼岸記但以下釋通但約翻迷成悟便是離此到彼若悟此已漸除漸證名為究竟然成波羅蜜要與七最勝相應如唯識說三順義通結疏若兼般若迴文應云到彼岸慧記疏若兼下三順義通結則是波羅蜜中之聞思修慧也二釋能詮二初翻名二釋義初翻名疏經者梵音修多羅義翻為契經記疏經者下二釋能詮二初翻名修多羅或云修妬路或云素怛覽此但梵音楚夏之異耳義翻者以修多羅正翻云線由西天以修多羅一名召於四實謂聖教席經井索線彼多以華獻佛置之案上恐風吹散以線貫之又見此方聖教能持佛語得無所遺如線貫華故以線稱目之就彼處呼曰修多羅據此正翻即合云線此方不貴線稱故翻為經斯則暗符彼方席經兼順此土儒道之經然雖符順彼此而未免相濫由是更加契字以揀異之然更合於修多羅上加欲底二字翻為契經則唐梵皆足也二釋義二初釋契字二釋經字初釋契字疏契者詮表義理契合人心即契理契機也記契者下二釋義詮表下釋契字詮表義理釋契理也謂說事如事說理如理云云契合人心釋契機也謂令人有所悟解歡喜信受云云斯則契理契機之經依主釋也文雖是倒意以經是能契也二釋經字疏經者佛地論云能貫能攝故名為經以佛聖教貫穿所應說義攝持所化生故記經者下次釋經字初標以佛下釋如開題處明已今唯言經而不言契者以為有般若揀濫明非道德等經故不言也二釋經文二初科分二隨釋初科分疏後釋經文准常三分初序分二正宗分三流通分記後釋下二釋經文疏二初科分斯則道安法師所判但是佛經無問大小皆科為三意云序分彰說法之由致正宗暢本意之玄門流通繼遐芳於萬古冥符西域今古通遵此經從如是至敷座而坐是序分時長老下至應作如是觀是正宗分佛說是經下至信受奉行是流通分二隨釋三初序分二正宗分三流通分初序分二初證信序二發起序疏初文二初證信序二發起序記證信者即六成就也顯說聽時處一一分明以證非謬令物生信故發起者則以事相表示發起正宗法義也然此二序更有異名謂通序別序通謂諸經同故云云別謂諸經別故云云亦謂經後序經前序經後序者佛說之時未有結集之時方安立故經前序者佛先發起方說經故初證信序三初明建立之因二明建立之意三正釋文義初明建立之因疏今初證信序釋此分三一明建立之因則佛臨滅度阿難請問四事佛一一答我滅度後一依四念處住二以戒為師三默擯惡性比丘四一切經初皆云如是我聞一時佛在某處與某眾若干等記疏中三段今初云云疏建立因者意明如是等言因何而立佛臨下佛將入滅阿難愁惱阿泥樓豆告阿難言汝是持佛法人且須裁抑汝當往彼咨問後事阿難曰云何後事阿泥樓豆曰世尊在日以佛為師世尊滅後以誰為師世尊在日依世尊住世尊滅後依何而住惡性比丘佛在之日佛自調伏佛滅度後如何調伏遐益後來理宜結集一切經首置何等言阿難承教一一咨問今疏影略不載問辭但書答語也四念處者四即身受心法念謂念慧處謂身等即是念慧所安住處則念是能住身等四處為所住於此四處安住念慧名四念處住帶數釋也一觀身不淨即有漏色蘊具有五種不淨一種子不淨乘過去業識種子攬現在父母精血合成身故故淨名云是身如幻從顛倒起是身如影從業緣現智論云是身種不淨非餘妙寶物不從華間生唯從穢道出二住處不淨於母胎中居生藏之下熟藏之上常受熏穢故智論云是身如臭物不因華間生不從薝蔔有亦不出寶山三自體不淨合三十六物以成身故謂外有𩬊毛爪齒眵淚涕唾垢汗便利等十二次有皮膚血肉筋脉骨髓肪膏腦膜等十二中有脾腎心肺肝膽腸胃赤痰白痰生藏熟藏等十二智論云地水火風質能盛受不淨傾海洗此身不能令香潔四自相不淨九孔常流不淨物故智論云種種不淨物充滿於身中常流出不止如漏囊盛物五究竟不淨一旦命終胮脹爛壞臭惡狼籍不堪見故淨名云是身假以澡浴衣食必歸磨滅智論云審諦觀是身終歸於死處難御無反復背恩如小兒金光明亦云雖常供給懷怨害終歸棄我不知恩二觀受是苦者受即是心所徧行五中一也仍有三種謂苦樂捨苦謂苦苦樂謂壞苦捨謂行苦問樂受未壞應非苦耶答以樂是苦因故凡夫妄計為樂元來是苦問捨非苦樂云何苦耶答行蘊遷流逼迫常苦但以苦樂麤相所覆常情不知此微細苦故此三法俱名苦也三觀心無常者心即緣慮生滅之心謂心心念念前滅後生相續不絕如水流注故經中說一念中有九十剎那一剎那中九百生滅四觀法無我者法即五蘊謂五蘊法中一一推求即蘊離蘊皆無我也如上觀之即能對治凡夫四種顛倒謂凡夫顛倒則造業受生反此用心自然無咎以戒為師者從其軌範但依戒律作止分明故菩薩戒序云波羅提木叉者是汝大師如來在日無異此也默擯等者佛法慈悲為無刑罰比丘惡性唯默擯之意令省己知慙自然調伏耳經初等語釋在次文然此四中意在第四文中承便兼帶前三二明建立之意疏二明建立之意意有三焉記疏建立意者建立如是等言意在於何此有三意如疏三段疏一斷疑故謂結集時阿難昇座欲宣佛法感得自身相好如佛眾起三疑一疑佛重起說法二疑他方佛來三疑阿難成佛故說此言三疑頓斷記斷疑等者智度論說佛滅度後諸天王等請迦葉言乃至云法城欲頹法幢欲倒當以大悲建立佛法迦葉受請往須彌頂擊大揵槌諸聖弟子得神通者皆來集會迦葉告言佛法欲滅眾生可愍待結集竟隨汝入滅諸來聖眾受教而住畢鉢羅窟迦葉入定以天眼觀今是眾中誰有煩惱應逐出者唯有阿難煩惱未盡爾時迦葉從定而起於大眾中牽出阿難告言清淨眾中結集法藏汝結未盡不應住此是時阿難慙耻悲泣告迦葉言我能有力久可得道但為侍佛以阿羅漢者不得給侍故留殘結不盡斷爾迦葉告言汝更有過佛意不聽女人出家為汝慇勤致請令佛正法五百歲衰微是汝突吉羅罪佛臨涅槃近俱尸竭城背痛疊多羅僧敷臥語汝須水汝不供給是汝突吉羅罪佛昔問汝若有人好修四神足應住壽一劫若無減一劫為汝不對令佛早入涅槃是汝突吉羅罪汝於一時以多羅僧襯身而臥是汝突吉羅罪汝昔與佛疊僧伽棃衣以足踏上是汝突吉羅罪佛陰藏相入涅槃後以示女人實為羞耻是汝突吉羅罪迦葉言汝有如是六種突吉羅罪應於僧中悔過是時阿難脫革屣袒右肩長跪合掌依六種突吉羅罪懺悔懺悔已迦葉牽阿難出語言汝漏盡可來言訖自閉窟門是時阿難涕淚悲泣求斷結惑靡不精誠至於後夜疲極偃息頭未至枕朗然得悟三明六通作大羅漢却至窟門擊門而喚迦葉言汝復何來曰我漏已盡迦葉言汝若漏盡可縱神通於戶鑰孔中入阿難騰身入來禮拜僧足迦葉手摩阿難頂言我欲為汝令汝得道汝勿嫌恨此如蘇秦張儀云云然階聖果切在修心不如說行事佛何益狐假虎威宜其止絕斯意甚妙詳而警之時大眾請阿難昇座結集法藏既昇座已未發言間感得自身相好如佛是時大眾遂起三疑故說下既言我從佛聞則知非佛重起非他方佛來亦非阿難成佛故云三疑頓斷廣如彼論恐煩略敘也疏二息諍故若不推從佛聞言自製作則諍論起記疏息諍等者同為羅漢德業頗齊若云自言固宜喧諍疏三異邪故不同外道經初云阿憂等記疏異邪等者阿者言無憂者曰有外道意云萬法雖異不出有無置之經初以之為吉以初吉故令中後亦吉今則不爾故云異邪三正釋文義二初標列述意二依科解釋初標列述意疏三正釋文義具六成就謂信聞時主處眾六緣不具教則不興必須具六故云成就記疏正釋下二初標列述意言成就者謂六為能成就教為所成就也二依科解釋六初信成就二聞成就三時成就四主成就五處成就六眾成就初信成就二初合釋二單釋初合釋疏一信若兼我聞合釋則指法之辭也如是之法我從佛聞記疏一信下二依科解釋六初中二初合釋謂兼次段合而釋之此則別義不計六數二單釋三初引智度論二引劉虯注三引梁武帝解初引智度論二初標二釋初標如是疏單釋如是者智度論云信成就也記單釋謂正釋信成就義所引論文有標有釋二釋二初答問二正顯初答問疏佛法大海信為能入智為能度記佛法下是釋或曰因何最初便明其信故此釋也信為能入者然佛法無量信為初基若無信心寧肯修習由是五位之內信位居初十信之中信稱第一十一善法信亦為先故知信心之前更無善法依此信本方興解行乃至證入故華嚴云信是道源功德母長養一切諸善根斷除疑網出愛河開示涅槃無上道今置經首以表信相為入法之初也智為能度者菩薩萬行非智不成若無智慧即滯有著空以智為主不著二邊成無漏因獲菩提果故菩提資糧論云施戒忍進定及此五之餘皆由智度故波羅蜜所攝二正顯疏信者言是事如是不信者言是事不如是記信者下正顯如是二字是信之辭上皆智論所釋二引劉虯注疏又聖人說法但為顯如唯如為是故稱如是記又聖下是劉虯注無量義經中釋此下皆約法說也顯如者眾生如隱故沉三界欲絕三界只要顯如故云但為除如之外餘皆虗妄故云唯如為是論云除諸法實相餘皆魔事又云始從得道乃至涅槃其中所說無不為如三引梁武帝解二初雙融顯如二雙遮顯是初雙融顯如疏又有無不二為如記又有下即梁武帝解意明有即無故不有無即有故不無相即同時故名不二不二即如也此約雙融顯如也二雙遮顯是疏如非有無為是記如非下恐聞有無不二為如便謂如體是有是無故此遮云如非有無意明有無即不是是即非有無也記此上二解如字是顯體是字即無非也二聞成就二初正釋我聞之義二商較所聞之法初正釋我聞之義二初正釋二通難初正釋我聞疏二聞我即阿難五蘊假者聞謂耳根發識記疏二聞下二初正釋我聞之義然我有四種一凡夫徧計我二外道神我三三乘假我四法身真我今揀餘者故云五蘊假者則第三隨世流布要揀賓主乃稱於我阿難已達我空實不計執故云假者聞者然大小乘諸論辨聞不同有云耳根或云耳識或云根識和合故聞今云耳根發識則後義也以根識單闕皆不能聞云云然根識聞聲而不聞教若準名句唯是意聞故瑜伽云聞謂比量然由耳識緣於聲境與意同時得聞也然此二識聞聲名句實非先後異時以率爾耳識同時意識故得聞也五識皆然二通難疏廢別從總故云我聞記廢別下或曰既云耳根發識故聞合云耳聞云何經內唯言我聞故此釋也以耳是六根之別我是一身之總今廢別耳從其總我故言我聞二商較所聞之法二初牒難辭二通釋初牒難辭疏阿難所不聞二十年前之經記阿難下二商較所聞之法前二句牒難辭謂阿難是佛成道夜生年至二十方為侍者二十年前佛所說法並其不聞何得結集諸經皆稱我聞二通釋二初姑約佛力二姑約自力三直推其本初姑約佛力疏有云如來重說記有云下通釋此有三意有云重說者一也佛初命阿難為侍者阿難從佛乞三願一不著佛退衣二不隨佛受別請三請說未聞之法佛隨其願故得聞也二姑約自力疏有云得深三昧總領記得深三昧等者二也金剛華仙經云阿難得法性覺自在三昧力故前所說經皆能憶持與聞無異故法華經云世尊甚希有令我念過去無量諸佛法如今日所聞三直推其本疏若推本而言即阿難是大權菩薩何法不通記若推下三也不思議境界經云復有百千萬億菩薩現聲聞形亦來在座其名曰舍利弗乃至阿難等是則三中前二權說後一實論故言推本也三時成就二初揀顯釋二會法釋初揀顯釋二初顯釋二揀釋初顯釋一時疏三時師資合會說聽究竟故言一時記疏三時下二一揀顯釋師資合會者謂說者教人以道德曰師資者取也從師之教取而行之也佛及大眾說聽具足故云合會說畢聽畢故云究竟意取說無異席貫通首末故曰一時佛地論云此就剎那相續不斷說聽究竟總名一時一時之語佛自言故涅槃云昔佛一時在尸首林又云我於一時在迦尸國此則顯說聽能所一切圓畢也二揀釋疏諸方時分延促不同故但言一記諸方下揀時也不同有二謂橫則參差不同豎則延促不同延促不同如人間五十年四天王天一晝夜上上倍增故參差不同者如俱舍云夜半日沒中日出四洲等既然云何定言寅卯辰巳日月等耶二會法釋疏又說法領法之時心境泯理智融凡聖如始本會此諸二法皆一之時記又說下二會法釋此是慤公楞嚴疏意說領即師資也下有四對心境泯者以聞法之時妄心不起心既不起境即不生心境兩忘故云泯也此即不得以生滅心行聽實相法此通依計故皆泯也斯則染心俗境一對理智融者以聽法之際能所不分以動念即乖法體二皆真實故言融而不言泯也斯則淨心真境一對凡聖如者由心分別則見聖見凡心既不生誰凡誰聖相本自盡故言如也斯則因果一對本始會者妄念起時隔於本始念既不起本始自同攝用歸體故言會也斯則體用一對問此與第二何別答前智是始覺中根本智前理是本覺中真諦境若此始本本通真俗始含本後則前狹後寬也前為形染且言真境淨智此為都明故言本覺始覺也又前約分證故云理智融此約極證故言本始會也諸二者謂心境理智凡聖本始也皆一者一義不同謂心境則泯之故一理智則融之故一凡聖則如之故一本始則會之故一義雖不同俱名為一故云一時四主成就二初翻名二釋義初翻名佛疏四主具云佛陀此云覺者記疏四主下二初翻名經唯標佛者以秦人好略故仍存梵音者恐濫菩提故以菩提云覺則屬於法今指於人故言其佛無相濫失故不翻也若釋其義須得唐言故先翻對也然覺謂覺察覺悟覺悟即照真本有覺察則了妄本空了妄本空則不逐於妄照真本有則不迷於真真妄既明則能破和合識滅相續心顯現法身智純淨也當爾之時始本無二唯一覺耳菩薩雖亦照真了妄未得究竟猶帶薩埵之名唯佛如來所作究竟故獨稱覺者二釋義二初引論正釋二引論反釋初引論正釋二初約體離念釋二引位三義釋初約體離念釋二初引文二結義初引文疏起信云所言覺義者謂心體離念離念相者等虗空界即是如來平等法身二結義疏則以無念名之為佛記起信下二釋義二一約體離念釋然此論明本覺心體性離諸念今此引釋果佛者以果佛之體即是本覺元自離念因果雖分離念無別故以本覺離念即是佛體故經云大乘因者諸法實相等是故在纏名本覺出纏名究竟覺始終體一更無別法故論云即是如來平等法身依此法身說名本覺則以下疏結本覺離念是佛體也二約位三義釋二初總標二別釋初總標疏然覺有三義記然覺下二約位三義釋二別釋三初自覺二覺他三覺滿初自覺疏一自覺覺知自心本無生滅記無生滅者謂智照真如如理見故然有二意一則心中無生滅之法如起信云如實空者從本已來一切染法不相應故以念生則染今既無念故不相應二則無者不也只明此心本不生滅即同起信云以遠離微細念故得見心性心即常住常住即無生滅也二覺他疏二覺他覺一切法無不是如記覺他者此亦始覺了事即真以望自心故名覺他即同起信云一切諸法從本已來離名字相離心緣相畢竟平等無有變異不可破壞唯是一心故名真如三覺滿疏三覺滿三覺理圓稱之為滿記覺滿者以前二覺有解有證先後勝劣存自他之相未得稱滿今此圓備不立自他故稱之滿記若準涅槃經說自覺者覺自身有佛性覺他者覺一切眾生悉有佛性覺滿者若自若他無二佛性故記然常途所說自覺揀凡夫覺他揀二乘覺滿揀菩薩此中說者自覺便揀二乘權教菩薩豈唯凡夫故華嚴云一切諸法性無生亦無滅奇哉大導師自覺能覺他二引論反釋三初反顯二引證三順結初反顯疏故知有念則不名覺記故知下二引論反釋三初反顯意云無念故名覺當知有念則不名覺也二引證疏起信云一切眾生不名為覺以無始來念念相續未曾離念記起信下二引證前云心體離念雖通因果今明眾生不名為覺獨顯果人方名覺也三順結疏又云若有眾生能觀無念者則為向佛智故記又云下三順結正結無念是佛義以無念是佛故能觀無念者即是向佛智也五處成就二一釋舍衛二釋秪園一釋舍衛在舍衛國疏五處舍衛此云聞物謂具足欲塵財寶多聞解脫等遠聞諸國故義淨譯云名稱大城記疏五處下二一釋舍衛舍衛亦云舍婆提新云室羅伐悉底此但梵音楚夏耳此城在中印土憍薩羅國緣南天亦有憍薩羅國恐濫彼國故以城為國名聞物者謂名聞勝德珍奇寶物多出此國謂具下釋欲塵即佳麗女色財寶即珍奇寶物多聞謂博通內外典籍解脫即五通仙人等遠離欲也此即國豐四德亦翻為豐德也遠聞等者如上四事皆為外國之所聞知義淨下但證遠聞之義以有名稱故得遠聞二釋秪園二初總指二別釋初總指祇樹給孤獨園疏秖樹等者即秪陀太子所施之樹給孤長者所買之園記秖樹下二釋秪園二初總指舍衛國主波斯匿王有一大臣名須達多為兒聘媍躬至王舍城寄止長者珊檀那舍宅時長者中夜而起莊嚴舍宅營辦餚饍須達聞已問言大士欲請國王為婚姻之會耶答言請佛無上法王須達聞已身毛皆豎復問何等名佛長者廣為說佛功德須達多言善哉大士所言佛者功德無上今在何處長者答言在王舍城迦蘭陀竹林精舍時須達多一心念佛忽然天明其光熾盛猶如白日即尋光處至城門下佛神力故門自開闢尋路而往爾時如來出外經行須達見已歡喜踴躍不知禮法直問世尊時首陀天為其長者化作四人至世尊所接足禮拜胡跪問訊右繞三匝却住一面須達見已依而為之世尊即為如應說法長者聞已得須陀洹果後復請佛惟願臨顧至舍衛城受我微供佛即問言卿舍衛國頗有精舍容受我否須達多言必見垂顧便當營辦世尊爾時默然受請時須達多迴舍衛國佛令鶖子同往指授造寺儀式即須達布金買秪陀太子園秪陀太子施園中樹林二人共搆精舍既訖即執香爐向王舍城遙作是言所設已辦惟願如來受此住處佛時懸知長者之心即共大眾發王舍城猶如壯士屈伸臂頃至秪陀園是時長者以其所設奉施於佛佛即受已即住其中廣如涅槃經賢愚經四分律西域記說須者往檢今佛於此說金剛般若經故云在舍衛國秪樹給孤獨園也然須達是主秪陀助成今樹先園後者以太子是儲君須達是臣佐禮別尊卑故爾真諦記說住處有二一境界處即舍衛也為化俗故二依止處即秪園也為統出家人故又善見婆沙云舉舍衛令遠人知舉秪園令近人知故雙舉也二別釋三初釋秪陀二釋給孤三釋園字初釋秪陀疏秖陀此云戰勝波斯匿王太子也生時王與外國戰勝因以為名記秖陀下二別釋三初釋秪陀戰勝者亦云勝林餘如疏二釋給孤疏梵語須達此云善施給孤獨即是善施也又亦常行施故記梵語下二釋給孤謂少而無父曰孤老而無子曰獨拯給孤獨名為善施又亦等者就中孤獨偏所矜哀其實餘人亦非不施故也三釋園字疏西國呼寺為僧伽藍此云眾園記西國下三釋園字梵音具云僧伽藍摩此云眾園則僧伽是能住之眾藍摩是所住之園斯則約能要所耳寺者司也官舍也以佛法初來安鴻臚寺後置僧舍便以為名也六眾成就二初釋標類二釋舉數初釋標類與大比丘眾疏六眾與者并也及也大者名高德著比丘梵語此含三義故存梵不譯一怖魔二乞士三淨戒眾者理和事和記疏六眾下文二初釋標類名高謂遐邇稱譽德著謂行業恢隆怖魔者謂初出家日飛行夜叉帽乃至魔宮聞故怖也以一人出家展轉化度損減眷屬故然出家人從因至果三度怖魔謂出家時發菩提心時成正覺時前二但怖後乃興戈為佛所摧莫不降伏乞士者謂上從善友乞法以練心下從檀越乞食以資身故智度論云何名比丘比丘名乞士清淨活命故名乞士如經中說舍利弗乞食向壁而䬸時有梵志女名淨目來見舍利弗云沙門汝食淨耶答言食淨淨目言沙門下口食耶答曰不也乃至問仰維方等皆答言不也淨目女言食有四種我問於汝汝皆言不我今不解汝說舍利弗言有出家人合藥種穀植樹等不淨活命名下口食有觀星宿日月風雨雷電等不淨活命名仰口食有曲媚豪勢通致四方巧言多求不淨活命名方口食有以種種呪術下筭吉凶不淨活命名維口食姊我不墮是四種不淨食中我用清淨乞食活命淨目因聞是說清淨法食歡喜信解得須陀洹道如是清淨乞食活命故名乞士淨戒者謂比丘二百五十戒比丘尼五百戒有表受無表持清淨持戒名為淨戒有說五義謂如淨命破惡今以乞士即淨命淨戒即破惡故唯三也理和下梵語僧伽此云眾和合謂理和無違事和無諍也二釋舉數千二百五十人俱疏千二百五十者佛初成道度憍陳如等五人次度迦葉三兄弟兼徒總一千次度舍利弗目連各兼徒一百次度耶舍長者子等五十人經舉大數故減五人記千二下二釋舉數佛初成道者即菩提樹下示成正覺也憍陳如等者餘阿溼摩訶男婆提婆敷富那婆蹉準本行經說佛初成道梵天王等請轉法輪世尊受請作是思惟諸世間中誰先得度有五仙人昔日與我有大利益堪能受我初轉法輪復作是念彼等五仙今在何處以淨天眼觀彼五仙在鹿野苑中爾時世尊即向彼園廣為說法外道身心悉皆伏滅所著之服即成三衣手執鉢器鬚髮自落經於七日威儀具足如百夏比丘乃至為轉四諦法輪得阿羅漢果迦葉三兄弟等者智度論說爾時第一優樓頻螺迦葉在火龍窟為首教化五百弟子二那提迦葉領三百弟子在象頭山修行三伽耶迦葉領二百弟子在希連河曲共計千人皆為世尊之所降伏求索出家師徒皆得阿羅漢果舍利弗等者智度論說摩伽陀聚落有婆羅門名檀耶那而有八子中有一子名優婆低沙即舍利弗也復有一婆羅門產子名離多即目連也是二童子共為親友於刪闍耶外道所出家二人同心立其誓願若復更得勝是師者為我等說甘露勝道必相契悟爾時世尊有一弟子名曰馬勝威儀庠序入城乞食進止有方舍利弗見已隨到所止白言仁者汝是正師為是弟子馬勝言別有大師我是弟子又復問言汝之大師說何法耶答言諸法從緣生諸法從緣滅如是滅與生我師如是說時舍利弗聞是語已即於是處遠塵離垢得法眼淨歸到所止為目連說亦復如是二人共相領諸弟子俱詣佛所求索出家佛呼善來鬚髮自落袈裟著體執持應器成比丘相於聲聞眾中智慧神通各得第一是二百眷屬悉得出家即受具戒乃至得成阿羅漢果耶舍等者未撿大謹按因果經云有長者子名耶舍有大辯才聰明智慧於中夜分見空中光明尋光詣鹿野苑見佛三十二相八十種好禮佛白言唯願世尊救濟於我佛言色受想行識無常苦空無我汝知否答言實是聞是語已得法眼淨成阿羅漢願求出家佛言善來比丘即成沙門又有耶舍朋類五十長者子聞耶舍出家共詣佛所願求出家佛言色受想行識無常苦空無我汝知否聞已漏盡意解佛言善來比丘即成沙門是時始有五十六阿羅漢佛告比丘汝等堪為世間作無上福田宜各遊方教化以慈悲心度諸眾生又按如來應化錄最初度五人次耶舍五十人俱在鹿野苑次於石室降火龍度三迦葉一千人然後詣王舍城受頻婆娑羅王請住竹園舍利弗目連詣竹園見佛得度各一百弟子是為千二百五十人也舉成數不言五人疏此常隨眾故偏列數非無餘眾文隱顯耳記此常隨等者以此諸人先並事外艱苦累劫一無所證纔遇見佛便得上果感佛恩深故常隨也然具四眾及龍天等今但顯一隱餘流通分中自見疏俱者一時一處記俱者下前則標指約主望眾故言與此則都結主眾通論首末相望事不異也二發起序二初敘意二隨釋初敘意疏二發起序者謂乞食威儀離於邪命是為持戒戒能資定定能發慧故以戒定發起般若正宗記二發起下二初敘意戒能下以戒是防非止惡義定是寂靜不動義慧是明照揀擇義但能防非心即不動心若不動慧乃分明世出世法無不鑒照其猶海中欲現萬象必要水清欲求清水無過水靜欲得水靜勿令起波止波如戒水靜如定水清如慧所現萬像如一切法喻中則水若不起波則水靜水靜則水清水清則現萬像法中則心不起非則心寂心寂則照知萬法法上但惟一心喻上但唯一水法喻相對義則昭然故經云尸羅不清淨三昧不現前此則戒資定也圓覺云一切諸菩薩無閡清淨慧皆依禪定生此則定發慧也二隨釋二初戒二定初戒二初標科二列釋初標科疏文二初戒分七節釋記疏戒中七節如疏二列釋七初釋化主二釋化時三釋化儀四釋化處五釋化事六釋化等七釋化終初釋化主爾時世尊疏一化主成實論說具上九號為物欽重故曰世尊天上人間共所尊故記一化主具上九號者以佛有十號世尊當第十故云具上九號十號者一如來二應供三正徧知四明行足五善逝世間解六無上士七調御丈夫八天人師九佛十世尊二釋化時食時疏二化時食時辰時當日初分求乞易得不惱自他乞已歸園正當巳時如常齋法記二化時當日初分者謂一日夜十二時總成四分一初分即寅卯辰諸天食時二中分即巳午未人法食時三晡分即申酉戌神鬼食時四夜分即亥子丑畜生食時今言辰時即初分之後際也唐周二譯皆言日初分斯則時勝也此時則乞求不難以太早太遲皆難得故若非時乞食欲施即無不施又愧便成惱他乞之不得亡䬸又饑是惱自也三釋化儀著衣持鉢疏三化儀著僧伽棃衣持四天王所獻鉢記三化儀下謂佛有三衣一安陀會即五條名下品衣亦名行道作務儭身等衣二多羅僧即七條名中品衣亦名入眾說法衣三僧伽棃即九條乃至二十五條名上品衣亦名福田衣製像水田見生福故入王城聚落即著此衣今以入城乞食故著也天王鉢者梵語鉢多羅此云應量器是過去維衛佛鉢入涅槃後龍王將在宮中供養釋迦成道龍王送至海水上四天王欲取化為四鉢各得一鉢以奉如來如來受已重疊四鉢在於左手以左手按合成一鉢此是紺琉璃石缽持用乞食也佛出行化須著衣持缽者為離苦樂二邊故諸在家者好尚錦綺華潔衣服寶器增長放逸太著樂邊出家外道苦行尼乾躶形手捧飯食致招訶醜太著苦邊佛處中行故著衣持鉢也四釋化處入舍衛大城疏四化處園在城東南五六里自外之內為入處廣人多曰大記四化處者園是所住處國是所化處之往也今行化故出祗園入舍衛也處廣等者準西域記國周六十餘里內城周二十里故云處廣智度論云居家九億故曰人多五釋化事二初正釋二通難初正釋乞食疏五化事佛為欲顯頭陀功德令放逸者慙愧以同事攝故自乞食記五化事者此釋經中乞食兩字頭陀下或曰佛為教主何須乞食故疏釋也頭陀此云抖擻抖擻煩惱故然頭陀有十二種事謂常乞食阿蘭若乃至樹下坐露地塚間坐等今則一也若行此事獲大功德佛現斯軌令人效之頭陀既獲功德放逸足明尤過世尊尚自乞食餘人豈合懈怠慚耻愧悚自然行之同事攝者則四攝法之一也又佛自乞食準纓絡經說有十意一止苦故謂盲得見二得樂故謂一瞻一禮生無量福三除慢故謂眾生見之不生我慢四滿缽願故富欲施多缽則為空貧欲施少鉢則為滿五鬼神供養故六障閡者見佛故老病貧賤悉皆得見佛也七示天王所獻鉢故八作軌模故九絕誹謗故十令弟子不畜八不淨物故有此十意故自乞食二通難疏瓔珞女經說化佛身如全段金剛無生熟二藏今所乞者利益他故故淨名云為不食故應受彼食記瓔珞女下通難前引經難今所下釋通淨名下但證上乞食不食之義六釋化等於其城中次第乞已疏六化等一由內證平等理外不見貧富相二心離貪慢慈無偏利三表威德不懼惡象沽酒婬女等家四息凡夫猜嫌五破二乘分別記六化等者此釋經中於其城中次第乞已也內證平等者如理見故心離貪慢等者不貪富好不慢貧拙平等修乞故云慈無偏利也表威德等者謂佛制小乘律不許入惡象家恐被損害不許入婬女沽酒家恐生染心佛入者表威德勝也息凡夫等者謂恐憎此愛彼故破二乘分別者謂迦葉捨富從貧乞意令生福須菩提捨貧從富乞不欲惱他云云二人所見互有是非如來異此是非一貫也然上五中初大智二大悲三顯德四息凡五破小七釋化終三初會句義二通伏難三顯齋儀初會句義還至本處疏七化終然已字義屬下句文連上句飯食字義屬上句文連下句若廣其文令當句中備者應云次第乞已還至本處飯食飯食訖收衣鉢記七化終然已等者和會字之句義也今讀則從文釋則從義若廣下權加數字顯文義兼暢也飯即喫也論語云飯疏食二通伏難疏佛若不食他福不滿記佛若下通伏難應先難云前引纓絡女經言不食今經何以言食故此釋也有說食欲至口有威德天在側隱形接至他方施作佛事斯則下現而食非真食也由是彼此皆不相違三顯齋儀疏寶雲經說隨所乞得分為四分一擬與同梵行二擬施貧病乞人三水陸眾生四自食十二頭陀經唯說三分除梵行記寶雲下顯齋儀也此四事中前二云擬後二不云者以梵行貧病來則與之不來自食後二不然故不云耳十二頭陀經除梵行者以自乞故故不分之二定二初正解此文二通前表法初正解此文二初標科二列釋初標科疏二定分三節釋記疏定者於中三節如疏云云二列釋三初併資緣二淨身業三正入定初併資緣飯食訖收衣鉢疏一併資緣將欲入定須息攀緣衣鉢不收心有勞慮故佛示現為後軌也即收大衣著七條記疏併資緣者此釋經中收衣鉢也飯食兩字如前所解訖了畢也須併資緣者以修定時具於五緣謂閑居處靜息謂緣務等佛雖至聖諸習都無實於衣鉢不生勞慮若不併除後人倣效無由得定以佛是教主凡有所作人皆效學故云示現為後軌也二淨身業洗足已疏二淨身業阿含經說佛行離地四指蓮華承足今示現洗者順世表法為後軌也記疏淨身業等者此釋經中洗足已三字阿含下牒難也又如佛三十二相中有皮膚塵不染相今何用洗耶示現下釋通也此有三意一順世故夫人外歸必恐塵染故須洗足佛順亦爾也二表法故洗去煩惱垢染顯得清淨法身也三為後軌者如資緣說三正入定二初正釋入定二顯入定意初正釋入定二初正釋二引證初正釋敷座而坐疏三正入定敷座坐禪者由身端故心離沉掉記疏正入定者此釋經中敷座而坐也沉掉等者沉謂昏沉能引睡眠障定增故掉謂掉舉任運攀緣能引散亂亦障定心又於四儀中以臥則昏沉行則掉舉住則疲倦唯坐為勝故不沉掉然昏沉掉舉葢是凡夫若據如來的無此事今垂軌則葢為後人二引證疏故魏譯云如常敷座結加趺坐端身而住正念不動唐譯云端身正願住對面念記或曰經中但言敷座焉知入定耶故次釋云魏譯等則知入定也如常敷座等者謂如來每會說般若皆自敷座具為般若出生諸佛即是佛母表敬般若故自敷座已說八會此當第九儀軌不易故曰如常趺謂足背加謂以一足壓一足結即兩足不散表吉祥故智論云見畫加趺坐魔王尚驚懼何況入道人端身不傾動又為正觀五種因緣是故結加趺座一由身攝斂速發輕安最為勝故二由此晏坐能經時久不令身速疲極故三由此晏坐是不共法外道他論皆無有故四由此晏坐形相端嚴令他見已極敬信故五由此晏坐佛佛弟子共所開許一切賢聖所稱讚故正觀五種因緣是故應當結加趺坐端身住者不低不昂不左右傾側也正念者如理而念名為正念念即念慧謂離沉掉有無等不動謂不動於正念也唐譯下亦證同上義正願者即正念也若別說者願是希欲謂希欲住對面念念是所願也然在定前異此則非正願也住對面念者面即是喻念即是法住對兩字通於法喻今法喻之中各闕一事謂法闕所照理喻闕能照鏡鏡對面住面則自彰念對理住理則自現法喻闕者文影略故或可不爾但理觀分明如面目覩理量即水喻亦得二顯入定意疏無著云顯示唯寂者於此能覺能說故記無著下顯入定意先牒難併緣入定意在於何於此下釋通於此者論云於法也能覺者定通能說者說通也意云定通方得說通以散心說法不能如實從定發言必有當也故下文云云何為人演說不取於相如如不動諸經之中每欲說法皆先入定意皆如此云云斯亦示現為後軌也若準如來言念何失是故論云顯示等也二通前表法二初約大雲廣辯二引資聖略明初約大雲廣辯三初標二釋三結初標疏然大聖現跡必有所表記疏然大下二通前表法釋二初約大雲廣辯三初標大聖即佛體周法界曰大智鑒無昧曰聖現跡者所現之化跡也所表者諸佛所為必不率爾皆以事相表內身心如說如來藏經舉身放光光中現華華萎見佛遂阿難問佛佛為說之如華嚴中說佛菩薩說天說雲須彌山大海等皆有所表斯皆事相為能表法為所表以不徒然故云必也二釋二初表通序二表別序初表通序疏表本覺之佛在五蘊之都覺魔軍本空名為戰勝照心識具德即是給孤求法養神名乞士眾記疏表本覺下二釋二初表通序本覺佛對化佛說五蘊都對舍衛國化身佛在舍衛國表本覺佛在五蘊城城中既人物相兼蘊內亦色心具足覺魔等對戰勝也梵音魔羅此云殺者能殺行人慧命故也然有四種一天魔即欲界主二煩惱魔三陰魔四死魔今言覺空者如心經云照見五蘊皆空無無明乃至亦無老死盡也照五蘊空即破陰魔無無明盡破煩惱魔乃至無老死即破死魔餘出世法尚空況天魔耶照心識具德者對給孤獨也上迷本覺之父曰孤下隱妙用之子曰獨今照性本具塵沙功德無所乏少即給孤獨也求法等對比丘乞士義也外則乞食養命內則求法資神二表別序疏覺心既發寧棄塵勞將欲徧觀遂入識藏心心數法次第思惟即妄而真皆得法喜法喜無體融合覺心思惟假緣亡緣可符真性觀照是跡拂跡返本還源返本還源法空心寂心寂真體般若朗然記覺心下二表別序覺心等者對入舍衛大城也應云覺心既發寧棄塵勞如來出世寧棄群品將欲徧觀遂入識藏將欲教化遂入王城離城邑而教化誰人離心識而觀察何事心心數法等者對於其城中次第乞已也乞食不揀貧之與富觀察豈擇心所心王即妄下二句對乞得食也外化人而得食內觀法而生喜法喜下二句對還至本處飯食也食能資身法能益心也思惟假緣對著衣持鉢亡纔符真對收衣鉢也乞食既須衣鉢思惟要假因緣入定既併資緣契理須忘念慮觀照下二句對洗足也若欲安坐必須洗去足塵若欲還源必須拂除心念返本下二句對敷座而坐也法空即敷座心寂即而坐敷座方堪人坐法空心始得寂心寂下二句對正宗法也謂安坐始能說經心寂方彰妙慧也三結疏欲談般若正宗如是示現發起記疏欲談下三結也二引資聖略明二初正明二引證初正明疏資聖云夫身有二一偽二真五蘊偽體假衣食以生育法身無相因般若以照成群生保偽遺真諸佛養真棄偽群生既迷真而取偽我乃假偽跡而引真故託乞食之緣將施法喜之化記資聖下二引資聖略明即道液法師疏也今摘而用之文不全取於中二一正明身有二者通論生佛也偽者色身真即法身五蘊等者謂衣以外覆食以內資生則雖因父母存即須假衣食法身等者謂非生因之所生但了因之所了由是色身以食為命法身以慧為命保偽謂執妄合塵遺真謂迷理背覺此皆倒也養真謂悟理合覺棄偽謂達妄背塵也群生下牒前倒者也我乃下示現入城乞食以表法也意令求般若照成法身故云引真也故託下都結表法之意謂示現乞食意在說法耳二引證疏故涅槃經云汝諸比丘雖行乞食初未曾乞大乘法食記疏涅槃下二引證但證法為食義也
