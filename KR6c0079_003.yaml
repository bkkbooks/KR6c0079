body:
  text: 唐圭峰大師疏宋長水大師記後學雲棲寺沙門大科會二正宗分二初標列章門二依章隨釋初標列章門疏第二正宗分二門分別初約無著七種義句以懸判後依天親門答斷疑以科釋記正宗中疏二初標章門以一卷經文二論解釋大雲青龍皆二論並行今即不爾何者以無著配十八住處天親斷二十七疑旨趣既殊科段亦異或一疑中有四住五住或一住中有二疑三疑乍合乍離連前帶後以是之故文涉交加理則不必深玄學者以之難解今既別釋庶不相干傳講之流少力多獲耳二依章隨釋二初約無著七種義句以懸判二依天親問答斷疑以科釋初約無著七種義句以懸判三初正示七句二總指後四三廣釋第三記初中三初正示七句初正示七句二初牒標二列釋初牒標疏初中七義句者記七義句者論述歸敬偈已即云成立七種義句已此般若波羅蜜即得成立義句揀文句也既以一義為一句此經共有七義句也七義句名疏中自有於中前六顯示菩薩所作究竟第七顯示成立此法門故然此七句之文教理行果悉圓滿矣於中一二三四是行也五理也六果也七教也齊此懸判一科唯依無著之名記之二列釋七初種性二發起三住處四對治五不失六地位七立名初種性疏一種性不斷謂護念付囑記疏一種性不斷者此非凡夫二乘及權教菩薩意明佛種性不斷也謂護下指經便是釋意謂以小付大囑大化小展轉如是寧有斷絶如人父母付囑子孫云云此是空生之本意故以此事讚佛引起問端也二發起疏二發起行相謂申請讚許記疏二發起行相者既欲種性不斷故須發起修行之相也謂申下指經其實佇聽亦在此攝三住處疏三行所住處謂十八住從佛正説直至經終是無相行所住處矣記疏三行所住處者既有能發必有所發也十八住名義下文廣釋從佛下指經是無下釋名義此既相之無相非一向之無相略見行玄為順本宗故標無相也四對治疏四對治謂一一住處皆具邪行共見正行二種對治記疏四對治中邪行即不正行也但不順佛道皆名邪行共者不一義見者分別情正行者即雜見之正行非純正之正行也二種對治者以正行治邪行是一對治以無分別智治分別見是二對治然邪即全治共中即但治於見不治正行如披砂揀金而去砂不去金今經中但有能治無所治也且如第一住處中不度衆生為邪行度衆生為對治於度衆生時見有衆生是所度見我是能度是分別見度而無度為對治此理實同時義分前後初住既爾餘可例知故論云行諸住處時有二種對治五不失疏五不失謂由對治離增減二邊不失中道記疏五不失中謂由下明意也離增減者謂執有為增執無為減前墮此二則失中道今皆離之故得不失也如經中即非佛法是勝義諦遮增益邊是名佛法是世俗諦遮損減邊其餘即非是名皆例之也論最後結云菩薩離此二邊故於彼對治不復更失故名不失六地位疏六地位謂由不失中道成賢聖位信行地淨心地如來地記疏六地位中謂由下釋以二邊邪僻置之不論中道乃是大菩提路故於此中分立地位如往帝都有三路異兩邊皆非中道即正正路之中方可論於遠近遲速等也法中亦爾故經云一切賢聖皆以無為法而有差別信行下分位也於十八住中前十六住是信行地此當三賢依信起行故名信行亦名信解依信起解故第十七住是淨心地此當初地離分別障親證真如故第十八住從第二地已去乃至佛位通名如來地也又以諸家明地位或廣或略廣則五十二位略則泯之全無今則均於廣略去其太甚説三地五位矣七立名疏七立名謂由前六智慧堅利位地濶狹故名金剛記疏七立名中謂由下釋謂約三種法上立金剛名一約般若體用名金剛此如金剛堅利二約地位濶狹名金剛此如金剛杵形以信行一僧祗淨心只一剎那佛地二僧祗如金剛杵初後濶中間狹故三約文字名金剛此如畫像也以詮信行地七紙餘經佛地三紙餘文淨心地五行經如彼畫像亦初後濶中間狹故又此三者法喻之上皆展轉而成喻中且根本是堅利金剛因造以成其杵因畫以成其像法中根本是體用般若因修以成其位地因詮以成其文字也又此法喻各三事中一事即實餘二皆虗喻中堅利金剛是實杵形畫像皆虗法中體用般若是實位地文字皆虗以此三事首末相似故立金剛之名然前一是佛本意餘二是菩薩及古德意也由前六等者於中前五堅利第六濶狹濶狹之中含能所詮也二總指後四疏後四但約第三句中十八住説無別經文記疏後四下二總指後四應先問云第三句內説盡經文未知後四如何配攝故此云也謂一一住説對治故於對治處顯不失中道故於不失中立位地故於前六中道立名故云云三廣釋第三三初正辨十八住處二重以八義相攝三更約地位配釋初正辨十八住處二初牒標二列釋初牒標疏十八住處者記疏十八下三廣釋第三三一正辨十八住處疏中具列十八住名略釋其義兼明對治十二種障便指經文令知科段所屬然每住經文疏但略標三字五字緣以經本科段首尾文勢稍重恐言涉相濫故不標最初之字但取其次異文亦不結終齊至何處意在省約耳向下隨文略敘首末以隔前後二列釋十八初發心住二波羅蜜相應住三欲得色身住四欲得法身住五修道無慢住六不離佛世住七願淨佛土住八成熟衆生住九遠離外論住十觀破色身住十一給侍如來住十二遠離退失住十三忍苦住十四離寂靜味住十五證道離喜住十六求佛教授住十七證道住十八求佛地住初發心住疏一發心住經云應如是降伏其心所有一切等記一中發心者謂發廣大第一等四種心也經文從佛告須菩提諸菩薩摩訶薩應如是降伏其心乃至若菩薩有我相人相衆生相壽者相即非菩薩以大乘菩薩最初法爾合發是心故十八住中居其第一二波羅蜜相應住疏二波羅蜜相應行住不住色布施等記二者經從復次須菩提於法應無所住行於布施乃至須菩提菩薩但應如所教住不住等者等有二意一則等於餘文如上所引二則等於餘義謂等餘戒等五也此則雖是指經便兼釋義則波羅蜜是所應戒等是能應能所兩合故云相應由是但行施戒等不能離相或行離相不行施戒等皆非相應行直於行施戒等處離相離相處行施戒等方得名為相應行也三欲得色身住疏三欲得色身住可以身相等記三者經從須菩提於意云何可以身相見如來不乃至若見諸相非相即見如來問色身是相何以離相求之答色身之相是影法身無相是體欲得有相色身須見無相法體未見法體不能現相是故先令見相無相方得色相之身耳此中意在文外故論以意科也四欲得法身住疏四欲得法身住法身有二一言説法身頗有衆生等因言顯理故二證得法身復有二一智相如來得阿耨等二福相若人滿三千等記四中言説者經從須菩提白佛言世尊乃至法尚應捨何況非法問法身非言説何故以言説為法身耶故疏釋云因言顯理故此有二意一以言説顯於法身法身非言説二文字性離即是法身無別法身耳智相者經從須菩提於意云何如來得阿耨菩提耶乃至一切賢聖皆以無為法而有差別則以無相無為法為智相也故起信云以智相無可見故福相者經從須菩提於意云何若人滿三千大千世界七寶以用布施乃至須菩提所謂佛法者即非佛法斯則以持説此經獲無漏福所感微妙色身名為福相也然是法身之福相福相非法身依主釋五修道無慢住三初正示此文二通敘後段三別結對治初正示此文疏五於修道得勝中無慢住須陀洹等記五於下文三初正示此文經從須菩提於意云何須陀洹能作是念我得須陀洹果不乃至是樂阿蘭那行得勝者以小乘四果勝於四向等故對劣彰勝也此即以小況大也小人尚猶無過君子豈合有𠍴由無慢故方得證果故經皆言我不作是念我得須陀洹果等二通敘後段疏從此至十六住如次對治十二種障意明欲求色身法身須離是障障盡故入十七證道住記從此下二通敘後段意明等者敘次第之意也先問云前之四住何不言離障耶故云也意云凡欲修進先須發心發心已則修行故有第一第二發心修行本求佛果佛果之內唯有二身粗細之間先色後法故有第三第四前修勝行恐有慢心障入聖位故説小果以況大乘今離障進入十回向位也故從第五方説離障也然此十二障每至一住皆須躡前以辨來意如云雖得無慢猶自少聞故於第六住中對治少聞障他皆倣此以此諸障皆在地前能障見道非是地上故云障盡入證道也然障是所治文在經外住是能治正是經文若相望説之理則明矣三別結對治疏今當對治第一慢障記今當下三別結對治然準五蘊論説慢有七九二種但開合之異此約入道人説七者論云一慢於劣謂勝於相似謂等二過慢於相似謂勝於勝謂等三慢過慢謂於勝己計勝彼四邪慢己實無德計己有德五我慢謂於五取蘊計我我所六增上慢謂於勝妙法中未得謂得七卑劣慢於多分勝計己少分劣今所離者即五六也以證我空故取自果故六不離佛世住疏六不離佛世時住昔在然燈等離第二少聞障不離佛世則具多聞記六者經從佛告須菩提於意云何如來昔在燃燈佛所乃至實無所得云何離障得成住耶疏次云離第下所離障不離下結成住義於中上句成住下句離障也若離佛世不名住處無佛説法則是少聞便成其障若不離佛世乃成住處常遇佛説法則具多聞便離障也然凡是修行智慧為本欲得智慧必須多聞故依佛住離少聞障也故經云多聞增智慧勤問第一方問若然者據今經云於法實無所得豈成多聞答此是聞而無聞得而無得無得而得是真得無聞而聞是實聞故成此住七願淨佛土住疏七願淨佛土住菩薩莊嚴佛土不等離小攀緣作念修道障緣形相土則小無緣則大契法界故記七者經從須菩提於意云何菩薩莊嚴佛土不乃至應無所住而生其心離小下所離障攀緣即是作念蓋一義耳緣形等者意云若取色聲等相為土即有分限故名小也以不如法身故若不取相分別不生心境兩忘竟何分限故云大也契法下釋所以也意令忘懷嚴法性土不令生心嚴法相土也故經云不應住色等生心應無所住而生其心偈釋云智習唯識通如是取淨土非形第一體非嚴莊嚴意八成熟衆生住疏八成熟衆生住人身如須彌等離捨衆生障若見大小不能濟物記八者經從須菩提於意云何譬如有人身如須彌山王乃至是名大身成熟者即由教化令衆生成種根熟有所悟證離捨下所離障若捨衆生即不能教化故令離障方成住也若見大小下反釋所以意言能濟物者蓋為不見大小也故經云佛説非身是名大身豈存大小若見大小則有高下親疏憎愛心既不等寧曰大悲縱使化生但成愛見憎者則去便捨衆生云何成熟反此用意則物無有遺遲速之間皆能成熟九遠離外論住疏九遠離隨順外論散亂住如恆河中所有沙等離樂隨外論散亂障恆沙寶施不及持經如何外學不修正法記九者經從須菩提如恆河中所有沙乃至如來無所説離樂下所離障然隨順外論即是散亂但能遠離即成住也即儒墨文筆除佛教外皆外論也以外論之事是名利源既若求名豈得心無散亂況得之則樂失之則苦苦之則憂樂之則溢由斯業纍世世沉淪反推其本皆由隨順外論耳恆沙下舉持經福多以責外學意云持經者功德若此而不修行名利之源是輪回苦本如何隨順却乃修學十觀破色身住疏十色及衆生身摶取中觀破相應行住三千世界所有微塵等離破影像相中無巧便障既離散亂與定相應以細末不念二種方便破粗至細泯細至空則除影像之相想記十者經從須菩提於意云何三千大千世界所有微塵是為多不乃至是名世界色是依報即外四大身是正報即內五蘊摶取者即和合義也但秦魏譯異爾然摶取約法相應兼人二事相望總有三對一內身色蘊及外器界但合微塵所成名為摶取見有身器為依正執取等即是相應二受等四蘊但合心心所法而成名為摶取見有苦樂受等即是相應三色心和合以成此身名為摶取見有心色即是我人相應行即遷流造作之義觀破之義如下所明影像相者謂色心等法是法界中之影像亦可是業識之影像離破下所離障無巧便者由無善巧方便不能破此影像乃名為障若有巧便破之則成其住也巧便之相彰在次文既離下躡於前住以為方便之本由無散亂則成其定從定方能發慧觀而破之以細下正示二種方便巧便之相也然破色具二破心唯一除細末也以心心所法不可析破故粗色顯著難忘執情析至極微易祛妄念故須具二如下文説相想即心境也心境兩忘故云除十一給侍如來住疏十一供養給侍如來住可以三十二相見如來不等離福資糧不具障不以相見常見法身名為給侍福無邊矣記十一者經從須菩提於意云何可以三十二相見如來不乃至是名三十二相離福下所離障欲入聖道須福資糧如人遠行豈可空往佛為至聖是福之因供養給侍無不獲福即以此福為其資糧若供養得福即是住非障反之則是障非住也不以下或問文云不以相見如來如來尚不得見云何給侍耶故此釋也此即但以智慧隨順相應名為給侍然非謂棄却相身別侍無相之佛但了相即非相不生執著乃曰相應凡所供養親近恭敬皆名給侍若生執著不順於理雖常見佛不名為見如下文云若以色見我以音聲求我是人行邪道不能見如來華嚴云若人百千劫常隨於如來不了真實義盲瞑不見佛又如佛昔三月升忉利天為母説法後降閻浮有蓮華色比丘尼欲先見佛化作轉輪王隊仗往至佛所佛乃訶之具陳上事時須菩提在於山中亦欲見佛尋復思念空無相理是真法身何用見色相言已復坐竟不往見於是佛告蓮華色言須菩提先見我竟汝已在後故知執相迷真對面千里虗心體物天地一家故古人云肝膽雖近情生則隔江山雖緬道契則鄰是知通達妙理方真給侍若斯給侍是侍真佛故所獲福無有邊際十二遠離退失住疏十二遠離利養及疲乏熱惱故不起精進及退失住恆河沙身命布施等離樂味懈怠利養障恆沙命施猶劣受持豈為一身耽著利養身疲心惱而懈怠耶記十二者經從須菩提若有善男子善女人以恆河沙等身布施乃至是名第一波羅蜜離樂下是所離障然障名有所闕略若取周備不過住名但樂味成障遠離成住且約為障起過有其五重一為身求利二由求利養令身疲乏此復有二一由放逸令身疲乏二求不得身亦疲乏三由身疲故令心熱惱四由心熱惱故不起精進五由不精進故退失功德恆沙命施下釋成對治經苦較量意令改革以見大利故不求小利既不求利身則不疲身既不疲心則不惱心既不惱則起精進既起精進則能受持獲無邊福故知經意為治此障成其住也一身者一報身也意云豈為一報之身終日求名求利求之不足未始稱情縱使多財死為他物持經功德無量無邊盡未來際用之不竭利害若此人何不然無常經云眷屬皆捨去財寶任他將但持自善根險道充糧食十三忍苦住疏十三忍苦住忍波羅蜜割截身等離不能忍苦障無我等相纍苦能忍記十三者經從須菩提忍辱波羅蜜乃至如人有目日光明照見種種色離不下所離障此但不忍為障忍之成住也無我下出忍之所以也斯有兩意所謂通別通則由無我相雖纍遭割截常能忍受別則由無我故忍由纍苦故能忍也十四離寂靜味住疏十四離寂靜味住當來之世若有人能於此經受持讀誦等離智資糧不具障日三時捨身一一沙數不及信經如何唯專禪定耽寂靜味闕於智慧而不持説記十四者經從須菩提當來之世若有善男子善女人能於此經受持讀誦乃至果報亦不可思議離智下所離障若耽寂無智即是障非住若離寂修智即是住非障日三時下指經對治意云欲證聖性非智不階經苦較量意在䇿發此同革嚴經中訶勸之相彼云法性真常離心念二乘於此亦能得不以此故為世尊但以甚深無閡智然此是對治之別意故須一向而言令人捨定修慧若據究竟通論必須定慧等學涅槃經中説定慧不等不見佛性無明邪見自此而生前第十一住便是定門對治不同故須然也修習之者須兼行之十五證道離喜住疏十五於證道時遠離喜動住云何住降等離十一不自攝障我能住降心生喜動動則不能自攝記十五者經從爾時須菩提白佛言世尊乃至實無有法發阿耨多羅三藐三菩提者離十一下所離障謂動不自攝則是障非住若自攝不動則是住非障也論中則云自取障我能下釋意云由計我故遂起降住勝能之心不覺喜動故不自攝今經既云無一衆生得滅度無法得菩提則不計勝能故能對治也十六求佛教授住疏十六求佛教授住於然燈佛所有法得菩提不等離十二無教授障欲入初地須佛教授故約遇佛得無所得而證道矣記十六經從須菩提於意云何如來於然燈佛所有法得阿耨多羅三藐三菩提不乃至是故名一切法離十二下若無教授即是障非住若得教授即是住非障欲入下釋成住義雖三賢位中亂修六度經一無數劫欲入聖道要佛䇿發故於資糧位後立加行名其猶鑽火火欲出時倍加功力遇佛然燈佛也得無所得者即然燈與善慧授記當得作佛號釋迦牟尼非佛與法故云無得問此説善慧得記進入八地何故將此配地前耶答欲入初地須學八地用心方可得入若學初地竟不能入如人學射可知又將證八地猶須教授欲入見道豈得不然然從第五至此住中每住對治一障此障障於見道今則加行位極對治已盡故云而證道矣十七證道住疏十七證道住人身長大等攝種性智證遍行真如成法報身故長大矣記十七者經從須菩提譬如人身長大乃至佛説一切法無我無人無衆生無壽者攝種性下釋成住義智體即觀照般若是能證也即妙平二智無分別也以得此智生如來家決定紹佛種故斯則地前加行之智至於初地轉受此名證遍等者體即實相般若是所證也以遍在一切法中故唯識云由此真如二空所顯無有一法而不在故論中則名平等智然有五種平等因緣一粗惡平等二法無我平等三斷相應平等四無希望心平等五一切菩薩證道平等有是五種因緣故名平等智故論云入證道時得二種智一攝種性智二平等智也然所證是理今云智者斯有兩意一準起信論云依此法身説名本覺二則理智冥合能所不殊如珠與光不相捨離成法報身者攝種性智至果得成報身平等智至果得成法身故長大者論即云妙大妙即報身以萬行功德所莊嚴故大即法身真如實理遍一切故十八求佛地住二初標六種具足二列六種具足初標六種具足疏十八上求佛地住於中復有六種具足記十八者自此已下皆求佛地於中復有六種具足具足者圓滿義謂轉捨二障轉得菩提涅槃攝轉具足也二列六種具足六初國土具足二無上見智淨具足三無上福具足四無上身具足五無上語具足六無上心具足記既證聖性生如來家須示佛果功德令其欣趣然其果德雖多以要言之不出依正二報二報之內先明所依若無所依能依何立正報之內不踰福智智引福故先智後福然後別顯三業依次所明初國土具足疏一國土淨具足我當莊嚴佛土等此教二地已上諸大菩薩記一經從須菩提若菩薩作是言我當莊嚴佛土是不名菩薩乃至若菩薩通達無我法者如來説名真是菩薩此教下指位即從二地至於等覺當修道位謂莊嚴之時離能所相名之為淨稱周法界故云具足故經云通達無我法者如來説名真是菩薩二無上見智淨具足疏二無上見智淨具足有肉眼不等此下皆唯佛果故云無上無上之言貫通下四記二者經從須菩提於意云何如來有肉眼不乃至未來心不可得見淨者即五眼也見即無見名之為淨無所不見名為具足智淨者即悉知諸心等知即無知名之為淨無所不知名為具足以智見不別故當一處此下等即指位揀非修道即無學位也下之四段皆合有無上之言故云貫通下四三無上福具足疏三福自在具足若人滿三千界七寶等記三者經從須菩提於意云何若人滿三千大千世界七寶以用布施乃至以福德無故如來説得福德多問前已頻説施福與此何別答前所説者皆是較量不及受持之福今此説者乃是無住稱性之福非能較量故不同也問佛是果布施是因云何果中即説因行答凡是果德皆彼因成舉彼無住之因以彰稱性之福也言自在者揀有漏之福不自在也若準論中此與智淨合為一段意明福智不相離故則於身中開之為二謂色身具足亦盈六數今則合後開前者意云福之與智迢然不同配攝因果五六有異異須開也相之與好同是一身兼對下語意以成三業故須合也四無上身具足疏四身具足佛可以具足色身等記四者經從須菩提於意云何佛可以具足色身見不乃至是名諸相具足此明如來真應具足如經云即非具足色身明真身也是名具足色身明應身也即非諸相具足明真身也是名諸相具足明應身也五無上語具足疏五語具足汝勿謂如來説法等記五者經從須菩提汝勿謂如來作是念我當有所説法乃至是名説法説而無説無説之説是真説法具足者無法可説無所不説是名説法六無上心具足疏六心具足佛得阿耨菩提為無所得耶乃至應作如是觀記六者然於心中復有六種一念處二正覺三施設大利益四攝取法身五不住生死涅槃六行住淨化度衆生大悲為本故先明念處自未成佛焉能度他故次明正覺自利既滿即合利他故次明施設大利益猶恐滯相故次明攝取法身又恐住空有故次明不住生死涅槃又恐執施化迹故次明行住淨也以此六義別對經文廣如彼論避煩不敘二重以八義相攝二初標二配初標疏又十八住略為八種亦得滿足記又十下二重以八義相攝二配二初以六攝十八二以二攝十八初以六攝十八四初以二攝二二以一攝二三以一攝十二四以二攝二初以二攝二疏一攝住處二波羅蜜淨住處一二次配記一者是籠羅包納之義即以普度衆生現無違反是故配同第一發心住也二者淨與相應蓋一義耳是故配同第二住也二以一攝二疏三欲住處攝三及四記三者雖三色四法皆是欲得由此配同三四二住也三以一攝十二疏四離障礙住處即前十二障也從五至十六記四者可知四以二攝二疏五淨心住處六究竟住處上二次配十七十八記五者正當淨心地故同此住六者正當究竟位故同此住雖通修道就多故説二以二攝十八疏七廣大住處八甚深住處上二各攝十八住處一一住中皆深皆廣記一一下明各攝義如第一住中普度四生廣也令入無餘涅槃深也實無衆生得滅度者廣也菩薩無我人等相者深也初住既爾餘則例知若五百生忍廣也並無我人深也若細言之前以六住攝十八住後以二住攝十八住皆得滿足三更約地位配釋二初標二配初標疏十八住文配位地者記十八住文下三更約地位配釋然諸教中所説地位或有或無如楞伽經云十地即為初二地即為入乃至無所有何地此明無也仁王纓絡等經即是説地位是明有也然此有無皆隨機説也若華嚴行布萬差圓融一際有無無閡斯則稱性之説卷然依華嚴有無無閡方為了義以約法即無約人即有人法既不相離有無故合均齊然其行人念念須冥佛境反窮果海自然階降不同若預等級用心畢竟障於證入故華嚴疏云修則頓修位分因果況此經宗無相豈合列位淺深但約情惑漸薄而位地轉高義相稍同故略配攝也二配三初配資糧二配加行三配三道初配資糧三初十住二十行三十回向初十住疏第一十住記第一十住者十住謂第一發心住二治地三修行四生貴五方便具足六正心七不退八童真九法王子十灌頂今配十住者與彼初住名同故配之也問此但云一如何配十答以初攝後故問何故不言十信位耶答亦攝入十住位中也以前之十住通名信行地故亦同華嚴合前開後也故發心一住前攝十信後攝餘九耳二十行三初前六二第七三後三初前六疏第二十行中前六記第二十行等者十行即一歡喜行二饒益三無瞋恨四無盡五離癡亂六善現七無著八尊重九善法十真實前六者十中前六行也以配此中第二住處以此住處説六度故即布施配歡喜行持戒配饒益行忍辱配無嗔恨行精進配無盡行禪定配離癡亂行智慧配善現行心離分別善巧示現故二第七疏三第七行記三第七行者不以相見如來即無著也三後三疏四後三行記四後三行者配第四住中三種法身謂言説法身配尊重行於佛言教生尊重故智相法身配善法行以真如無為是真善法故福相法身配真實行以持經之福無漏真實故三十回向疏五至十四如次配十回向記五至十四配十回向者一救獲一切衆生離衆生相回向二不壞三等一切佛四至一切處五無盡功德藏六隨順堅固善根七等心隨順一切衆生八真如相九無縛無著解脫十法界無量五配第一離慢即是離衆生相也六配第二遇佛多聞信解行等不壞七配第三諸佛離相既不住色即等佛也八配第四既見大身非身是真如際方至一切處九配第五不隨外論受持此經即得無盡功德十配第六觀破五蘊與定相應善根堅固十一配第七既不取相即於衆生等隨順之十二配第八經云離一切相即名諸佛即真如相也十三配第九割截不瞋即無縛無著也十四配第十經云無有邊不可思議功德即是法界功德也二配加行二初前二位二後二位記十五暖等者配四加行位也然此四位由三賢菩薩已經一無數劫修集福智資糧為入見道故復加行暖頂二位以四尋伺觀觀所取名等四法假有實無即所取空忍世第一以四如實智通觀能所名等皆空然忍有三品謂下中上下品即所取空中品順能取空上品印能取空世第一二空俱印然皆滯相未能證實故唯識云現前立少物謂是唯識性以有所得故非實住唯識初前二位疏十五暖頂記若配經文即十五住經云實無有法發阿耨菩提心者以菩提能發所取既言實無即所取空當暖頂二位二後二位疏十六忍世第一記十六住中云經佛於然燈佛所不得菩提是印所取空當下品忍次云如來者即諸法如義即順能取空然猶未説後時不得即知未能印持故當中品忍次云實無有法佛得阿耨菩提此明後時畢竟不得即印能取空當上品忍次云如來所得法此法無實無虗乃至即非一切法即雙印二空當世第一位也三配三道二初前一道二後二道初前一道疏十七初地記十七初地者如前疏云攝種性智證遍行真如等故當初地二後二道疏十八從二地乃至佛地記十八等者於中合有二謂此住中初國土淨具足當修道位故前疏云此教二地已上諸大菩薩從無上見智淨具足已下皆究竟位故前疏云此下皆唯佛果也記是則十八住中前十四資糧十五十六加行十七見道十八中初一具足修道餘即無學道也記懸判竟
