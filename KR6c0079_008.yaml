body:
  text: 唐圭峰大師疏宋長水大師記後學古杭雲棲寺大科會十一斷住修降伏是我疑疏二初標章敘疑二依經斷疑初標章敘疑四初標章二指疑起處三結成疑四敘別義初標章疏十一斷住修降伏是我疑記第十一疏初標章二指疑起處疏佛教我住修降伏兼不住前十種疑執過患記佛教下指疑起處住修下即正答三問及次前十段也三結成疑疏若無我者誰人受教誰人住修誰人如此離過云云記若無下結成疑既教我住修離過豈是無我無人若言無我誰住修離過耶四敘別義二初正敘二引證初正敘疏亦云除微細執故記亦云下敘別義除細執者即是第二疑中未除之者故今舉之令其除斷記問執與疑何別耶答執則堅著疑乃不決若據論意正是除執不言斷疑今疏云斷疑者若言除執文勢孤起血脈不貫故依諸疏以立此疑二引證疏偈云於內心修行存我為菩薩此即障於心違於不住道記偈云下引證除執道之與心蓋是一法但以心本無我而執我道本不住而成住故立障心違道也記然此疑執之文若詳經義別分則從爾時須菩提至即非菩薩是斷疑後之一段是除執也故論中釋已偏指後文二依經斷疑經二初問二答初問爾時須菩提白佛言世尊善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心疏斷疑之文二初問記問經文雖似前問意全別意云若人發心則無有我是誰降伏其心反覆如上所説二答三初若名菩薩必無我二若有我相非菩薩三能所俱寂是菩提初若名菩薩必無我佛告須菩提若善男子善女人發阿耨多羅三藐三菩提心者當生如是心我應滅度一切衆生滅度一切衆生已而無有一衆生實滅度者疏二答三初若名菩薩必無我記必無我經意云若人發菩提心已當生度盡一切衆生之心然不得起有衆生可度之念亦不可起我能度之念念既不起即無我無我即名菩薩也二若有我相非菩薩何以故若菩薩有我相人相衆生相壽者相則非菩薩疏二若有我相非菩薩記非菩薩經徵意云以何義故度衆生令不起衆生之念耶釋意云若有我相衆生相等非菩薩故前約所度之境此約能度之心心境合論通名為我既前後互舉則顯能所皆無也三能所俱寂是菩提所以者何須菩提實無有法發阿耨多羅三藐三菩提心者疏三能所俱寂是菩提記俱寂經徵意云前無所化之境次無能化之心所以要無能所者何謂也釋意云以能所俱寂方是菩薩故法之一字能所俱攝十二斷佛因是有菩薩疑疏二初標章敘疑二依經斷疑初標章敘疑三初標章二指疑起處三結成疑初標章疏十二斷佛因是有菩薩疑記第十二疏初標章二指疑起處疏論云若無菩薩記若無菩薩者指疑起處即從次前文中來也以前云無發心者發心者即是菩薩故三結成疑疏云何釋迦如來於然燈佛所行菩薩行記云何下結成疑也然燈即是釋迦因地第二劫滿所遇之佛既於彼處行菩薩行云何乃言無發心者二依經斷疑經四初舉疑處二斷疑念三印決定四反覆釋初舉疑處須菩提於意云何如來於然燈佛所有法得阿耨多羅三藐三菩提不疏斷疑之文四初舉疑處記舉疑處經意云汝意之中頗謂我於然燈佛所得菩提不若得菩提何成菩薩是彼疑處故舉問之疏降怨王請然燈佛入城城中長幼盡迎路泥善慧布髮佛與授記故舉此問記降怨下敘其本事準本行經説昔有大城名為蓮華城中有王名曰降怨有一婆羅門名曰日主為王所重分與半國封授為王別為王城名為埏主日主夫人名為月上然燈菩薩降神右脅出家成道時降怨王將欲迎請遂敕城內外十二由旬禁斷諸華不令私賣王皆自買以供如來彼國雪山南面有一梵志名曰珍寶有五百弟子中有一弟子名之雲童或名善慧於彼衆中而為上首所有仙法皆學已了辭師還家師曰汝今將歸須以清淨傘蓋革屣金杖乃至金錢五百報我之恩雲童曰我今並無此物但放我去得即送來師即放之雲童因赴無遮之會得五百金錢便欲送還師處因至蓮華城內見城嚴麗即問於人乃知然燈如來欲至遂將三百金錢於一婢子處買得五枝優鉢羅華兼彼女子寄華兩枝共為供養時佛入城即以此華散佛頂上以願力故成於華蓋隨佛行住佛神力故化一方泥善慧見之布髮而掩復作是念願得如來踏我身過若不蒙記莂我終不起如來即至履之而過上諸徒衆皆不令踏即授其記作如是言此摩那婆於未來世當得作佛號釋迦牟尼十號具足如我無異今善吉意云既若買華供佛布髮掩泥即是菩薩若此非菩薩者則孰為菩薩歟二斷疑念不也世尊如我解佛所説義佛於然燈佛所無有法得阿耨多羅三藐三菩提疏二斷疑念記斷疑念經答意云我意不謂如來得菩提也我已解佛所説之義於彼佛所無有一法得為菩提疏善慧彼時都無所得離諸分別由無法故得記若有法者是有相心不順菩提佛不與記記彼時者蓮華城中授記之時也智與理冥心與神會亡所得之法無能得之心故云都無等由無等者即指上無得而得夫菩提之為法也寂滅無生不空不有離一切相若離能所則順菩提得佛授記若存能所心境不亡則與菩提極相違逆如何得記故淨名云寂滅是菩提滅諸相故三印決定佛言如是如是須菩提實無有法如來得阿耨多羅三藐三菩提疏三印決定記印決定經意云空生之言稱其實理故云如是實無下如來述成可知疏論云我於彼時所修諸行無有一法得阿耨多羅三藐三菩提記我於彼時者即受記及修行時也無有一法得菩提者此約橫豎顯之橫則於六度萬行之中行行皆無得義若布施得菩提則不要戒忍等豎則初中後念念念皆無得義若初念得何須念念相續等如是橫豎心行之中皆無得菩提義也疏功德施論引佛説云若見於佛即見自身見身清淨見佛清淨見一切智智皆悉清淨是中見清淨智亦復清淨是名見佛我如是見然燈如來得無生忍一切智智明了現前即得授記是授記聲不至於耳亦非餘智之所能知我於此時亦非惛懵無覺然無所得記功德施下未詳何經若見等者以自他之相相待而成既見於他必須見自見身清淨等者反於前也清淨即是空義見他既見於自不見自則不見他成既相因而成泯亦相因而滅如淨名云如自觀身實相觀佛亦然亦如志公云以我身空諸法空千品萬類悉皆同亦同莊子中説因有而有之因無而無之也見清淨智等者非唯無所見之自他兼無能見之智用斯則能所雙泯也圓覺經云依幻説覺亦名為幻既皆是幻豈得存焉然雖能所兩忘不成斷滅以靈源真心本無能所妄生能所即是乖真能所既除即合本體靈然不昧物我皆如故華嚴云能見及所見見者悉除遣不壞於真見是名真見者又圓覺云諸幻盡滅覺心不動是名見佛者結成見義如上用心方得見佛若生分別執相違真則不名見故華嚴云一切法不生一切法不滅若能如是解諸佛常現前得無生忍等者謂以正智忍可印持無生法故以一切法本無生滅衆生迷倒妄見生滅苟離妄見正智即生契合本體達一切法本來無生名無生忍例而言之見一切法無滅亦名無滅忍今則舉初以攝後也一切智智者是達一切諸法之智表用非一故重言耳有云依於始覺顯得本覺智中之智名智智也得授記者準楞嚴經記有四種一未發心時與記或有流轉五道生於人間好樂佛法過百千萬億劫當發心過百千萬億劫行菩薩道供佛化生皆若干劫當得菩提二適發心與記者是人久劫種諸善根好樂大法有慈悲心即住不退地故發心與記三密記者有菩薩未得記而行六度功德滿足天龍八部皆作是念此菩薩幾時當得菩提劫國弟子衆數如何佛斷此疑即與授記舉衆皆知此菩薩獨不知四無生忍記者於大衆中顯露與記也今當第四也謂散華佛頂布髮泥中依有漏心得無生智於大衆前分明記莂也聲不至耳者能所俱寂以離分別心故心既不起耳何所聞亦非餘者此無分別處非謂別有一智能知圓覺云離遠離幻亦復遠離亦非惛懞等者恐聞都無分別亦非餘智便謂同於木石一向頑凝故圓覺云諸幻盡滅覺心不動然即此覺心亦無所得故頌云若時於所緣智都無所得等此則離沉離掉了然寂然妙契本心竟何所得善慧彼時心同此也四反覆釋須菩提若有法如來得阿耨多羅三藐三菩提者然燈佛則不與我授記汝於來世當得作佛號釋迦牟尼以實無有法得阿耨多羅三藐三菩提是故然燈佛與我授記作是言汝於來世當得作佛號釋迦牟尼疏四反覆釋記反覆釋經意可知矣疏無著云若正覺法可説如彼然燈所説者我於彼時便得正覺然燈則不記言來世當得記若正覺下釋反釋也疏以法不可説故我於彼時不得正覺是故記言來世當得記以法不可下釋覆釋也記據此則善慧彼日但聞其言言性本空竟何有得但約妄惑盡處真智現前當此之時義言得矣十三斷無因則無佛法疑疏二初科分二隨釋初科分疏十三斷無因則無佛法疑於中三記第十三疏二一科分此初二段皆屬前疑但是於中相躡曲敘今以論文別説故復開之二隨釋三初斷一向無佛疑二斷一向無法疑三顯真佛真法體初斷一向無佛疑疏二初標章敘疑二依經斷疑初標章敘疑五初標章二指疑起處三結成疑四躡結所斷之旨五預指能斷之文初標章疏初斷一向無佛疑記二初斷下隨釋疏初標章無佛疑者若了虗無之無無即無咎執之為無無則太傷故成此疑後法亦然也二指疑起處疏論云若無菩提記若無菩提者指疑起處此從十二中來諸疏敘疑多書菩薩字便云從第十一中來然論文之中但云菩提方是血脈相次三結成疑疏即無諸佛如來記即無下結成疑也意云果法號曰菩提證得始名為佛既菩提不可得豈有能證人四躡結所斷之旨疏有如是謗謂一向無佛記謗者即損減過也若言無佛是真謗佛也大論云寧起有見不起無見等五預指能斷之文疏為斷此疑故云如來者即是真如記為斷下預指斷疑之文然是魏本彼文云如來者即實真如二依經斷疑經二初顯真如是佛故非無二明佛即菩提故無得初顯真如是佛故非無何以故如來者即諸法如義疏斷疑之文二初顯真如是佛故非無記非無經徵意云若無菩提則無有佛以何義故得有如來釋意云若無真如則無有佛也以真如是佛故今真如來有復何疑焉疏無著云如清淨故名為如來猶如真金記無著下挾來義解以真如通於凡聖衆生垢染但名如去佛位清淨名曰如來如序中滿淨義及第三疑中具足清淨義也猶如下喻明也意顯精純故名真金謂衆生如全礦菩薩如金礦相半佛如純金也然金性本有鍊之則純如體本然修之則淨故圓覺云譬如銷金礦金非銷故有雖復本來金終以銷成就一成真金體不復重為礦二明佛即菩提故無得若有人言如來得阿耨多羅三藐三菩提須菩提實無有法佛得阿耨多羅三藐三菩提疏二明佛即菩提故無得記無得經意者恐人聞非無如來便言既有如來即有菩提何者以得菩提方名如來故為破此見故云有人言得實無得也無有法即菩提法也疏先標錯解魏云若有人言如來得阿耨菩提者是人不實語記錯解者實不得而謂得故也不實語者即錯解也疏後釋正見偈云菩提彼行等謂等前菩薩所無得也記等菩薩行者謂將前菩薩行以等菩提即指同前來萬行之中皆無得菩提義也但空生疑得故以佛等菩提佛顯無得故以菩提等行疏無著云或謂然燈如來所於法不得正覺世尊後時自得正覺為離此取故云若人言等記無著下可解夫佛與菩提義分人法體無二源由是唐言總名為覺既佛即菩提菩提即佛豈有得義應知説菩提樹下成正覺時同彼然燈佛處亦無所得也二斷一向無法疑疏二初標章敘疑二依經斷疑初標章敘疑四初標章二指疑起處三結成疑四預指能斷之文初標章疏二斷一向無法疑記疏二斷下二疏初標章二指疑起處疏論云有人謗言若無因行記無因行者指疑起處此從無佛中來以前將行等菩提明無得義故三結成疑疏則如來不得阿耨菩提記則如來下結成疑也意云行即是因菩提是果既無因行何得菩提或可約能得所得以成疑也前來斷疑則以菩提等行如今起疑却以行等菩提四預指能斷之文疏為斷此疑故云如來所得等記為斷下預指能斷之文二依經斷疑經二初遣執遮疑二釋義斷疑初遣執遮疑須菩提如來所得阿耨多羅三藐三菩提於是中無實無虗疏斷疑之文二初遣執遮疑記遮疑經意者以空生前疑得菩提是有執此疑不得菩提是無執今則雙遣故云無實無虗二執既遣復何疑無耶故云遮也疏論云無色等相故彼即菩提相故記無色等相者釋無實也即顯菩提無色聲等相然則但無實色等相而不無於假相故經但言無實不言全無也記彼即菩提者釋無虗也此有三意一者無色等相處即顯無相真理是菩提相也二者即以色等相為菩提相由色等無性便是菩提如像無體便是明鏡即色明空不待滅故故云彼即菩提相相即性也三者菩提無相却以色等為相以菩提即真如真如隨緣成色等故論云無漏無明皆同真如性相疏無著云顯真如無二故謂言説故謂彼正覺不無世間言説故記無著下標真如無二者以虗實是空有斷常二邊既言俱無即顯中道也謂言下釋無實也如言菩提而言中無菩提故謂彼下釋無虗也有兩意一則無離文字説解脫故二則明菩提不同言説全無性故魏經云不實不妄語二釋義斷疑是故如來説一切法皆是佛法須菩提所言一切法者即非一切法是故名一切法疏二釋義斷疑記斷疑經意云以一切法並以真如為體一切之言凡聖收盡故皆佛法真如既是佛法餘法豈非佛法耶如一切像以鏡為體故故一切像皆是鏡像又所言一切法非定實一切法是全空一切法疏論云一切法者皆真如體故皆佛法記一切法下義如上説疏即非者由色等法即真如故即非色等法真如常無色等諸相故記由色等者謂色等即空故非色等如像即鏡故非像等斯約諸法即真顯非法真如等者謂空中必無色也以彌滿清淨中不容他故此約真中無法解非法也備斯二義故曰即非疏是名者即是真如法自性矣記是名下以彼色等雖非質閡之一切乃是即性之一切今約此義故曰真如揀異色等無性故云自性也三顯真佛法體須菩提譬如人身長大須菩提言世尊如來説人身長大則為非大身是名大身疏三顯真佛真法體記真佛法經意以前説佛之與法二皆不無又佛之與法二皆不異未知何者是佛法真體而言不無不異耶故此顯有真如是真佛法以彰不無不異之義也疏偈云依彼法身佛故説大身喻身離一切障及遍一切境功德及大體故即説大身非身即是身是故説大身記依彼下兩句標也離一切障者離煩惱所知二障遍一切境者如華嚴云法性遍在一切處等功德即相大即大智慧光明遍照法界等大體即體大功德所依也故即等者功德及體皆廣大故此上解佛大身非身下兩句論文自釋疏論云非身者無有諸相故大身者有真如體故記無諸相者無有為相也如前三相異體故有真如體者有無為法也如前離彼是如來疏無著云攝一切衆生大身故於彼身中安立非自非他故記攝一切等者據理融攝也華嚴云一切衆生及國土三世悉在無有餘故名大身安立等者真如之理本非自他非不自他為破衆生執自他故故言非自他形對強言故云安立斯則安立真如假名名曰大身既攝一切則無自他也故起信云此真如體亦不可立以一切法皆同如故十四斷無人度生嚴土疑疏二初標章敘疑二依經斷疑初標章敘疑四初標章二指疑起處三順他以立理四結成疑初標章疏十四斷無人度生嚴土疑記第十四疏初標章二指疑起處疏論云若無菩薩者記若無菩薩者指疑起處此同第十二於十一中來但起則同時斷則次第也三順他以立理疏諸佛亦不成菩提衆生亦不入涅槃亦無清淨佛土記諸佛下順他以立理也既無菩薩即無此事夫佛不成菩提即是生不入涅槃但約凡聖分於因果故下結疑之處則合而言之四結成疑疏何故諸菩薩發心欲令衆生入涅槃起心修行清淨佛土記何故下結成疑也意云若無菩薩則度生嚴土之者是何人哉二依經斷疑經三初遮度生念二遮嚴土念三釋成菩薩初遮度生念三初明失念二明無人三引前説初明失念須菩提菩薩亦如是若作是言我當滅度無量衆生則不名菩薩疏斷疑之文三初遮度生念三初明失念記失念經意可知但亦如是言是躡起疑處之文非次前文也疏偈云不達真法界起度衆生意及清淨國土生心即是倒記偈云下兼釋後段嚴土之義以文意鈎銷故聯而引之也初句標次二句釋後一句結意云真界平等擬心即差既生其心豈非顛倒經中作如是言即生心也是意言故二明無人何以故須菩提實無有法名為菩薩疏二明無人記無人經徵意云何故作是念便不名菩薩釋意云但約無我無人真如清淨名為菩薩非謂別有一法故上文云若作是念則不名菩薩也疏無法名菩薩豈有我度衆生記疏文可知三引前説是故佛説一切法無我無人無衆生無壽者疏三引前説記前説經意云以是義故佛常宣説一切諸法皆無我人等相然一切諸法本無我人但違之則是衆生順之則是菩薩二遮嚴土念二初明失念二釋所以初明失念須菩提若菩薩作是言我當莊嚴佛土是不名菩薩疏二遮嚴土念二初明失念記失念經意準前可知二釋所以何以故如來説莊嚴佛土者即非莊嚴是名莊嚴疏二釋所以記釋所以經徵意同前釋云如來説莊嚴佛土者非有能嚴所嚴則嚴與不嚴等無有二是真嚴也今既異此故非菩薩三釋成菩薩須菩提若菩薩通達無我法者如來説名真是菩薩疏三釋成菩薩記釋成菩薩經意可知疏論云若起度生嚴土之心即是顛倒非菩薩者起何等心名為菩薩故經言通達等記論云下通釋前段以偈文通標在前論文通釋於後前後相望理則昭然起何下約論徵也故經下引經釋也疏無著云謂人無我法無我記無著下可知記問此與第六皆言嚴土義何別耶答前則對無取疑有取此則對無人疑有人記然此與第十二皆從十一中起以彼文云無發菩提心者佛意但是拂於我人之心不是泯於菩薩空生不達此意將謂我人與菩薩不異由是空生起疑之處則云若無菩薩如來斷疑之處則言無人彼此媕含未嘗顯説直至此處方乃決通經文特言通達無我法者如來説名真是菩薩十五斷諸佛不見諸法疑疏三初標章敘疑二引論彰意三依經斷疑初標章敘疑三初標章二指疑起處三結成疑初標章疏十五斷諸佛不見諸法疑記第十五疏初標章二指疑起處疏論云前説菩薩不見彼是衆生不見我為菩薩不見清淨佛土記前説菩薩下指疑起處此從十四中來以前云我度衆生我嚴佛土皆非菩薩斯則不見自他之義若通而言之亦兼從正答問及第十一疑中來也三結成疑疏若如是則諸佛不見諸法記若如是下結成疑也以聞不見自他等相便謂如來都無智眼故成疑也二引論彰意疏斷疑之文二初約能見五眼明見淨疏偈云雖不見諸法非無了境眼諸佛五種實以見彼顛倒記疏斷之下二引論彰意偈云下先述斷疑意也初句縱次句奪第三句明能見五眼體常故言實也末句明所見諸心體妄故云顛倒然若干種心是智所知境今配為所見境者以如來知見無二體故約眼為見在心曰知故十八住中合為一住處也斷疑意云菩薩但離能所分別故云不見諸佛豈無真實智眼此顯正斷其疑下但隨文科釋三依經斷疑經二初約能見五眼明見淨二約所知諸心明智淨初約能見五眼明見淨五初肉眼二天眼三慧眼四法眼五佛眼初肉眼須菩提於意云何如來有肉眼不如是世尊如來有肉眼疏文五初肉眼記疏文五下三依經斷疑肉眼經問答文意可知疏肉團中有清淨色見障內色名為肉眼記肉團等者謂四塵名肉清淨眼根依肉而住名為肉眼如楞嚴云眼如葡萄朵耳如新卷葉鼻如雙垂爪舌如初偃月身如腰鼓顙意如幽室見清淨眼根依此發也障內下約所見分齊以結名也依肉之眼名為肉眼疏佛具諸根故有肉眼記佛具下或問曰佛為至聖何以同凡有肉眼耶故此通之然但約具諸根處説有肉眼非謂如來是血肉身故經云捨無常色獲常色等二天眼須菩提於意云何如來有天眼不如是世尊如來有天眼疏二天眼於肉眼邊引淨天眼見障外色記肉眼邊等者謂作觀行依肉眼處想外境界觀想成故見障外事名為天眼如阿那律等疏依大般若佛肉眼能見人中無數世界不唯障內若佛天眼能見諸天所有細色除見天外見人等事名肉眼矣記大般若下克就佛説前但約名通解故云障外今約佛位而言故云人中無數等除見天下結成分齊亦顯二眼體同以佛眼體是一而有五用故疏淨名云唯佛世尊得真天眼照見恆沙佛土不以二相三慧眼須菩提於意云何如來有慧眼不如是世尊如來有慧眼疏三慧眼以根本智照真理故記根本者能生後得故亦名正體智真智如理智以能照真故名慧眼也四法眼須菩提於意云何如來有法眼不如是世尊如來有法眼疏四法眼後得智説法度人記後得者從根本後方得起故亦名遍智俗智如量智由能達俗故名法眼也記問據前一二先淺後深云何三四先深後淺答前約眼之次第此約證之次第以達俗由證真故説為後得也五佛眼疏二初局釋當文二通前總顯初局釋當文須菩提於意云何如來有佛眼不如是世尊如來有佛眼疏五佛眼前四在佛總名佛眼記疏於內文二初局釋當文前四等者佛有此眼故云佛眼以前二眼通凡夫二乘無法眼菩薩雖具且劣若在於佛四皆殊勝總名佛眼是則佛眼之外無別四眼也其猶四河歸海失本名耳四皆勝者謂凡夫肉眼見障內天眼見障外佛眼見無數世界二乘天眼唯見一三千界佛天眼見河沙佛土二乘慧眼唯照生空地上菩薩亦皆分證佛之慧眼圓照三空洞徹真性菩薩法眼所知未盡地地之中各有分限佛之法眼所知障盡無法不知無生不度故四皆勝也疏又見佛性圓極名為佛眼記又見下以所見是佛性此眼能見故如涅槃云聲聞定多慧少不見佛性菩薩慧多定少雖見佛性猶不明了諸佛如來定慧等故了了見性如觀掌中菴摩勒果斯不亦圓極之義乎問菩薩聲聞定慧互闕於其佛性則何以聲聞不見菩薩分見耶答以定慧望於佛性慧是因定是緣因親緣疏故使然也又聲聞但有偏空慧無中道慧故云慧少菩薩有中慧故見佛性也記又此五中唯第三持業釋餘皆依主釋也二通前總顯二初引無著總釋二約古德重結初引無著總釋疏無著云為令知見淨勝故顯示有五種眼略説有四種謂色攝第一義諦攝世諦攝一切種一切應知攝記無著下二通前總顯二初引無著義總釋記淨勝者非顛倒故超諸聖故四種者舉所以攝能明於分齊如以六境攝六識色攝即肉天二眼論云色攝有二一法果二修果法即肉眼以從過去業法之所感故修即天眼謂是定果修所得故二眼同見色法色法最粗故先明也第一義即真諦境攝慧眼也世諦即俗諦境攝法眼也一切種者一切種種差別境也一切攝者攝佛眼也即無所不了是一切種智故論云一切種無功用智名為佛眼二約古德重結疏古德偈云天眼通非礙肉眼礙非通法眼唯觀俗慧眼直緣空佛眼如千日照異體還同記古德下二約古德重結可知二約所知諸心明智淨經五初數沙二數河三數界四數生五數心初數沙須菩提於意云何如恆河中所有沙佛説是沙不如是世尊如來説是沙疏二約所知諸心明智淨五初約一箇恆河以數沙二數河須菩提於意云何如一恆河中所有沙有如是沙等恆河疏二約一河中沙以數河三數界是諸恆河所有沙數佛世界如是寧為多不甚多世尊疏三約沙河中沙以數界四數生佛告須菩提爾所國土中所有衆生疏四約爾所界中所有生五數心經三初標悉知二釋悉知三釋非心初標悉知若干種心如來悉知疏五約一一衆生所有心三初總明染淨以標悉知記智淨中五段從狹至寬展轉而數謂數沙數河數界數生數心欲明如來之智微妙能知故約所知之境廣多以顯經皆可見記標悉知經文可知疏無著云若干種心者有二種謂染及淨即共欲心離欲心等記共欲者染也欲謂五欲即色等五塵心與欲合故名為共又欲謂貪欲是心所攝舉初該後意兼瞋等心與貪等相應故云共也前約與境相應此約與煩惱相應皆為染也離欲者淨也即不與六塵境煩惱相應名之為淨染淨之心各有無量故曰若干也二釋悉知何以故如來説諸心皆為非心是名為心疏二會妄歸真以釋悉知記釋悉知經徵意云以何義故能悉知之釋意云彼等諸心皆是妄識妄識即空故云非心以即空故真心不滅故云是名真心體同故能悉知疏大雲云由一切妄心依真如體都無其性佛證真如故悉知之記大雲下釋出能知所以也以諸心是真心中所現少分之法今證真體豈不能知疏諸心者標指非心者妄識本空是名心者真心不滅記諸心下牒釋可知疏若本論釋則與此殊記與此殊者以雲説兼真論言唯妄故不同也論釋為正若以科疏觀之却以雲釋為正也請詳疏偈云種種顛倒識以離於實念不住彼實智是故説顛倒記種種顛倒識者釋經中諸心也魏本云如來説諸心住皆為非心住是名為心住論釋意云諸即種種住謂顛倒以八識皆能緣境有取著故或約前六名為種種緣粗顯境相續不斷故名為住以離等兩句釋皆為非心住也離與不住蓋是一義智與實念亦無別體意明不住大乘四念處故若住於此即是實念實智既住六塵即顛倒識也是故説顛倒者釋是名為心此但結歸顛倒識也三釋非心所以者何須菩提過去心不可得現在心不可得未來心不可得疏三推破雜染以釋非心記釋非心經徵意云所以説諸心為顛倒識無體者何謂也釋意云以於過現未來求不得故疏無著云過去已滅故未來未有故現在第一義故記已滅下釋三世不可得所以也論文淨名華嚴並同但釋現在有少異耳論云現在虗妄分別故淨名云現在不住華嚴云現在空寂然文異而意不異也然此獨於現在之中言第一義者以無著釋經皆約二諦既五眼文中不言眼即非眼又以見智二種其體不殊故於最後安立第一義第一義即是空寂空寂即是不可得義意皆同也十六斷福德例心顛倒疑疏二初標章敘疑二依經斷疑初標章敘疑三初標章二指疑起處三結成疑初標章疏十六斷福德例心顛倒疑記第十六疏初標章二指疑起處疏論云向説心住顛倒皆不可得記向説下指疑起處此從第十五中來心住者指魏經如上所引顛倒者指偈文皆不可得者指經文三結成疑疏若如是福德亦是顛倒何名善法記若如是下結成疑也意云衆生心是顛倒福德依心而成豈非顛倒顛倒既同何名善法既非善法修福何益二依經斷疑二初標科二分釋初標科疏斷疑之文二二分釋經二初問福答福二反釋順釋初問福答福須菩提於意云何若有人滿三千大千世界七寶以用布施是人以是因緣得福多不如是世尊此人以是因緣得福甚多疏初問福答福記問答福經可知疏以是離相無倒行施因緣成無漏福離於二障既非顛倒故得福多記以是下釋多所以以如來舉因緣以問空生牒因緣以答因緣無性福亦無性乃成無漏是故多也此文但標下文即釋二反釋順釋疏二初引論正釋二問答解妨須菩提若福德有實如來不説得福德多以福德無故如來説得福德多疏二反釋順釋記反順釋經意云若是住相之福我不説多以是無住之福是故説多也初引論正釋疏偈云佛智慧為本非顛倒功德記疏二初引論正釋偈云下標也疏論云顯示福非顛倒佛智為本故記論云下釋也意云心識住故故成顛倒顛倒故福皆虗妄佛智無住依之作福即非顛倒非顛倒故皆真實也疏福有者取相也福無者離相也記取相者是有漏福故不説多離相者是無漏福故説多也二問答解妨疏問福性空故福多者前説妄心性空妄亦應多記問福下二問答解妨問意可知疏答福以佛智為本順於性空故悟性空福則甚多心識顛倒違於性空故悟性空則心識都盡記違順等者謂一法界心本來無住本來空寂佛智空而無住故言順妄識住而不空故言違所言不空但妄識不空非真實不空也苟忘懷而達之則無所不喻也
